premise: '看不到自己的手、視線朝上——仰式的方向控制靠「頭是不動的軸」，身體繞著頭轉，不是靠眼睛修正。<span class="cert">🔵</span>'
moves:
  - n: 1
    name: '仰漂安全感'
    one: '讓水撐住身體的起點'
    l: 'L1'
    physical: '仰漂的浮力是<mark>真實存在</mark>的，身體不需出力維持位置。耳朵入水後聽覺改變、視線朝上失去空間參照，是仰式特有的陌生訊號，但與身體是否安全無關。<mark>頭部過高會讓髖部下沉</mark>，是位置問題不是浮力不足。'
    boundary: '浮力由體組成與肺容積決定，是物理現實不是技術；下腹去找浮板只是移除焦慮，不是支撐工具。'
    drills:
      - '仰式流線踢水'
      - '頭帶側身平衡踢水'
    lnote: 'L1 前置，動作開始前必須先建立。'

  - n: 2
    name: '仰漂三指標'
    one: '耳入水、額不碰水、腳到水面'
    l: 'L1–L3'
    physical: '三指標同時成立代表身體在最低阻力位置：<mark>耳朵在水裡</mark>（頭高度正確）、<mark>額頭不碰水</mark>（頭不過低）、<mark>腳踢得到水面</mark>（腰沒弓起）。任一跑掉阻力都明顯增加。頭部過高會幾何性地讓髖部下沉。'
    boundary: '三指標是物理位置，不是感覺；加速後阻力上升是位置偏移的物理結果，不是用力多寡。'
    drills:
      - '頭帶側身平衡踢水'
      - '泳鏡平衡'
      - '仰式流線踢水'
    lnote: 'C 型核心，L3–L4 反覆確認。'

  - n: 3
    name: '上踢推進'
    one: '腳背向後上推水，身體前進'
    l: 'L2–L3'
    physical: '仰式推進主力是<mark>上踢</mark>（足背朝後朝上，蹠屈形成推進面），對應自由式的下踢；下踢是回收動作，由另一腳重量自然帶下，不需刻意控制。主要肌群是<mark>股四頭肌</mark>（伸膝），與自由式的膕繩肌相反。'
    boundary: '<mark>踝關節蹠屈柔韌性</mark>是硬體前提（McCullough 2009）；踝關節僵硬時足背無法朝後，嚴重時上踢產生反向阻力（倒退）。柔韌性訓練優先於力量訓練。'
    drills:
      - '浮板壓腿踢水'
      - '超人仰式踢水'
      - '指天'
      - '垂直仰式踢水'
    cue_bad: '向下踢 / 用力踢水'
    cue_why: '向下踢方向本身就錯（自由式邏輯干擾）；力量不是瓶頸，踝關節柔韌性與方向才是。'
    cue_good: '腳背朝後上推，膝關節最後伸展帶出鞭打'
    lnote: 'L2 腿部感知建立的基礎動作。'

  - n: 4
    name: '入水角度'
    one: '小指先入，沿肩線不過中線'
    l: 'L3–L4'
    physical: '小指側先行、沿肩線延伸方向入水，角度 <mark>30–45°</mark>，不跨越中線。小指先入水阻力最小，且入水後手掌自然轉向推進方向。<mark>跨越中線</mark>會誘發蛇行偏移、橫向動量增加、旋轉軸偏移、能量散逸（幾何必然）。'
    boundary: '視覺回饋缺失是仰式的解剖事實——泳者看不到自己的手，方向偏移無法靠視覺自我修正。'
    drills:
      - '加速入水'
      - 'L形鑽'
      - '快速L形切換'
    cue_bad: '把手放直進去'
    cue_why: '描述手臂形狀不等於入水位置；直臂仍可能跨過鼻樑造成蛇行。'
    cue_good: '手臂沿身體側面前方延伸進水，不越過鼻樑'
    lnote: 'L3–L4 A 型相關。'

  - n: 5
    name: '捕水 EVF'
    one: '高肘在身後抓水，拉身體過去'
    l: 'L3–L4'
    physical: '高肘讓<mark>前臂面向推進方向</mark>，手掌是主推進面，不是前臂。仰式捕水在<mark>身後</mark>（不是身前），手掌在肩線後方約 10–15cm 建立高肘。捕水完成時肘部角度約 100–120°（教練觀測）。<mark>手臂直線推水</mark>會縮小有效槳面積、推進力下降、肩部剪力增加。'
    boundary: '前臂垂直時水動力升力最大化（Schleihauf 1979 物理原理仍有效）是硬體條件；高肘崩潰多為肩部肌耐力問題。'
    drills:
      - '寬Y型划水'
      - '握拳仰式'
      - '仰式拉力板'
      - '水線輔助拉水'
    cue_bad: '手伸越深抓水越多 / 直臂深插'
    cue_why: '深位讓手掌推進方向偏離水平、肩內旋受傷風險上升、姿態耗能增加；舊式深插與現代高肘相對深度是兩回事。'
    cue_good: '肘在上手在下，前臂整面對水，拉身體過去而非推水出去'
    lnote: 'L3–L4 A 型核心。'

  - n: 6
    name: '旋轉不對稱'
    one: '回臂側肩抬高，划水側自然深沉'
    l: 'L4–L5'
    physical: '仰式旋轉不是兩側對稱轉 45°，而是<mark>單側主動</mark>：回臂側肩膀主動向上抬高、近乎觸及下巴，划水側的深沉是這個上抬的<mark>被動結果</mark>。精英男性肩旋轉平均 49.73±5.73°（Gonjo 2020），存在個體最優值。旋轉使<mark>背闊肌進入最佳預拉長度</mark>，並增加有效拉力臂。'
    boundary: '臉朝上限制了滾轉幅度——超過約 45° 臉會入水，可操作範圍比自由式（60°+）小，是解剖邊界。'
    drills:
      - '手臂主導平衡'
      - '交替手臂主導'
      - '俄式滾轉（仰式）'
    cue_bad: '把划水側肩膀往下壓 / 保持平躺不旋轉'
    cue_why: '主動下壓製造肩部張力、增加傷害風險；「平躺」對應最低效率狀態，背闊肌無法預拉，划水只剩小肌群。'
    cue_good: '抬高回臂側肩膀靠近下巴，另一側自然就沉'
    lnote: 'L4–L5 最易搞反方向的環節。'

  - n: 7
    name: '旋轉幅度穩定'
    one: '加速時旋轉不縮小'
    l: 'L4–L5'
    physical: '仰式在速度增加時<mark>維持旋轉幅度不縮小</mark>（Gonjo 2021），與自由式相反——「衝刺時縮小旋轉提高划頻」的策略在仰式不適用。疲勞時的代償是維持肩旋轉但<mark>增加髖旋轉</mark>（核心穩定性下降，旋轉由肩轉移至髖），看似還在轉但推進效率下降。'
    boundary: '旋轉穩定性需要核心旋轉控制作為硬體前提；核心不足時旋轉會打滑（肩滾了但手沒固定）。'
    drills:
      - '雙臂同步仰式'
      - '三划滑行（仰式）'
      - '高速仰式'
    cue_bad: '加速時縮小旋轉提高划頻'
    cue_why: '自由式邏輯，在仰式相反；旋轉幅度穩定本身就是仰式效率特徵，縮小通常伴隨推進力下降。'
    cue_good: '加速時旋轉維持，不能縮小'
    lnote: 'L4–L5，旋轉幅度穩定是功能需求。'

  - n: 8
    name: '頭部固定方向'
    one: '身體繞頭轉，頭是不動的軸'
    l: 'L5'
    physical: '方向控制的核心是<mark>身體繞著頭旋轉，頭是旋轉軸不動</mark>。頭若跟著身體旋轉，方向感立刻消失、路線開始蛇行。基礎位置是耳朵與水面齊平、下巴略收、頭頂與脊椎成直線。<mark>視線略朝上方</mark>（非正後方），朝正後方會頸部過伸。'
    boundary: '頸部活動度與視覺參照缺失是解剖事實；盯住天花板固定點是物理檢測法，不是感覺要求。'
    drills:
      - '單臂仰式'
      - 'L形切換接正式仰式'
      - '暫停點'
    cue_bad: '頭跟著身體轉'
    cue_why: '頭轉動立刻消除方向參照，路線開始蛇行。'
    cue_good: '盯住天花板一個點，身體繞著頭轉'
    lnote: 'L5 方向感內化。'

  - n: 9
    name: '流線型（出發/轉身）'
    one: '雙臂夾耳全入水，滑到速度降才划'
    l: 'L5–L6'
    physical: '100m 仰式出發加轉身合計約佔整場 <mark>1/3</mark>（González-Ravé 2025），流線型品質是 100m 成績最重要的單一技術預測因子之一。出發/轉身後速度最高，阻力以 <mark>F ∝ v²</mark> 增長最快，此時流線型效益最大。雙臂伸直夾耳、頭完全入水，維持到速度降至游進速度附近才開始第一划。<mark>提前浮頭</mark>會立即拉高 Cd 造成實質速度損失。'
    boundary: '屏氣耐受與水下視野是物理限制；提前浮頭常是身體反射而非意識選擇，需逐步延長滑行距離建立。'
    drills:
      - '仰式流線踢水'
      - '加速入水'
    cue_bad: '流線型要放鬆'
    cue_why: '在要求一種狀態，而非創造可滑行的物理條件。'
    cue_good: '感覺速度開始慢下來，那個時候才划第一划'
    lnote: 'L5–L6，現代文獻列為僅次於旋轉的訓練優先級。'
