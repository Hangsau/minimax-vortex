premise: '水下蝶腿的推進是<mark>全身波動傳到腳尖</mark>，不是腿在踢；上踢與下踢都是推進相，流線型品質決定速度上限。<span class="cert">🔵</span>'
moves:
  - n: 1
    name: '流線型就位'
    one: '推蹬後身體鎖成箭'
    l: '前置'
    physical: '流線型是 UDK 速度的底板：<mark>雙臂夾耳手疊合、全身收緊、頭部中立靜止</mark>，振幅控制在身體輪廓線內。任何流線型破壞（抬頭、手臂鬆散、腰過度彎）在高速入水後被阻力放大。'
    boundary: '<mark>肩關節活動度</mark>是流線型的硬體前提之一；肩活動度不足者無法夾緊手臂，截面積增大，此時的不舒服是硬體問題。'
    drills:
      - '仰面流線蝶腿'
      - '衝浪蝶腿'
    cue_bad: '直接從踢腿練起，跳過流線型建立'
    cue_why: '流線型品質決定 UDK 速度上限；頭部鬆散晃動無法製造穩定踢腿源頭。順序應是流線型→時機→效率。'
    cue_good: '先建流線型品質再練踢腿'
    lnote: 'UDK C 型優先介入點。'

  - n: 2
    name: '核心→腳尖波動傳遞'
    one: '核心動，傳到腳尖'
    l: 'L2–L3'
    physical: '推進是<mark>全身波動傳到腳尖</mark>，不是腿在踢。能量鏈：<mark>核心→髖→膝→踝→腳尖</mark>。髖屈伸是主驅動節點，膝被動傳遞放大（不主動發力），踝/腳尖是鞭打終點加速器。'
    boundary: '<mark>踝關節蹠屈範圍</mark>是硬體邊界；蹠屈不足腳背無法朝後，波動傳遞效率下降，感知再好也無法彌補。'
    drills:
      - '胸部下壓'
      - '水下蝶腿'
    cue_bad: '用大腿/膝蓋主動發力（膝蓋彎曲再踢直）'
    cue_why: '從膝蓋發力跳過髖部起始驅動，踝關節鞭打失去近端支撐；下踢前的膝蓋彎曲量是 UDK 最主要減速來源。'
    cue_good: '從髖部啟動、腳踝鞭打結束'
    lnote: 'UDK A 型核心（波動傳遞）。'

  - n: 3
    name: '下踢末段聚攏（渦流觸發）'
    one: '腳掌聚攏，噴流推出'
    l: 'L3'
    physical: '下踢末段<mark>髖外旋、雙腳聚攏</mark>觸發渦流噴射（Tsukuba 2024 PIV）：雙腳聚攏產生渦流叢與噴流，直接轉化為前進動能；速度越快渦流噴射越強（正向回饋）。'
    boundary: '<mark>踝關節蹠屈角度</mark>是此時刻最重要的硬體邊界；蹠屈不足時腳背無法充分朝後，渦流觸發效率大幅下降，無論感知多好都無法彌補。'
    drills:
      - '垂直蝶腿'
      - '蝶腿360度'
    lnote: '觀察到膝蓋過彎（>40°）先測踝蹠屈，再評估是否感知問題。'

  - n: 4
    name: '上踢主動加速'
    one: '上踢也是推進相，主動發力'
    l: 'L3–L4'
    physical: '上踢<mark>不是回復動作，是另一個推進相</mark>。下踢/上踢腳尖速度比值與水平游速<mark>顯著負相關</mark>（Atkison et al. 2014, PubMed 24290609）——相對上踢越強游速越快。上踢由<mark>髖伸展（臀肌/大腿後側）</mark>主導，縮短上踢時間、減少最低點高阻力停留、回收下踢渦流。'
    boundary: '<mark>踝關節</mark>影響上踢推進面積；蹠屈不足限制上踢效率。'
    drills:
      - '仰面雙臂上舉蝶腿'
      - '鯨魚仰式蝶腿'
    cue_bad: '只有下踢有推進力，上踢沒用（上踢只是回復）'
    cue_why: '上踢是 UDK 速度差距最大的訓練機會；把上踢當回復建立不對稱的踢腿地圖。'
    cue_good: '上踢與下踢都各自高效（踢腿對稱性）'
    lnote: 'UDK B 型核心（上踢感知缺失）。'

  - n: 5
    name: '踢腿切換速度（渦流回收）'
    one: '下踢接上踢，不停頓'
    l: 'L4'
    physical: '下踢到上踢的<mark>切換速度決定渦流回收效率</mark>（Tsukuba 2024）：快速切換能「接住」下踢製造的渦流獲得額外推進；切換越慢渦流能量消散。腿在最低點（振幅最大、阻力最高）停留越久成本越高。切換窗口約 1/10 秒。'
    boundary: '強迫高踢頻時振幅自動縮小、游速不增（Gonjo 2017, PubMed 28605694：Froude 效率反而下降，代謝負擔上升）；最優踢頻是個體特異的。'
    drills:
      - '球拋練習'
      - '垂直蝶腿'
    cue_bad: '強迫提高踢頻才能加速（節拍器強制提速）'
    cue_why: '強迫高踢頻使振幅縮小，推進損失抵消頻率收益，速度不變更耗力；最優踢頻是技術進步的結果，不是訓練手段。'
    cue_good: '提高每踢效率，頻率自然提升'
    lnote: '與上踢主動感耦合。'

  - n: 6
    name: '俯臥 vs 仰臥差異'
    one: '俯臥爆發、仰臥穩定'
    l: 'L3–L4'
    physical: '同 UDK 技術，俯臥與仰臥的物理不同：俯臥下踢與浮力同向（易過早浮出），每踢峰值高但谷值明顯；<mark>仰臥下踢對抗浮力</mark>，維持深度更穩定、速度曲線更平滑、整體效率更高（SwimSwam / WKU Kinematic Comparison）。'
    boundary: '仰式深度維持依賴主動對抗浮力；<mark>核心力量</mark>不足者腰部被浮力推高呈弓形、阻力增大——核心力量問題，不是感知問題。'
    drills:
      - '鯨魚仰式蝶腿'
      - '仰面流線蝶腿'
    cue_bad: '仰式水下跟俯式一樣踢就好'
    cue_why: '仰式下踢方向、浮力關係、效率機制都不同；套用俯式「向下爆發」口令使仰式速度不穩定。'
    cue_good: '仰式強調對抗浮力的下踢與速度穩定'
    lnote: '仰式追求穩定，不追求每踢很爆。'

  - n: 7
    name: '出水銜接（Breakout）'
    one: '最後一踢動能接進第一划'
    l: 'L4'
    physical: 'Breakout 是 UDK 與游泳的銜接點。<mark>最後一踢的推進動能應連貫轉換為第一划的捕水動能</mark>，無速度空窗。自由式/仰式：最後一踢同步啟動第一划（腳還在踢、手已捕水）；蝶式：最後一踢與 Breakout 波動啟動同步（最複雜）。'
    boundary: '<mark>踝關節蹠屈範圍</mark>是 UDK 的主要硬體邊界；蹠屈受限→腳背無法朝後→代償膝蓋過彎→正面阻力增加→速度下降。'
    drills:
      - '蝶式划手跑直線'
      - '二二二組合'
    cue_bad: '踢腿→換 flutter kick→浮出→才划手（踢完留空窗）'
    cue_why: '過早換成自由式踢腿等於踩剎車，浪費出發/轉身建立的速度；菁英在第一划仍踢最後一踢。'
    cue_good: '最後一踢與第一抓水同步啟動'
    lnote: '出水時機的計步感知見出發轉身頁面。'
