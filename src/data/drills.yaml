- id: Fl10
  name_en: Vertical Kicks
  name_zh: 垂直蝶腿
  strokes:
  - butterfly
  - underwater_dolphin_kick
  category: kick
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: B
  purpose_zh: 垂直踢蝶腿（10秒25下），感覺快速緊實踢腿中核心的穩定
  how_to:
  - 深水區直立，目標10秒內做25下垂直蝶腿
  - 力量不足可雙手抱胸或放頭上；最難是雙臂streamline（二頭肌夾耳）
  - 肩、胸、頭放鬆，波動從腹肌啟動（像鞭子一端）、腳趾是另一端，甩鞭時上半身保持靜止；核心收緊、髖以下發力
  perception_goal: 踢腿從腹部開始；感覺腳踝是鞭子末端；上身完全靜止
  success_signal: 10秒25下；水面有漩渦而非波浪
  failure_signal: 水面有大波浪（代表踢腿過大）；上身在晃動
  deficiency_fixes:
  - 9
  - 14
  source: There's a Drill for That
- id: Fl11
  name_en: Kick 360
  name_zh: 蝶腿360度
  strokes:
  - butterfly
  - underwater_dolphin_kick
  category: kick
  equipment:
  - fins
  l_target:
  - L4
  abc_type: B
  purpose_zh: 蝶腿360度旋轉，感覺旋轉不偏離就代表核心鎖定對稱
  how_to:
  - 穿蛙鞋（或單蹼）streamline打蝶腿，在水中很慢地旋轉360度，同時維持穩定踢水
  - 兩個方向都要能轉
  - 旋轉時保持鎖在核心、身體不偏移
  perception_goal: 旋轉時踢腿節律不變；感覺核心是旋轉的軸心
  success_signal: 可以任意方向旋轉且保持直線
  failure_signal: 旋轉時漂離中線（代表踢腿不對稱）
  deficiency_fixes:
  - 14
  source: There's a Drill for That
- id: Fl12
  name_en: Over the Barrel
  name_zh: 跨過木桶
  strokes:
  - butterfly
  category: kick
  equipment:
  - snorkel
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 雙臂錨定前方20-30度角踢蝶腿，感覺捕水位置和快速踢腿節律
  how_to:
  - 戴呼吸管，面朝下打蝶腿，雙手錨定在前方捕水位置（寬Y）
  - 手臂略向下約20-30度、手指朝下（手腕微彎），感覺像抓住水準備划
  - 像跨坐在一個木桶上的感覺，同時練快節奏踢水
  perception_goal: 雙手感覺抓住水在一個向下的角度；像要拉住木桶的感覺
  success_signal: 雙手前臂有水壓感；踢腿節律穩定
  failure_signal: 雙手感覺不到水壓；只是讓腿在踢
  deficiency_fixes:
  - 9
  source: There's a Drill for That
- id: Fl13
  name_en: Angel Wings
  name_zh: 天使翅膀
  strokes:
  - butterfly
  category: arm
  equipment:
  - kickboard
  l_target:
  - L2
  - L3
  abc_type: A
  purpose_zh: 趴在浮板上慢動作蝶式手臂恢復，感覺小指朝天→拇指向下的旋轉路徑
  how_to:
  - 軀幹趴在浮板上，雙臂像天使般在水面上很慢地外掃；姿勢、身體線、平衡要好才能留在浮板上
  - 出手時略外撇離開臀部、掌心朝上；旋轉手臂時擦過水面、拇指朝下，直到雙臂回到前方完成恢復
  - 手與手指盡量放鬆，恢復走水面上不在水下拉（像做雪天使）
  - 進階：拿掉浮板配很輕的自由式踢水，手臂盡量慢、擦過水面
  perception_goal: 出水時手心朝天；恢復時拇指向下；手臂完全放鬆輕掠水面
  success_signal: 趴在浮板上穩定；手臂恢復輕鬆不費力
  failure_signal: 浮板不穩定；手臂恢復費力或入水
  deficiency_fixes:
  - 1
  - 3
  - 4
  - 5
  - 6
  - 10
  source: There's a Drill for That
- id: Fl14
  name_en: Angel Wings Transition to Full Fly
  name_zh: 天使翅膀接完整蝶式
  strokes:
  - butterfly
  category: arm
  equipment:
  - kickboard
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 天使翅膀接水下恢復再接完整蝶式，感覺從慢到正常速度的過渡
  how_to:
  - 先在浮板上做Fl13天使翅膀的前半：建立平衡、放鬆手、出手掌心朝上、恢復與入水拇指朝下，做幾下
  - 慢動作蝶式：在浮板上做一次天使外掃前伸，然後手在水下恢復（像正式蝶式），再擦過水面回到天使外掃；能維持浮板平衡才進下一步
  - 全速划：先做一次完整天使外掃，雙手到前方後做一個全速完整划（錨定前方、內掃過下巴、往後往外推、恢復到前方）；此時可能離開浮板，代表划手更積極了
  perception_goal: 感覺手臂在不同速度下的恢復感覺；入水點的位置感
  success_signal: 完整蝶式時保持天使翅膀訓練的手臂路徑
  failure_signal: 完整速度時手臂路徑完全改變
  deficiency_fixes:
  - 1
  - 4
  - 6
  - 10
  source: There's a Drill for That
- id: Fl15
  name_en: Butterfly Stroke & Run
  name_zh: 蝶式划手跑直線
  strokes:
  - butterfly
  category: arm
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: null
  purpose_zh: 無踢腿蝶式划手後滑行，感覺水平向前的節律而非上下的起伏
  how_to:
  - 從牆邊推牆進水面，做一個蝶式划手前伸、用超人姿勢「跑出那條線」滑行（不踢水）
  - 推牆後盡快用手；水線切過耳朵中間（不下潛也不抬太高）；蝶式要像木板、別浪費能量上下起伏
  - 進階：連續3划（仍不踢、不換氣）跑線；或一划回牆再三划，讓三划感覺像一划的動作、身體保持僵直不動
  perception_goal: 划手後感覺向前滑行；水線切耳朵一半；不往下鑽
  success_signal: 每一划後感覺水平向前延伸；身體像板子一樣平
  failure_signal: 每划後往下鑽或感覺波浪太大
  deficiency_fixes:
  - 7
  - 11
  source: There's a Drill for That
- id: Fl16
  name_en: Scull to Combination
  name_zh: 外划到組合
  strokes:
  - butterfly
  category: arm
  equipment:
  - snorkel
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 三部分：外划→加入波動→外划接完整蝶式，感覺前段捕水和波動的連結
  how_to:
  - 戴呼吸管。第一部分：面朝下雙臂前伸撥水（外撥到寬Y再回），配輕自由式踢水，做一趟
  - 第二部分：去掉自由式踢水、加入身體蝶式波動（波動從雙肩間壓胸啟動，膝蓋彎很少），頭頸拉長、線延伸；外撥到Y時把肺往下壓
  - 第三部分：撥三次（3個寬Y）接一個完整蝶式划，再回到撥水，前端把指尖往下扎
  perception_goal: 外划後感覺手指往下抓水；波動從胸部下壓啟動不是膝蓋
  success_signal: 三個階段都感覺連貫；完整蝶式時保持前段的捕水感
  failure_signal: 各階段感覺完全割裂；完整蝶式時捕水感消失
  deficiency_fixes:
  - 7
  source: There's a Drill for That
- id: Fl17
  name_en: Butterfly Recovery
  name_zh: 蝶式恢復臂（水下）
  strokes:
  - butterfly
  category: timing
  equipment:
  - snorkel
  l_target:
  - L4
  - L5
  abc_type: null
  purpose_zh: 水下恢復臂蝶式（像蛙式恢復），感覺高肘捕水和手臂加速中段時機
  how_to:
  - 戴呼吸管，配自由式踢水做蝶式的水下恢復：高肘捕水扎手、往後拉，雙手在身體下方會合成三角形，從尖端推出、在臀部外撇開，再像蛙式恢復把手收回身體下方；專注高肘捕水與身體中段加速
  - 第二層：改成蝶式踢水配同樣的水下恢復，練時機（踢水在划手頂端啟動、在身體下方是加速點）
  - 第三層：拿掉呼吸管加入換氣，做序列——第一划不換氣保持平、第二划肩膀升高讓泳鏡露出水線、第三划再升高讓泳鏡與嘴出水換氣；換氣抓在雙手掃過中段時，不抬頭、滑下巴
  perception_goal: 高肘捕水後感覺加速；踢腿是捕水的觸發和加速的信號
  success_signal: 感覺到高肘捕水和踢腿的時機連動
  failure_signal: 踢腿和捕水完全脫節
  deficiency_fixes:
  - 1
  - 2
  - 12
  source: There's a Drill for That
- id: Fl18
  name_en: Single Arm Swimming
  name_zh: 單臂蝶式
  strokes:
  - butterfly
  category: arm
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 單臂蝶式，感覺放鬆恢復和踢腿節律，換氣向划手側
  how_to:
  - 盡量放鬆，肩與頭在水面、腳在水中，一手放身側，朝划手側換氣
  - 划手前端保持肩高、手低，入水柔；再做一次加快節奏（更像比賽，速度快時更平、恢復低貼水面）
  - 進階：一手留在前方（線更長、更接近比賽、入水更淺）；再進階加前端換氣，靠時機與肩膀升起偷一口氣、手入水前頭先回水中
  perception_goal: 恢復臂完全放鬆；踢腿節律不因換氣停頓；身體保持水平
  success_signal: 划手恢復自然放鬆；節律穩定
  failure_signal: 恢復臂緊張費力；換氣時身體大幅起伏
  deficiency_fixes:
  - 1
  - 2
  - 11
  source: There's a Drill for That
- id: Fl19
  name_en: 2-2-2 Drill
  name_zh: 二二二組合
  strokes:
  - butterfly
  category: arm
  equipment: []
  l_target:
  - L4
  abc_type: null
  purpose_zh: 左二下右二下前二下的單臂組合，感覺節律和放鬆恢復
  how_to:
  - 游蝶式：左側兩划、右側兩划、前方兩划
  - 只在單手側划換氣（朝側邊），前方兩划不換氣
  - 專注壓胸、放鬆恢復、保持相當平的身體線；可試3-3-3或1-1-1
  perception_goal: 每次換方向都保持節律不停頓；胸部下壓感覺保持
  success_signal: 三個方向都流暢；節律連貫
  failure_signal: 換方向時明顯停頓；節律中斷
  deficiency_fixes:
  - 11
  source: There's a Drill for That
- id: Fl20
  name_en: Low Baby Low!
  name_zh: 保持低位換氣
  strokes:
  - butterfly
  category: timing
  equipment: []
  l_target:
  - L4
  - L5
  abc_type: null
  purpose_zh: 從二二二接全臂蝶式，感覺下巴貼水換氣，保持低位入水
  how_to:
  - 從2-2-2延伸，加快節奏，這次前方兩划也換氣
  - 用下巴滑過水面換氣，手往前刺出前頭先回水中
  - 保持低而放鬆，設法讓手、肩、頭都落在水面4吋內
  perception_goal: 換氣時下巴滑過水面；頭入水先於手入水；整體高度很低
  success_signal: 手、肩、頭都在水面4英寸以內著陸
  failure_signal: 頭部高出水面很多；臀部下沉
  deficiency_fixes:
  - 1
  - 2
  source: There's a Drill for That
- id: Fl21
  name_en: Deep Catch
  name_zh: 深度捕水
  strokes:
  - butterfly
  category: arm
  equipment: []
  l_target:
  - L4
  - L5
  abc_type: A
  purpose_zh: 抬頭蝶式配自由式踢腿，感覺手快速往深處挖的捕水感
  how_to:
  - 抬頭蝶式配自由式踢水，頭頸抬高
  - 手臂繞到捕水位置時，快速把手扎進去做快捕水，再繞回開始下一划
  - 恢復保持放鬆
  perception_goal: 手臂進入捕水位置時感覺快速下挖；恢復放鬆
  success_signal: 捕水動作快速有力；感覺到明確的水壓
  failure_signal: 捕水緩慢；感覺沒有真正抓住水
  deficiency_fixes:
  - 7
  source: There's a Drill for That
- id: Fl22
  name_en: Thumb Drag Recovery
  name_zh: 拇指拖水恢復
  strokes:
  - butterfly
  category: arm
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 恢復臂拇指拖水感覺低位恢復，消除手臂太高的習慣
  how_to:
  - 游蝶式，恢復手臂時讓拇指拖過水面，出手掌心朝上、恢復過程拇指朝下
  - 拖拇指讓你感覺良好的低恢復
  - （註：比賽不拖拇指，而是略高於水線）
  perception_goal: 拇指在水面拖水時感覺恢復路徑很低；手心朝天出水
  success_signal: 拖水留下明顯痕跡；感覺恢復費力很少
  failure_signal: 無法穩定拖水（代表手臂太高）
  deficiency_fixes:
  - 3
  - 5
  source: There's a Drill for That
- id: Fl23
  name_en: Ball Toss
  name_zh: 球拋練習
  strokes:
  - butterfly
  category: kick
  equipment:
  - ball
  - partner
  l_target:
  - L4
  abc_type: B
  purpose_zh: 踢蝶腿同時與搭檔拋接球，感覺用上身延伸投球時核心維持踢腿
  how_to:
  - 深水區，岸上有一個夥伴，邊打蝶腿邊與對方拋接球（水球大小）
  - 用四肢動作時維持身體線；重點在拋球時（不是接球時）
  - 往岸上夥伴拋時，手臂在空中完全伸展
  perception_goal: 投球時手臂完全延伸；踢腿節律不中斷；身體線條保持
  success_signal: 投球手臂完全伸展；踢腿不停頓
  failure_signal: 投球時踢腿停止；身體線條崩潰
  deficiency_fixes:
  - 14
  source: There's a Drill for That
- id: Fl24
  name_en: Easy Recovery Fly
  name_zh: 輕鬆恢復蝶式
  strokes:
  - butterfly
  category: arm
  equipment: []
  l_target:
  - L3
  abc_type: null
  purpose_zh: 做幾划高品質蝶式後換其他泳式，積累正確蝶式感知不建立錯誤肌肉記憶
  how_to:
  - 做3到4個很輕鬆的蝶式划（不換氣、不踢、讓腿拖著），然後翻身游仰式或自由式
  - 變強後加入換氣、輕踢、增加划數
  - 重點是先游有品質的蝶式再建耐力（避免用錯誤動作建立肌肉記憶與肩傷）；可試一趟做X划蝶再轉自由式，從每趟2划開始往上加
  perception_goal: 每一划蝶式都是高品質的；感覺到節律和效率
  success_signal: 做幾划蝶式時感覺流暢有節律
  failure_signal: 第一划就感覺費力不協調
  deficiency_fixes: []
  source: There's a Drill for That
- id: Fl25
  name_en: Slow Recovery Drill to Front
  name_zh: 慢速前恢復
  strokes:
  - butterfly
  category: arm
  equipment:
  - snorkel
  - fins
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 戴呼吸管緩慢恢復（4拍）感覺手掌壓力和錨定，訓練柔手入水
  how_to:
  - 戴呼吸管、穿蛙鞋配輕自由式踢水。手錨定在前方，感覺手背上的水壓，拉到結束、停一下，恢復用四拍很慢地回到前方，錨定後重複
  - 恢復時出手掌心朝上、入水前拇指朝下
  - （掌心朝下會讓胸口浮起）
  perception_goal: 錨定時感覺手背有水壓；恢復時手心朝天然後拇指朝下；入水軟
  success_signal: 慢速恢復時感覺清楚的捕水壓力；手入水非常柔和
  failure_signal: 手背感覺不到水壓；入水猛烈
  deficiency_fixes:
  - 4
  source: There's a Drill for That
- id: Fl26
  name_en: Triangle or Biondi Drill
  name_zh: 三角形（Biondi）鑽
  strokes:
  - butterfly
  category: timing
  equipment: []
  l_target:
  - L4
  - L5
  abc_type: null
  purpose_zh: 水下拉手推後方接水下恢復，感覺換氣時機（手向後推時）和臀部上浮
  how_to:
  - 先做Fl1壓胸與Fl2蝶腿熱身（波動是關鍵）。從牆邊streamline水下推牆出發
  - 開始浮起時做一個水下拉手，然後把手往後甩像要恢復，設法在大腿邊停住不出水；手往後推時抬頭換氣，甩到底時頭也正好上來換氣
  - 完成甩之後把頭壓回水中（此時髖部升起），手在水下恢復回streamline，做約六個波動，手浮到水面時準備重新開始
  perception_goal: 手向後推時感覺是換氣的時機；頭入水後感覺臀部上浮
  success_signal: 換氣和手後推時機吻合；流線時臀部自然上浮
  failure_signal: 換氣太早或太晚；臀部無法上浮
  deficiency_fixes:
  - 2
  - 12
  source: There's a Drill for That
- id: Fl27
  name_en: Four Kicks Per Arm Cycle
  name_zh: 每划四踢
  strokes:
  - butterfly
  category: timing
  equipment:
  - fins
  l_target:
  - L4
  - L5
  abc_type: null
  purpose_zh: 四踢蝶腿後一次完整蝶式划手，感覺踢腿整合進划手的時機
  how_to:
  - 穿蛙鞋，滑進水線下成streamline，做四個蝶腿接一個完整蝶式划
  - 前兩踢建立捕水位置、第三踢啟動手臂、第四踢推過水下恢復；不要為了加划手而停踢（會失去動力）
  - 可每划低換氣；划手時想著把自己往前拉、下巴貼水面、髖部高；進階可改5踢1划或6踢1划
  perception_goal: 第三踢開始啟動手臂；第四踢時手臂在水下恢復；踢腿不停
  success_signal: 踢腿不因加入划手而停頓；感覺踢腿和划手有整合感
  failure_signal: 每次加入划手就停止踢腿
  deficiency_fixes:
  - 12
  source: There's a Drill for That
- id: Fl28
  name_en: Vertical Strokes
  name_zh: 垂直蝶式
  strokes:
  - butterfly
  category: timing
  equipment: []
  l_target:
  - L5
  - L6
  abc_type: null
  purpose_zh: 深水垂直蝶式，感覺手臂加速後身體火箭般竄出水面
  how_to:
  - 深水區游蝶式。手先放頭上（非streamline、與肩同寬）
  - 讓身體往下沉，頭與手沉入水時做一個蝶式拉手、用力加速雙手
  - 做對的話會像火箭把手、臂、頭、頸彈出水面；重複；上半身保持緊線
  perception_goal: 手臂加速時感覺整個身體被推向上；加速是關鍵
  success_signal: 頭頸手臂竄出水面
  failure_signal: 無法竄出水面（代表加速不足）
  deficiency_fixes:
  - 12
  source: There's a Drill for That
- id: Fl29
  name_en: High Catch with Foam Roller
  name_zh: 泡棉滾筒高肘捕水
  strokes:
  - butterfly
  category: arm
  equipment:
  - foam_roller
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 雙手壓泡棉滾筒感覺高肘捕水的角度和壓力
  how_to:
  - 深水區趴平，雙掌與肩同寬放在泡棉滾筒上、在划手頂端往前伸展
  - 把手往滾筒上壓，滾筒會往身體方向滾上來，你會感覺到捕水
  perception_goal: 手壓滾筒時感覺肘部高於手；感覺水壓在手背
  success_signal: 清楚感覺到捕水角度；手壓滾筒時滾筒向上滾
  failure_signal: 感覺不到水壓差異；肘部沒有高於手
  deficiency_fixes:
  - 4
  source: There's a Drill for That
- id: Fl30
  name_en: Breakout Stroke
  name_zh: 破水動作
  strokes:
  - butterfly
  - starts_turns
  category: timing
  equipment: []
  l_target:
  - L4
  - L5
  abc_type: null
  purpose_zh: 出發或轉身後蝶腿接第一划，感覺第一划時頭部保持低位
  how_to:
  - 出發或推牆後立刻進streamline蝶腿，接一個有換氣的划，然後停
  - 換氣那一划不要太早找水面（會產生阻力）；頭壓低與streamline成一線，等開始拉手才把頭抬起
  - 再做一次但這一划不換氣再停；不在該趟第一划換氣的人尤其要保持頭低
  perception_goal: 開始划手前頭部保持在流線角度；不因為想換氣而提早抬頭
  success_signal: 第一划時頭抬起是由手臂帶動而非頭主動抬
  failure_signal: 手還沒動頭就先出水
  deficiency_fixes:
  - 13
  source: There's a Drill for That
- id: Fl31
  name_en: Short Axis Combo
  name_zh: 短軸組合（蝶蛙）
  strokes:
  - butterfly
  - breaststroke
  category: timing
  equipment: []
  l_target:
  - L4
  - L5
  abc_type: null
  purpose_zh: 蝶式和蛙式交替游，感覺兩式髖部動作和外划的共通性
  how_to:
  - 交替游蝶式與蛙式（外撥與核心旋轉相似）：3蝶接3蛙，或2-2、1-1
  - 1-1時兩種都把滑行拉長；眼睛保持朝下，蝶蛙頭都不動
  - 蝶式換氣空間不夠時，用下巴滑過水面代替抬頭
  perception_goal: 感覺兩式換氣時嘴巴貼水的相似感；髖部動作連貫
  success_signal: 切換流暢；兩式在感知上有共通連結
  failure_signal: 兩式在感知上完全無關
  deficiency_fixes: []
  source: There's a Drill for That
- id: Sc1
  name_en: Wide Y Sculling
  name_zh: 寬Y型划水
  strokes:
  - freestyle
  - backstroke
  - breaststroke
  - butterfly
  category: sculling
  equipment:
  - fins
  l_target:
  - L2
  - L3
  abc_type: A
  purpose_zh: 前方寬Y型划水感知，感覺前臂和手作為整體做細微水感動作
  how_to:
  - 面朝下，雙手在前方撥水（不踢水，可穿浮力蛙鞋僅為平衡）
  - 從雙手併攏（streamline）撥到「寬Y」（捕水起點）後立刻回中央；手肘幾乎不彎，力量全來自手掌與前臂
  - 頭與眼睛朝下；需要時換氣後立刻回面朝下（或戴呼吸管專注外撥）
  perception_goal: 手在寬Y位置感覺水壓；前臂驅動動作不是整條手臂；動作小且精準
  success_signal: 能感覺到手和前臂在划水中有明確水壓感
  failure_signal: 感覺不到水壓；只是讓手在水中移動
  deficiency_fixes: []
  source: There's a Drill for That
- id: Sc2
  name_en: Head Down Scull with Buoy
  name_zh: 頭朝下划水（窄Y）
  strokes:
  - freestyle
  - breaststroke
  - butterfly
  category: sculling
  equipment:
  - pull_buoy
  l_target:
  - L2
  - L3
  abc_type: A
  purpose_zh: 浮力棒輔助頭朝下窄Y划水，感覺手腕和前臂的精細水感
  how_to:
  - 夾浮棒在大腿高處、完全不踢水，面朝下撥水
  - 幅度比寬Y窄很多：手臂打直，只用手掌與手腕在前方撥到肩膀外側的窄「Y」
  - 需要時換氣；戴呼吸管有助專注於撥水與身體線
  perception_goal: 手臂伸直，只有手腕和手在動；感覺水壓在手和前臂上
  success_signal: 身體向前移動；不是用整條手臂划水
  failure_signal: 手臂整體在做大動作；感覺不到精細水壓
  deficiency_fixes: []
  source: There's a Drill for That
- id: Sc3
  name_en: Head Up Scull with Buoy
  name_zh: 頭朝上划水
  strokes:
  - freestyle
  - breaststroke
  - butterfly
  category: sculling
  equipment:
  - pull_buoy
  l_target:
  - L2
  - L3
  abc_type: A
  purpose_zh: 頭抬出水面的划水，感覺手位置更深時的前臂水壓
  how_to:
  - 同Sc2的窄幅撥水，但把頭（下巴）抬出水面
  - 手可能會稍微下沉一點，沒關係
  - 眼睛看向池末、不看池底，前臂會很有感
  perception_goal: 視線看向池端；感覺前臂更用力做功
  success_signal: 抬頭時仍能前進；感覺前臂承受更多水壓
  failure_signal: 抬頭時幾乎無法前進
  deficiency_fixes: []
  source: There's a Drill for That
- id: Sc4
  name_en: Windshield Wipers Head Down
  name_zh: 雨刷划水（頭朝下）
  strokes:
  - breaststroke
  - butterfly
  category: sculling
  equipment:
  - pull_buoy
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 肘部固定，只用前臂手腕做雨刷動作，感覺蛙蝶式外划到內划的轉換
  how_to:
  - 面朝下、夾浮棒，眼睛看池底，上臂（肩到肘）在頭部兩側、手指朝池底
  - 用手掌與前臂內外撥水，像雨刷一樣，其餘手臂保持不動、手肘相對固定
  - 靠前臂與手掌驅動自己前進
  perception_goal: 肘部靜止；感覺前臂和手在做一個向內掃的動作；有方向感的水壓
  success_signal: 能感覺到外到內的水壓方向變化
  failure_signal: 肘部跟著動；感覺只是在隨便划水
  deficiency_fixes: []
  source: There's a Drill for That
- id: Sc5
  name_en: Windshield Wipers Chin Up
  name_zh: 雨刷划水（下巴朝上）
  strokes:
  - breaststroke
  - butterfly
  category: sculling
  equipment:
  - pull_buoy
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 頭抬出水面的雨刷划水，模擬蛙式換氣時的手部位置和水壓
  how_to:
  - 同Sc4，但這次把下巴留在水面上、眼睛保持約45度（看不到池末）
  - 用手掌與前臂內外撥水，手肘保持相對固定
  - 難度更高，但接近真實蛙式動作，幫助發展內撥
  perception_goal: 視線45度；感覺前臂更深的工作角度；接近蛙式換氣時的真實感
  success_signal: 比Sc4更費力但感覺更接近實際蛙式划手
  failure_signal: 感覺比Sc4容易（代表沒有在加大工作角度）
  deficiency_fixes: []
  source: There's a Drill for That
- id: Sc6
  name_en: Feet First Scull
  name_zh: 腳先行划水
  strokes:
  - freestyle
  - backstroke
  - breaststroke
  - butterfly
  category: sculling
  equipment: []
  l_target:
  - L2
  - L3
  abc_type: A
  purpose_zh: 仰面腳先行，手在髖部兩側小圓圈划水，感覺前臂抓水向後推的力量
  how_to:
  - 仰躺、雙手放身側、腳朝前方移動整趟泳池；盡量放鬆每個部位（膝蓋鬆、可微彎），肩膀放鬆、頸與脊椎對齊
  - 雙手在臀部附近做小圓圈撥水：離臀部約6-10吋、深度約4-6吋，雙手大致與臀部平行
  - 只用手臂發力（主要前臂、部分三角肌）；能輕鬆做完25後計時當基準看進步
  perception_goal: 小圓圈划水時感覺到手和前臂在抓水；不是整臂在動
  success_signal: 腳朝前能前進；感覺到推力
  failure_signal: 幾乎無法移動（代表沒有抓到水）
  deficiency_fixes: []
  source: There's a Drill for That
- id: Sc7
  name_en: Hip Scull
  name_zh: 髖部划水
  strokes:
  - freestyle
  - backstroke
  - butterfly
  category: sculling
  equipment:
  - pull_buoy
  - snorkel
  l_target:
  - L3
  abc_type: A
  purpose_zh: 手在髖部兩側小幅划水，感覺拉水末段（出水前）的水感
  how_to:
  - 面朝下、夾浮棒、戴呼吸管
  - 雙手放在臀部旁，只用手掌撥水
  - 手移動幅度很小，只有幾吋
  perception_goal: 手在髖部感覺細微的水壓；感覺出水前的最後推力
  success_signal: 小動作也能感覺到水壓差異
  failure_signal: 感覺不到任何水壓
  deficiency_fixes: []
  source: There's a Drill for That
- id: Sc8
  name_en: Seated Scull
  name_zh: 坐姿划水
  strokes:
  - breaststroke
  category: sculling
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 垂直坐姿（膝蓋前彎）做蛙式拉手，感覺高肘外划-內划-前推的完整感
  how_to:
  - 在水中保持垂直，像坐在高背直椅上；頭與肩在水面外，膝蓋彎曲在胸前、腳跟在臀部下方
  - 做蛙式拉手往前，手肘保持高位、不把手肘往後拉
  - 前臂掃過膝蓋後往前刺出，前伸用高速完成
  perception_goal: 肘部一直在肩膀前方；前推時速度最快；感覺像在推水走
  success_signal: 前推時明顯感覺到動量和速度
  failure_signal: 肘部拉到肩膀後面；前推無力
  deficiency_fixes: []
  source: There's a Drill for That
- id: Sc9
  name_en: Single Arm Scull
  name_zh: 單臂划水
  strokes:
  - breaststroke
  - butterfly
  category: sculling
  equipment:
  - pull_buoy
  - snorkel
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 單臂划水，感覺弱側的水感差異，訓練身體控制不依靠雙臂平衡
  how_to:
  - 與Sc2同樣的撥水動作，但只用單手，面朝下、夾浮棒，另一手放身側
  - （可戴呼吸管）
  - 訓練前臂與手掌力量，模擬蛙式與蝶式前端的位置
  perception_goal: 單臂划水時感覺身體保持平衡不歪斜；弱側感覺清楚
  success_signal: 單臂也能保持直線前進
  failure_signal: 單臂時身體明顯歪向划水側
  deficiency_fixes: []
  source: There's a Drill for That
- id: Sc10
  name_en: Behind the Head Scull
  name_zh: 頭後方划水
  strokes:
  - backstroke
  category: sculling
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 仰面手在頭後方做小划水，訓練背闊肌和前臂，模擬仰式入水捕水位置
  how_to:
  - 仰躺、臉朝上、腳朝想去的方向
  - 雙臂上舉到頭後方，在頭後做小幅撥水
  - 盡量讓頸部肌肉不要繃緊
  perception_goal: 頭後方的小划水動作感覺到背闊肌和前臂在做功
  success_signal: 身體能向前移動；感覺到背闊肌啟動
  failure_signal: 完全感覺不到用力點；頸部緊繃
  deficiency_fixes: []
  source: There's a Drill for That
