drills:
- id: Fr1
  name_en: Standing Breathing
  name_zh: 站姿呼吸
  strokes:
  - freestyle
  category: breathing
  equipment: []
  l_target:
  - L0
  abc_type: null
  purpose_zh: 建立正確呼吸時機與吐氣節律，消除憋氣習慣
  how_to:
  - 站在及腰水深，從腰部前彎把臉放進水裡，視線朝池底、頸部與脊椎成一線
  - 轉頭換氣時想成「下巴滑動」，只轉到一個泳鏡離開水面，用嘴吸氣
  - 臉回到水中後緩慢而穩定地吐氣，再換到另一側吸氣，兩側交替
  - 進階：一手向前伸直，朝另一側換氣；臉回到水中時該手在水下划過，另一手接著划
  perception_goal: 吐氣連續均勻；轉頭換氣時下巴滑動而非抬頭；一個泳鏡在水面下
  success_signal: 轉頭幅度小，感覺是身體帶動頭轉；呼吸不緊張
  failure_signal: 需要抬頭才能呼吸；轉回水中時憋氣感
  deficiency_fixes:
  - 1
  - 2
  source: There's a Drill for That
- id: Fr2
  name_en: Head Lead Balance – Face Down
  name_zh: 頭帶平衡 — 面朝下
  strokes:
  - freestyle
  category: balance
  equipment: []
  l_target:
  - L1
  abc_type: null
  purpose_zh: 建立面朝下的身體線條與平衡，感覺肺部入水帶動臀部上浮
  how_to:
  - 面朝下俯臥，雙手放在大腿前側，維持身體線條
  - 輕踢水保持穩定前進，放鬆肩頸，把肩膀往下壓讓頸部「拉長」
  - 視線朝池底，肺部與額頭當成一個整體往水裡壓，臀部會自然浮起
  - 這是建立姿勢的練習不是求快，輕踢、保持耐心
  perception_goal: 肺部往下壓水時臀部自然浮起；頸部長而放鬆；全身像一根漂浮的木材
  success_signal: 不需要用腿撐起臀部；視線自然朝向池底
  failure_signal: 臀部下沉；頸部緊繃；感覺在用力踢腿維持位置
  deficiency_fixes:
  - 3
  source: There's a Drill for That
- id: Fr3
  name_en: Head Lead Balance – On Your Side
  name_zh: 頭帶平衡 — 側躺
  strokes:
  - freestyle
  category: balance
  equipment: []
  l_target:
  - L1
  abc_type: null
  purpose_zh: 在45度側躺位置建立平衡感知，為旋轉打基礎
  how_to:
  - 側躺約45度，雙手放在大腿前側，肋骨收住穩定姿勢，視線朝池底
  - 輕踢水；想讓臀部更靠近水面時，把肺部、肩膀、頭當成一個整體往水裡壓
  - 左右兩側都練
  perception_goal: 45度角側躺穩定不搖晃；肺部往水裡壓；視線朝向池底
  success_signal: 不需要調整姿勢就能維持45度；臀部靠近水面
  failure_signal: 過度旋轉到90度；感覺在上坡踢水
  deficiency_fixes: []
  source: There's a Drill for That
- id: Fr4
  name_en: Head Lead Balance with Rotation
  name_zh: 頭帶平衡 + 旋轉
  strokes:
  - freestyle
  category: balance
  equipment: []
  l_target:
  - L1
  - L2
  abc_type: C
  purpose_zh: 結合雙側平衡，加入換氣旋轉，感覺身體帶動頭轉而非頭帶動身體
  how_to:
  - 從側躺位置開始，加入旋轉，每6到10次踢水從一側臀部翻轉到另一側
  - 旋轉由臀部底部發動，是快速的翻轉，搭配穩定緊湊的踢水
  - 加入換氣：頭轉到最小，靠身體旋轉帶起換氣，每三次旋轉換一次氣
  - 換氣後立刻回到平衡位置
  perception_goal: 旋轉從臀部啟動；頭轉量最小；回到水中立即找到平衡
  success_signal: 換氣後立刻回到另一側45度平衡；頭部像跟著身體走
  failure_signal: 抬頭換氣；旋轉後失去平衡需要調整
  deficiency_fixes:
  - 1
  - 2
  - 4
  - 5
  source: There's a Drill for That
- id: Fr5
  name_en: Superman Kick
  name_zh: 超人踢水
  strokes:
  - freestyle
  category: kick
  equipment: []
  l_target:
  - L1
  - L2
  abc_type: B
  purpose_zh: 手臂伸前的流線姿勢踢水，感覺收腹讓背部平坦，肺部壓水
  how_to:
  - 超人姿勢俯臥，雙臂向前伸直與肩同寬
  - 收小腹把背打平，頭部中立、頸與脊椎對齊、視線朝池底
  - 放鬆肩膀往下壓讓頸部拉長，肺部往水裡壓幫助臀部上浮
  - 在這姿勢下持續踢水
  perception_goal: 收腹後背部感覺平坦；肺部往水裡壓；頸部與脊椎對齊
  success_signal: 臀部靠近水面；踢水感覺從髖部啟動
  failure_signal: 背部拱起；踢水感覺只在膝蓋以下
  deficiency_fixes: []
  source: There's a Drill for That
- id: Fr6
  name_en: Arm Lead Balance or 6-Count
  name_zh: 手臂主導平衡（六拍）
  strokes:
  - freestyle
  category: balance
  equipment: []
  l_target:
  - L2
  - L3
  abc_type: null
  purpose_zh: 單臂伸前的側身平衡，感覺錨定不移動，平衡來自核心
  how_to:
  - 以右側躺開始，右臂在身體下方向前伸；左臂橫過身體、手放右臀上，手肘收緊貼身
  - 輕踢水，靠身體旋轉換氣（不抬頭），維持約45度、視線朝池底
  - 換邊：左臂前伸重複，踢10到20下再翻到另一側；前伸手錨定在水面下方、由核心維持平衡
  - 熟練後縮短到每側6次踢水；開始抓水時臀部立即啟動，划手與轉臀同步
  perception_goal: 前臂穩定不搖晃，感覺是核心在穩定身體，不是手臂在平衡
  success_signal: 切換側邊時流暢；髖部帶動旋轉感明顯
  failure_signal: 需要揮動手臂才能保持平衡；踢腿不穩定
  deficiency_fixes:
  - 4
  - 5
  - 10
  source: There's a Drill for That
- id: Fr7
  name_en: Streamline Kick
  name_zh: 流線踢水
  strokes:
  - freestyle
  category: kick
  equipment: []
  l_target:
  - L1
  - L2
  abc_type: B
  purpose_zh: 流線姿勢踢水（正面與背面），感覺踢水效率不依賴浮板
  how_to:
  - 仰躺streamline：收小腹「往上往內」把背打平，肺部往水裡壓
  - 膝蓋不破水面，腳掌把水「煮沸」而非大濺水，腳趾微內八，從臀部和大腿發力（不是膝蓋）
  - 俯臥streamline：同樣收小腹打平背，膝蓋只微彎、腳趾微伸，腳在水下煮沸水面
  - 需要時抬頭換氣，再回到streamline找平衡
  perception_goal: 踢水讓水面沸騰而非大飛濺；腳不出水面；膝蓋微彎
  success_signal: 身體線條穩定向前；沒有浮板也能維持位置
  failure_signal: 膝蓋大幅彎曲；水面大飛濺；感覺在蹬自行車
  deficiency_fixes:
  - 7
  source: There's a Drill for That
- id: Fr8
  name_en: Vertical Kick
  name_zh: 垂直踢水
  strokes:
  - freestyle
  category: kick
  equipment: []
  l_target:
  - L2
  - L3
  abc_type: B
  purpose_zh: 垂直踢水訓練從髖啟動的踢腿，消除自行車踢法
  how_to:
  - 在深水區直立踢水，先把雙手交叉放在對側肩膀上
  - 身體保持垂直挺直（不前傾不後仰），做10、20、30或60秒的組數
  - 進階：把手舉出水面（水球姿勢）；最難：雙臂上舉成streamline
  - 重點：從臀部發力、腳趾下壓、踢水穩定緊湊、腳微內八、核心收緊
  perception_goal: 踢水從腹股溝和大腿啟動；腳踝放鬆；踢水緊實短促
  success_signal: 身體在水中保持垂直；踢水不需要膝蓋大幅彎曲
  failure_signal: 身體前傾或後傾；需要很大的踢幅才能維持高度
  deficiency_fixes:
  - 7
  source: There's a Drill for That
- id: Fr9
  name_en: 360 Roll
  name_zh: 360度滾轉
  strokes:
  - freestyle
  category: balance
  equipment: []
  l_target:
  - L2
  - L3
  abc_type: C
  purpose_zh: 緩慢旋轉360度訓練核心控制，感覺身體從髖部以下整體旋轉
  how_to:
  - 從面朝下俯臥位置開始，在水中緩慢旋轉360度同時維持平衡
  - 穩定緊湊地踢水、核心收緊；先把手放大腿，在每個位置（面朝下、側躺、仰躺、另一側）短暫停留
  - 旋轉從臀部下方發動，肩膀到腳當成一個整體一起轉，雙腳併攏、腳趾下壓
  - 熟練後可加速並沿水道中線前進；再進階把手上舉成streamline，維持平背收肋
  perception_goal: 旋轉從臀部下方啟動；肩膀到腳像一個整體轉動；不用頭帶動旋轉
  success_signal: 在泳道中線保持直線旋轉；每個姿勢都能找到平衡
  failure_signal: 頭部帶動旋轉；漂離中線；旋轉不均勻
  deficiency_fixes:
  - 4
  - 5
  source: There's a Drill for That
- id: Fr10
  name_en: Sailboat
  name_zh: 帆船划手
  strokes:
  - freestyle
  category: arm
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 單臂高肘划水感知，強調錨定後整體旋轉推進，像用身體跳過手臂
  how_to:
  - 一手向前伸直（如左手），另一手剛離開水面、手肘高舉、指尖輕觸水面，以左臀約45度乘載
  - 踢幾下取得動力，前伸手開始抓水，沿直線用力推到臀部，過程中保持高手肘（EVF）
  - 感覺推水的推進與臀部滑開；左手推到底時右手前刺，換左手變成「帆」，像翻越到另一側
  - 抓水卡住時，手錨定後把肩膀略往內轉、手肘自然略外轉，幫助建立EVF；全程放慢
  perception_goal: 前臂垂直入水錨定後，感覺身體整個翻越過去；拉手配合髖旋轉
  success_signal: 每次划水都感覺到明確推力；換側流暢
  failure_signal: 拉水感覺在直臂往後推；旋轉和划手脫節
  deficiency_fixes:
  - 6
  - 11
  source: There's a Drill for That
- id: Fr11
  name_en: One Arm Stroke
  name_zh: 單臂划手
  strokes:
  - freestyle
  category: arm
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 單臂划手強調早期入水捕水，感覺核心同時帶動換氣與划手旋轉
  how_to:
  - 單手自由式，朝非划手側換氣；另一手貼身、手放大腿
  - 用臀部轉到兩側45度，換氣時不過度旋轉；抓水要早、靠近水面開始
  - 抓水時手肘略往上往外轉、位置高於手掌；一趟練一手，下一趟換手
  - 重點是技術不是速度，靠核心同時帶動軀幹與划手完成換氣，快速換氣後盡快回到面朝下視線朝池底
  - 進階：改成朝划手側換氣
  perception_goal: 捕水發生在水面附近而非深處；感覺肘部比手高
  success_signal: 換氣自然，不需要額外用力抬頭；每側都能流暢完成
  failure_signal: 捕水太深；換氣需要額外抬頭；一側比另一側困難很多
  deficiency_fixes:
  - 1
  - 2
  - 5
  - 6
  - 7
  - 11
  source: There's a Drill for That
- id: Fr12
  name_en: Fingertip Dribble
  name_zh: 指尖拖水
  strokes:
  - freestyle
  category: arm
  equipment: []
  l_target:
  - L3
  abc_type: A
  purpose_zh: 恢復臂高肘訓練，感覺手指輕掠水面，肘部始終高於手腕
  how_to:
  - 自由式划手回臂時，指尖輕輕掠過水面（用指甲輕擦水面）
  - 全程保持手肘高於手腕，帶出高手肘與指尖入水
  - 放慢游，回臂的手盡量放鬆，並把每一划保持伸長
  perception_goal: 手指輕輕刮過水面；手臂放鬆；肘部保持高位
  success_signal: 指尖留下清晰水跡；入水時指尖先入
  failure_signal: 手掌整個接觸水面；肘部比手低
  deficiency_fixes:
  - 9
  - 12
  source: There's a Drill for That
- id: Fr13
  name_en: Trace The Line
  name_zh: 描黑線
  strokes:
  - freestyle
  category: arm
  equipment: []
  l_target:
  - L2
  - L3
  abc_type: A
  purpose_zh: 視覺回饋修正手部入水過中線，感覺入水點在肩膀正前方偏外
  how_to:
  - 沿水道中央游，能看到池底黑線
  - 用手「描」黑線外緣：左手描黑線左側、右手描右側（線細就描外側幾吋）
  - 此練習可暫時抬眼看入水點對照黑線；讓入水落在肩膀正前方或略外側
  perception_goal: 入水點對準黑線外緣；不穿越身體中線；視線往下看線
  success_signal: 兩手分別對準黑線兩側外緣
  failure_signal: 手入水時穿越中線；感覺兩手快要碰到
  deficiency_fixes:
  - 3
  - 8
  - 13
  source: There's a Drill for That
- id: Fr14
  name_en: Skating Underwater or Underwater Recovery
  name_zh: 水下溜冰（水下恢復臂）
  strokes:
  - freestyle
  category: arm
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 水下恢復臂強調捕水發生在水面附近，感覺手在水下「溜冰」
  how_to:
  - 此練習刻意看前方（臉仍在水中），看著自己抓水
  - 划手回臂走水下而非水面上方，抓水保持在接近水面處
  - 同時專注抓水與轉體，水下回臂時感覺手像在「滑冰」
  - 划到臀部（不是肚臍）
  perception_goal: 恢復臂在水下移動時感覺水壓輕輕托著；捕水就在水面附近
  success_signal: 手部在水下移動流暢，沒有明顯阻力感
  failure_signal: 恢復臂造成很大阻力感；捕水點明顯太深
  deficiency_fixes:
  - 13
  source: There's a Drill for That
- id: Fr15
  name_en: Superman Catch up
  name_zh: 超人趕上
  strokes:
  - freestyle
  category: arm
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 前伸等待訓練捕水錨定與肩髖旋轉，感覺拉手時髖部同步旋轉
  how_to:
  - 超人姿勢俯臥，雙臂前伸與肩同寬、肺部往水裡壓
  - 一手划水，划完後該手停在前方，等另一手划過來「會合」，會合後才開始下一划
  - 雙手在前方保持與肩同寬（不互碰），搭配穩定輕鬆的踢水
  - 抓水錨定在接近水面處並從那裡開始划，搭配臀部旋轉
  perception_goal: 拉手起始於水面附近的錨定；感覺髖部在拉手時同步轉動
  success_signal: 兩手相遇時肩寬距離，不碰觸；每趟推進距離長
  failure_signal: 雙手觸碰或交叉；不感覺到髖旋轉；入水點太近
  deficiency_fixes:
  - 6
  - 10
  - 11
  source: There's a Drill for That
- id: Fr16
  name_en: Fist Freestyle
  name_zh: 握拳划手
  strokes:
  - freestyle
  category: arm
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 握拳划手強調前臂在拉水中的作用，感覺張開手後壓力明顯增加
  how_to:
  - 第一趟握拳游自由式，感覺前臂在划水時的工作
  - 記得前臂、手腕、手掌是一個整體；把划手伸長帶出旋轉，入水保持寬（不越過中線）
  - 下一趟從握拳開始，逐漸把手張開到正常位置
  perception_goal: 握拳時感覺前臂在做工；張開手後感覺明顯的水壓增加
  success_signal: 握拳游也能前進；開手後推力明顯增強
  failure_signal: 握拳時幾乎無法前進（代表只靠手掌划水）
  deficiency_fixes:
  - 13
  source: There's a Drill for That
- id: Fr17
  name_en: Triple Touch
  name_zh: 三點觸碰
  strokes:
  - freestyle
  category: arm
  equipment: []
  l_target:
  - L2
  - L3
  abc_type: A
  purpose_zh: 訓練恢復臂軌跡，前觸-後觸-前入水，感覺恢復臂的完整弧線
  how_to:
  - 超人姿勢俯臥，雙臂平衡在前方
  - 左臂不動，右臂划過水到回到前方點一下水面到往後伸點一下水面到立刻盪回前方停住
  - 換左臂做同一循環（前點、後點、前點），再換邊
  perception_goal: 肘部在整個恢復過程中保持高位；感覺手臂畫一個大弧線
  success_signal: 三個觸碰點清晰；肘部不下垂
  failure_signal: 無法完成後觸（代表肘部下沉）；動作卡頓
  deficiency_fixes:
  - 12
  source: There's a Drill for That
- id: Fr18
  name_en: Suspended Hand
  name_zh: 懸空手
  strokes:
  - freestyle
  category: balance
  equipment:
  - fins
  l_target:
  - L3
  - L4
  abc_type: C
  purpose_zh: 恢復臂懸在水面10拍再入水，訓練核心與踢水在沒有手臂帶動時的穩定
  how_to:
  - （初學可穿蛙鞋）游自由式時，回臂的手懸停在水面正上方、保持10次踢水再入水
  - 此時另一手在前方靜止、停在水面稍下
  - 核心收緊、雙腳併攏穩定踢水，把臀部維持在接近水面；變強後改不穿蛙鞋
  perception_goal: 核心緊繃讓臀部靠近水面；踢水穩定均勻；不依賴手臂入水恢復平衡
  success_signal: 懸空期間身體線條穩定；不感覺要下沉
  failure_signal: 腿部分開或停止踢水；臀部下沉；等不到10拍就需要入水
  deficiency_fixes:
  - 4
  - 5
  source: There's a Drill for That
- id: Fr19
  name_en: Water Polo Free
  name_zh: 水球式自由式
  strokes:
  - freestyle
  category: arm
  equipment: []
  l_target:
  - L3
  abc_type: null
  purpose_zh: 抬頭游訓練寬捕水與直線拉水，感覺頭部靜止不動
  how_to:
  - 抬頭自由式，抓水寬（從肩膀正前方出手），視線看向池道盡頭、頭部固定不動
  - 以半趟為單位，做完把頭放下游一般自由式
  - 划手時頭鎖定不左右擺，划水路線對齊臀部（不往肚臍方向）
  perception_goal: 入水點在肩膀正外側；拉水對準髖部；頭部完全靜止
  success_signal: 頭部不左右晃動；推力感覺對準髖部而非肚臍
  failure_signal: 頭部跟著划手轉動；感覺拉向肚臍
  deficiency_fixes:
  - 4
  - 6
  - 13
  source: There's a Drill for That
- id: Fr20
  name_en: Golf
  name_zh: 高爾夫計分
  strokes:
  - freestyle
  category: timing
  equipment: []
  l_target:
  - L4
  - L5
  abc_type: null
  purpose_zh: 以划水次數+時間的總分訓練每划距離，找到個人最佳節奏
  how_to:
  - 游四趟50公尺自由式（不穿蛙鞋最佳），每趟記下划手次數與秒數
  - 把划手數加上秒數得到「高爾夫分數」（例：40秒加42划等於82）
  - 接下來三趟設法降低這個分數（同時減少划手數與時間）
  - 透過多次練習找到自己「每划距離」與速度之間的最佳平衡
  perception_goal: 感覺每一划都有明確推力；找到划頻與划距的平衡點
  success_signal: 每趟50的總分持續下降；時間和划次都有改善
  failure_signal: 總分無法下降；划次少了但時間差很多（過度滑行）
  deficiency_fixes:
  - 15
  source: There's a Drill for That
- id: Fr21
  name_en: Quiet Hand Entry
  name_zh: 靜音入水
  strokes:
  - freestyle
  category: arm
  equipment: []
  l_target:
  - L4
  - L5
  abc_type: A
  purpose_zh: 靜音入水訓練手部滑入水而非拍打水面，感覺手指穿過一個洞前臂跟進
  how_to:
  - 放慢游自由式，留意手的入水
  - 入水點在肩膀正前方（寬入水），指尖先入；安靜地把手滑進水裡，再略微向前滑行
  - 想像手在水面開一個洞，前臂與肩膀順著同一個洞跟進，方向是向前滑（不往下也不往內）
  - 入水同時感覺那一側臀部往水裡轉下
  perception_goal: 入水幾乎無聲；感覺手先開一個洞，前臂和肩膀順著滑入；同側髖往下旋
  success_signal: 完全靜音入水；沒有水花
  failure_signal: 入水有聲音和水花；感覺在打水
  deficiency_fixes:
  - 14
  source: There's a Drill for That
- id: Fr22
  name_en: No Bubbles
  name_zh: 無氣泡
  strokes:
  - freestyle
  category: arm
  equipment: []
  l_target:
  - L4
  - L5
  abc_type: A
  purpose_zh: 觀察入水後氣泡量訓練延伸與阻力最小化，氣泡少代表手部前伸充分
  how_to:
  - 延續安靜入水的感覺，滑進那個「洞」後，注意開始抓水時手上產生的氣泡量
  - 設法減少氣泡：盡量把手與手臂往前延伸（延伸來自臀部旋轉）
  - 此練習需短暫抬頭看手，僅限此練習使用
  perception_goal: 入水後手部繼續延伸直到幾乎沒有氣泡；感覺髖旋轉帶動延伸
  success_signal: 抬頭查看時氣泡極少；兩側氣泡量接近
  failure_signal: 大量氣泡（代表延伸不足）；一側氣泡比另一側多很多
  deficiency_fixes:
  - 14
  source: There's a Drill for That
- id: Fr23
  name_en: 3 & Glide
  name_zh: 三划滑行
  strokes:
  - freestyle
  category: timing
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: C
  purpose_zh: 三划後45度滑行10拍，感覺核心在沒有划水時維持身體線條
  how_to:
  - 游3划自由式，第三划時把手留在前方，邊踢水邊滑行數到10
  - 每三划會交替在不同側滑行
  - 滑行時身體約45度乘載在臀部上，視線朝池底
  perception_goal: 滑行時45度穩定；感覺核心在支撐姿勢；視線朝池底
  success_signal: 每次滑行都在不同側（對側交替）；姿勢穩定
  failure_signal: 滑行時過度旋轉到90度；核心放鬆後身體下沉
  deficiency_fixes:
  - 1
  - 2
  - 4
  - 5
  source: There's a Drill for That
- id: Fr24
  name_en: Russian Rollover
  name_zh: 俄式滾轉
  strokes:
  - freestyle
  - backstroke
  category: timing
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 自由式和仰式交替游，感覺兩式捕水動作的相似性，用核心旋轉切換
  how_to:
  - 交替游仰式和自由式，用單雙數組合：3划自由式到翻身到2划仰式到翻回到再3划自由式
  - 單雙數組合可避免暈眩，並練到兩側的抓水
  - 翻身時把前伸手錨定、確實抓住水，留意仰式與自由式的抓水其實相似
  perception_goal: 翻轉時前臂錨定不動，感覺抓住水；自由式和仰式的捕水角度相似
  success_signal: 翻轉流暢；每次切換時感覺到明確的錨定
  failure_signal: 翻轉時失去平衡；看不出兩式捕水的共通感
  deficiency_fixes:
  - 5
  - 11
  source: There's a Drill for That
- id: Bk1
  name_en: Streamlined Kick on Back
  name_zh: 仰式流線踢水
  strokes:
  - backstroke
  category: kick
  equipment: []
  l_target:
  - L1
  - L2
  abc_type: B
  purpose_zh: 流線姿勢仰面踢水，感覺肺部往水裡壓，臀部自然上浮
  how_to:
  - 先建立好streamline：雙臂盡量伸直貼在耳後、雙手交疊拇指互扣，手臂與耳朵間縫隙最小，收小腹打平下背、腳趾下壓
  - 仰躺在這個streamline下打水，腳微內八、腳趾下壓、從臀部發力、節律穩定，膝蓋不破水面
  - 肺部往水裡壓幫助臀部上浮，全程維持緊湊的streamline
  perception_goal: 肺部壓水後臀部感覺被托起；腳踝放鬆稍微內八；踢水讓水面沸騰
  success_signal: 膝蓋不出水面；踢水節奏穩定不快不慢
  failure_signal: 臀部下沉；膝蓋大幅出水（自行車踢）
  deficiency_fixes:
  - 5
  - 6
  source: There's a Drill for That
- id: Bk2
  name_en: Flutter Kick Cross
  name_zh: 交叉手踢水
  strokes:
  - backstroke
  category: kick
  equipment: []
  l_target:
  - L1
  abc_type: null
  purpose_zh: 手交叉放胸口踢水，感覺肺部壓水讓臀部上浮，頭部線條對齊
  how_to:
  - 仰躺踢水，雙手交叉抱胸（手在對側肩成X形），把重心放胸口、肺部往下壓水
  - 頸與脊椎對齊，眼睛看向天空，把後腦、肩膀的T點與脊椎壓進水裡讓臀部上浮
  - 大部分臉露出水面（水線在眼睛上方、嘴唇下方）
  - 進階：額頭放一個小物（紙杯或拿掉頭帶的泳鏡），整趟讓它留在額頭上
  perception_goal: 手交叉壓在胸口讓重心往前；水面在眉毛和嘴唇之間；頸部與脊椎對齊
  success_signal: 臉部碗狀區域（眉毛到嘴唇）保持乾燥；感覺漂浮穩定
  failure_signal: 水淹過臉；感覺頭部太低或太高
  deficiency_fixes:
  - 1
  - 2
  - 13
  source: There's a Drill for That
- id: Bk3
  name_en: Board Down Kick
  name_zh: 浮板壓腿踢水
  strokes:
  - backstroke
  category: kick
  equipment:
  - kickboard
  l_target:
  - L2
  abc_type: B
  purpose_zh: 浮板壓在大腿上踢水，浮板不動代表踢法正確，訓練從髖啟動的踢腿
  how_to:
  - 仰躺踢水，把浮板壓在大腿與膝蓋上方
  - 目標是踢水時讓浮板保持不動
  perception_goal: 膝蓋不碰浮板；感覺踢水發力點在大腿和髖部；腳踝靈活
  success_signal: 浮板保持靜止；踢水穩定前進
  failure_signal: 浮板彈跳（代表膝蓋或大腿在碰板）
  deficiency_fixes:
  - 7
  source: There's a Drill for That
- id: Bk4
  name_en: Head Lead Balance Kick on Side
  name_zh: 頭帶側身平衡踢水
  strokes:
  - backstroke
  category: balance
  equipment: []
  l_target:
  - L1
  abc_type: null
  purpose_zh: 側躺45度踢水，感覺手放大腿時的平衡來自核心
  how_to:
  - 側躺踢水，雙手放大腿上（像插進牛仔褲前口袋）
  - 側躺到對側肩膀剛好離開水面，眼睛盯著那個肩膀，角度約45度（不到90度）
  - 收小腹打平背，踢水緊湊、從臀部發力、腳趾下壓
  - 游到一半換邊
  perception_goal: 45度側躺穩定；視線鎖定上方肩膀；核心維持平背
  success_signal: 不過度旋轉到90度；臀部靠近水面
  failure_signal: 旋轉到90度；感覺在上坡
  deficiency_fixes:
  - 3
  - 4
  source: There's a Drill for That
- id: Bk5
  name_en: Head Lead Balance Kick with Rotation
  name_zh: 頭帶平衡旋轉踢水
  strokes:
  - backstroke
  category: balance
  equipment: []
  l_target:
  - L1
  - L2
  abc_type: C
  purpose_zh: 加入旋轉的側身踢水，感覺從臀部下方發動旋轉，頭部鎖定不動
  how_to:
  - 從側躺位置開始，每6到10次踢水左右翻轉一次
  - 頭鎖定在中立位置，旋轉全程踢水保持穩定
  - 旋轉從臀部下方發動，肩膀到腳當成一個整體一起轉；做對時旋轉瞬間肩膀會稍微露出水面
  - 每次翻轉後盡快找到平衡
  perception_goal: 旋轉從臀部以下啟動；肩膀旋轉時稍微出水；頭部完全靜止
  success_signal: 旋轉時肩膀自然出水；每次切換都能快速找回平衡
  failure_signal: 頭部跟著身體搖晃；旋轉後踢水停止
  deficiency_fixes:
  - 3
  - 4
  source: There's a Drill for That
- id: Bk6
  name_en: Superman Kick
  name_zh: 超人仰式踢水
  strokes:
  - backstroke
  category: kick
  equipment: []
  l_target:
  - L1
  - L2
  abc_type: null
  purpose_zh: 雙臂後伸超人姿勢踢水，前臂和手出水面，感覺入水前的身體對齊
  how_to:
  - 仰躺踢水，雙臂向後伸過頭成「超人」姿勢（非streamline），前臂與手保持露出水面
  - 收肋維持正確姿勢
  - 這是手以小指先入水前要保持的身體線條
  perception_goal: 感覺身體像要小指先入水的對齊位置；核心緊繃維持線條
  success_signal: 身體線條穩定；前臂輕鬆出水不緊張
  failure_signal: 身體下沉；無法維持雙臂後伸姿勢
  deficiency_fixes:
  - 10
  source: There's a Drill for That
- id: Bk7
  name_en: Vertical Flutter Kick
  name_zh: 垂直仰式踢水
  strokes:
  - backstroke
  category: kick
  equipment: []
  l_target:
  - L2
  - L3
  abc_type: B
  purpose_zh: 垂直踢水模擬仰式旋轉節律，消除自行車踢法
  how_to:
  - 在深水區直立踢水，雙手交叉放對側肩膀
  - 每三次踢水旋轉一次，模擬仰式的旋轉節奏；身體保持垂直挺直（不前傾不後仰）
  - 做10、20、30或60秒組數；進階把手舉出水面（水球姿勢）；最難：雙臂上舉成streamline
  - 重點：從臀部發力、腳趾下壓、踢水穩定緊湊、腳微內八
  perception_goal: 踢水從髖部啟動；每三拍旋轉模擬仰式節律；腳踝放鬆內八
  success_signal: 垂直踢水能維持頭部出水；踢水小而緊實
  failure_signal: 需要大踢幅才能維持；膝蓋大幅彎曲
  deficiency_fixes:
  - 4
  - 5
  - 7
  source: There's a Drill for That
- id: Bk8
  name_en: Arm Lead Balance
  name_zh: 手臂主導平衡
  strokes:
  - backstroke
  category: balance
  equipment: []
  l_target:
  - L2
  - L3
  abc_type: null
  purpose_zh: 單臂伸後側身踢水，感覺前臂面向池底穩定不移動，平衡來自核心
  how_to:
  - 側躺，右臂向後伸直、左手放大腿上，視線略帶角度看向左肩
  - 收肋，前伸手掌心朝池底、對齊池畔成一直線
  - 讓前伸手穩定不晃（收肋打平背能幫助穩定）
  perception_goal: 伸後的手掌面向池底且穩定；感覺核心在維持側身姿勢
  success_signal: 手掌不飄移；身體45度穩定
  failure_signal: 手掌飄移（代表核心姿勢有問題）；身體過度旋轉
  deficiency_fixes:
  - 6
  source: There's a Drill for That
- id: Bk9
  name_en: Alternating Arm Lead
  name_zh: 交替手臂主導
  strokes:
  - backstroke
  category: balance
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 每10拍旋轉切換側身，感覺臀部帶動旋轉、前臂錨定帶動身體旋轉
  how_to:
  - 從側躺開始，每10次踢水翻轉到另一側
  - 旋轉從臀部底部發動；前伸手把手肘稍微往上轉設定錨點，讓背與臀部連動
  - 旋轉時讓身體與手臂連動；在手入水前就先轉到另一側，以小指先入水
  perception_goal: 旋轉從臀部下方啟動；前臂在水下時感覺輕微錨定；小指先入水
  success_signal: 下到對側後才讓手入水；旋轉感覺強勁
  failure_signal: 手先入水再旋轉（順序反了）；感覺平游而非旋轉
  deficiency_fixes:
  - 3
  - 4
  - 10
  source: There's a Drill for That
- id: Bk10
  name_en: Head Lead Balance with 1/4 Arm Lifts
  name_zh: 頭帶平衡＋四分之一抬臂
  strokes:
  - backstroke
  category: timing
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: null
  purpose_zh: 旋轉時每次抬手臂1/4高度，感覺手臂恢復與身體旋轉的時機
  how_to:
  - 仰躺踢水，雙手放身側，每約6次踢水左右翻轉
  - 轉到右臀時把左手抬起約30度（完整回臂的四分之一）；轉到左臀時換右手同樣抬起
  - 藉此感覺回臂啟動與身體旋轉的時機配合
  perception_goal: 旋轉到右側時感覺左手開始抬起；時機自然流暢
  success_signal: 手臂抬起與旋轉時機吻合，感覺有連動感
  failure_signal: 手臂抬起和旋轉分離，感覺是兩個獨立動作
  deficiency_fixes:
  - 8
  source: There's a Drill for That
- id: Bk11
  name_en: Catch Up Backstroke
  name_zh: 仰式趕上
  strokes:
  - backstroke
  category: timing
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: null
  purpose_zh: 兩手在天空位置相遇，訓練平衡、踢水與核心協同
  how_to:
  - 仰式趕上：雙手在「指天」位置會合後才開始下一划
  - 用力把肺部往水裡壓、快速踢水維持臉部在水面上
  - 這主要是踢水與平衡練習，重點放在踢水和身體平衡
  perception_goal: 肺部壓水；踢水快速穩定才不會水淹臉；感覺核心支撐
  success_signal: 雙手在天空位置相遇時臉部不被淹
  failure_signal: 等待時水蓋過臉；踢水太慢
  deficiency_fixes:
  - 6
  source: There's a Drill for That
- id: Bk12
  name_en: Double Arm Backstroke
  name_zh: 雙臂同步仰式
  strokes:
  - backstroke
  category: arm
  equipment: []
  l_target:
  - L2
  - L3
  abc_type: A
  purpose_zh: 雙臂同時划水修正過度後伸越過中線，感覺手臂對齊肩膀舉起
  how_to:
  - 雙臂同時划仰式
  - 手臂舉過頭往後時，讓雙臂與肩膀對齊（想像球賽得分後雙手上舉慶祝的寬度）
  - 用來重設划手的肌肉記憶，特別是手臂在頂端越過中線或往後伸太遠時
  perception_goal: 雙臂上舉時感覺像慶祝射門；手臂對齊肩膀不越過中線
  success_signal: 兩手對稱且對齊肩膀；背部感覺舒適
  failure_signal: 手超過中線；一側比另一側難
  deficiency_fixes:
  - 9
  source: There's a Drill for That
- id: Bk13
  name_en: One Arm Stroke
  name_zh: 單臂仰式
  strokes:
  - backstroke
  category: arm
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 單臂划手訓練核心旋轉，感覺拉水到「腳邊」同時肩膀出水
  how_to:
  - 從側躺位置開始（右臂向後伸、左手放大腿），只用右臂划水
  - 背打平、由核心帶動旋轉，轉到左肩能露出水面（約45度）
  - 找到把手肘收近身體、像「往腳的方向丟東西」的施力點；換邊用左臂
  perception_goal: 划手時感覺肘部貼近身體，像往腳方向丟東西；對側肩膀出水
  success_signal: 旋轉幅度45度（肩膀出水但不到90度）
  failure_signal: 過度旋轉到90度；拉水感覺直臂往下
  deficiency_fixes:
  - 11
  source: There's a Drill for That
- id: Bk14
  name_en: L Drill
  name_zh: L形鑽
  strokes:
  - backstroke
  category: timing
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 一臂指天一臂在水下後方，每15-20拍旋轉切換，感覺錨定帶動全身旋轉
  how_to:
  - 一手指向天空、一手在水下身後（掌心朝池底），踢水15到20下
  - 然後同時：水下手划水、空中手向後盪、身體當成一個整體轉到該側，讓盪下的手落到身後水中，另一手換成指天
  - 手向後掃時提早從臀部啟動旋轉，落到平衡線上、掌心朝池底收尾
  - 每次翻轉盡快找到平衡點
  perception_goal: 下方手錨定水中，感覺借力旋轉；上方手的重量讓旋轉更有力
  success_signal: 旋轉時感覺身體整體翻過去，不是手臂拉著身體
  failure_signal: 手臂被身體夾住；旋轉感覺費力
  deficiency_fixes:
  - 3
  - 8
  - 15
  source: There's a Drill for That
- id: Bk15
  name_en: Switching L
  name_zh: 快速L形切換
  strokes:
  - backstroke
  category: timing
  equipment: []
  l_target:
  - L4
  - L5
  abc_type: A
  purpose_zh: L形快速切換（6-10拍），感覺節律加快時頭部保持完全靜止
  how_to:
  - 用L形動作，但把間隔從15到20次踢水縮短到6到10次
  - 從臀部旋轉（不是上半身），讓盪下的手順順地接回到划手頂端
  - 頭部保持完全靜止（不轉不側移），踢水小而緊湊、不停止
  - 從L形落水的手以小指先入水
  perception_goal: 頭部完全靜止；旋轉從臀部發動；踢水不間斷
  success_signal: 頭部零晃動；切換流暢有節律
  failure_signal: 頭部跟著旋轉；踢水停頓
  deficiency_fixes:
  - 2
  - 3
  - 8
  - 13
  source: There's a Drill for That
- id: Bk16
  name_en: Switching L to Regular Backstroke
  name_zh: L形切換接正式仰式
  strokes:
  - backstroke
  category: timing
  equipment: []
  l_target:
  - L4
  - L5
  abc_type: null
  purpose_zh: L形切換接正常仰式，觀察兩者的感知差異，感覺小指入水時已在側身
  how_to:
  - 先做半趟快速L切換，再轉成正式仰式
  - 把胸口往水裡帶，讓腿和臀部平衡在水面（胸口壓住能保持身體平直）
  - 正式划水時感覺像一根桿子穿過水：頭部靜止、踢水小而緊湊、從臀部旋轉、在小指入水前先轉到該側
  perception_goal: 正式仰式時感覺像一根棒子穿水；小指入水前已旋轉到位
  success_signal: 切換到正式仰式後保持旋轉感和頭部靜止
  failure_signal: 正式仰式比L形費力；胸部太高背部拱起
  deficiency_fixes:
  - 10
  source: There's a Drill for That
- id: Bk17
  name_en: Pause Point
  name_zh: 暫停點
  strokes:
  - backstroke
  category: timing
  equipment: []
  l_target:
  - L4
  - L5
  abc_type: null
  purpose_zh: 旋轉到45度暫停，感覺髖部帶動划手而非背部打平游
  how_to:
  - 把L形降到約45度並停在那裡，當作「暫停點」
  - 一趟旋轉幾次（25公尺約4到6次），每次翻轉都在45度暫停點停住，讓自己乘載在臀部上
  - 進階：在暫停點停約2秒再繼續，換到另一側同樣停；感受核心旋轉的力量
  - 再進階把暫停縮到極短，最後完全移除暫停，划手之間略有重疊、流暢有力
  perception_goal: 每次旋轉都暫停在45度位置；感覺核心力量支撐暫停姿勢
  success_signal: 暫停時身體不搖晃；感覺旋轉有「卡位」感
  failure_signal: 無法找到45度暫停點；感覺只是在平游加手臂
  deficiency_fixes:
  - 3
  source: There's a Drill for That
- id: Bk18
  name_en: Sky Point
  name_zh: 指天
  strokes:
  - backstroke
  category: kick
  equipment: []
  l_target:
  - L4
  - L5
  abc_type: B
  purpose_zh: 一臂指天踢水，感覺踢水必須支撐指天手臂的重量，增強踢水耐力
  how_to:
  - 一手出水、在肩膀上方90度指向天空，另一手在水下身側
  - 朝水下手那側乘載踢6到10下，再翻轉到另一側
  - （初學可先做較簡單的L形鑽）
  perception_goal: 感覺踢水在支撐指天手臂；旋轉時重心轉移
  success_signal: 踢水穩定不間斷；旋轉時上身不沉
  failure_signal: 無法維持指天姿勢；踢水停頓
  deficiency_fixes:
  - 4
  source: There's a Drill for That
- id: Bk19
  name_en: Fist Swimming
  name_zh: 握拳仰式
  strokes:
  - backstroke
  category: arm
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 握拳仰式感覺前臂在拉水中的貢獻，開手後感覺手部壓力增加
  how_to:
  - 握拳游仰式，感覺前臂在划水中的工作
  - 前臂與手是一個整體；握拳時用前臂掌側壓水
  - 同時調整划水角度，找到把手肘收近身體、像「往腳的方向丟東西」的施力點
  - 換回張開手時，留意手上水壓的差別，划水全程用手掌抓住水
  perception_goal: 握拳時感覺前臂在做工；找到肘部收近身體時的「甜蜜點」
  success_signal: 開手後推進力明顯增強
  failure_signal: 握拳時幾乎無法前進（代表只靠手掌）
  deficiency_fixes:
  - 11
  source: There's a Drill for That
- id: Bk20
  name_en: Russian Rollover
  name_zh: 俄式滾轉（仰式）
  strokes:
  - backstroke
  - freestyle
  category: timing
  equipment: []
  l_target:
  - L3
  - L4
  abc_type: A
  purpose_zh: 仰式與自由式交替游，感覺兩式捕水的共通性，同時訓練轉身第一步
  how_to:
  - 交替游仰式和自由式（兩者都是長軸轉動）：先4划仰式，順順翻身，再3划自由式
  - 只在仰式時換氣；每次翻身把前伸手留在原位幫助對齊與平衡
  - 用單雙數組合（4-3、3-4、2-5），練到兩側的錨定，也避免暈眩
  perception_goal: 翻轉時前臂錨定；仰式換氣，自由式不換氣；感覺長軸連貫
  success_signal: 翻轉流暢；每次切換都能找到捕水感
  failure_signal: 翻轉時方向感混亂；感覺完全是兩個不同動作
  deficiency_fixes: []
  source: There's a Drill for That
- id: Bk21
  name_en: Three & Glide
  name_zh: 三划滑行（仰式）
  strokes:
  - backstroke
  category: timing
  equipment: []
  l_target:
  - L3
  abc_type: null
  purpose_zh: 三划後滑行，感覺核心在支撐仰式姿勢，踢水維持位置
  how_to:
  - 游3划正式仰式，第三划時保持滑行、那隻手向後伸過頭，踢6到8下
  - 最後一下踢水時翻到另一側臀部與肩膀，再划3划、滑行、踢6到8下、翻邊
  - 變強後把滑行的踢水減到3下，最後接到每一划都帶滾轉的正式仰式
  perception_goal: 滑行時身體線條穩定；感覺核心支撐而非手臂
  success_signal: 滑行期間不下沉；踢水節奏不變
  failure_signal: 滑行時立刻開始下沉
  deficiency_fixes: []
  source: There's a Drill for That
- id: Bk22
  name_en: Goggle Balance
  name_zh: 泳鏡平衡
  strokes:
  - backstroke
  category: balance
  equipment:
  - small_object
  l_target:
  - L1
  - L2
  abc_type: null
  purpose_zh: 在額頭放小物品踢水，物品不掉代表頭部對齊正確
  how_to:
  - 把泳鏡取下放在額頭上游仰式
  - 目標是整趟讓泳鏡留在額頭上，藉此維持頭部完全靜止
  perception_goal: 感覺頭部完全靜止；頸部不緊張；視線直視天花板
  success_signal: 游完一趟小物品仍在額頭上
  failure_signal: 小物品掉落（代表頭部在移動或位置不對）
  deficiency_fixes:
  - 1
  - 2
  - 13
  source: There's a Drill for That
- id: Bk23
  name_en: Spin
  name_zh: 高速仰式
  strokes:
  - backstroke
  category: timing
  equipment: []
  l_target:
  - L5
  abc_type: null
  purpose_zh: 高划頻仰式訓練手臂加速入水時機，感覺節律和加速
  how_to:
  - 刻意採較「坐」在水裡的身體姿勢，手臂盡可能快速轉動、用力踢水
  - 只做12到13碼就轉成非常輕鬆的仰式
  - 重複2到3次後，再游一趟快節奏仰式
  - （新手建議等仰式較成熟再做）
  perception_goal: 感覺每次手臂入水帶來加速；節律緊湊
  success_signal: 高划頻下仍能維持旋轉和線條
  failure_signal: 划頻提高後旋轉消失；身體打平
  deficiency_fixes:
  - 14
  source: There's a Drill for That
- id: Bk24
  name_en: Backstroke Pull
  name_zh: 仰式拉力板
  strokes:
  - backstroke
  category: arm
  equipment:
  - pull_buoy
  l_target:
  - L4
  - L5
  abc_type: A
  purpose_zh: 拉力板純手練習，感覺旋轉對拉水的影響和手臂對齊肩膀
  how_to:
  - 夾pull buoy游仰式，完全不踢水
  - 更用力地從臀部下方旋轉、肩膀與身體當成一個整體
  - 讓手入水落在肩膀正前方或略外側（對齊肩膀有助順利旋轉）
  - 進階可改夾浮板代替pull buoy
  perception_goal: 感覺肩髖旋轉增強拉水力量；手臂對齊不越過中線
  success_signal: 拉水有明確推力；旋轉感覺在做功
  failure_signal: 拉水感覺虛弱；感覺在平推水
  deficiency_fixes:
  - 3
  - 9
  - 11
  source: There's a Drill for That
- id: Bk25
  name_en: Accelerated Hand Strike
  name_zh: 加速入水
  strokes:
  - backstroke
  category: arm
  equipment: []
  l_target:
  - L4
  - L5
  abc_type: A
  purpose_zh: 強調手臂積極快速入水，感覺加速帶來的推力增加
  how_to:
  - 像單臂仰式一樣，但在手入水並划水時加速
  - 回臂可放慢放鬆、拇指朝上出水
  - 當手指向天空時開始加速，以小指先入水，並在整個水下划水中持續加速
  perception_goal: 手入水時感覺加速；小指先入；不是柔和輕放
  success_signal: 入水有積極感；推力明顯
  failure_signal: 入水猶豫輕柔；缺乏加速感
  deficiency_fixes:
  - 10
  - 12
  - 14
  source: There's a Drill for That
- id: Bk26
  name_en: Lane Line Pull
  name_zh: 水線輔助拉水
  strokes:
  - backstroke
  category: arm
  equipment:
  - lane_line
  l_target:
  - L3
  abc_type: A
  purpose_zh: 手拉泳道浮水線感受仰式捕水角度，訓練早期捕水
  how_to:
  - 貼著水線游仰式，用指尖抓住水線、把身體拉過手（僅限此練習，比賽不可）
  - 另一手正常划，並模仿在水線上感覺到的彎臂划水；回程換邊用另一手
  - 抓到感覺後，只在水線上划2到3次建立肌肉記憶，再離開水線游仰式，專注彎臂划水、手肘收近身體
  - 手一入水就立刻開始抓水
  perception_goal: 感覺手在水線上錨定的角度；確認捕水發生在正確位置
  success_signal: 能找到感覺最有力的捕水角度
  failure_signal: 拉水位置沒有「掛住」的感覺
  deficiency_fixes:
  - 15
  source: There's a Drill for That
- id: Br1
  name_en: Wall Kicks
  name_zh: 牆邊蛙式腿
  strokes:
  - breaststroke
  category: kick
  equipment: []
  l_target:
  - L2
  abc_type: B
  purpose_zh: 貼牆練習收腿，感覺大腿後側和腹部發力而非膝蓋前推
  how_to:
  - 在深水區貼著池壁，臉、胸、髖、膝盡量貼牆（雙手放在溢水槽或池畔），腳趾下壓
  - 把腳跟往臀部收，過程中髖部保持貼牆，盡量縮小髖與牆之間的縫隙
  - 留意是下背與腹部肌群在發力——短軸的蛙式與蝶式靠這些肌肉
  perception_goal: 腳跟往臀部方向拉；髖部不離牆；感覺腰背和腹肌在做功
  success_signal: 腳跟接近臀部時髖部仍貼牆
  failure_signal: 腳跟一拉臀部就離牆（代表從膝蓋前推）
  deficiency_fixes:
  - 11
  - 12
  - 13
  source: There's a Drill for That
- id: Br2
  name_en: Egg Beater Kick
  name_zh: 打蛋器踢水
  strokes:
  - breaststroke
  category: kick
  equipment: []
  l_target:
  - L2
  abc_type: B
  purpose_zh: 垂直打蛋器踢水感覺蛙式力量來自腿內側和腳掌
  how_to:
  - 在深水區直立，打打蛋器式踢水，雙手在水面下輕輕撥水維持平衡
  - 軀幹保持垂直、放鬆
  - 把力量感覺集中在大腿內側與腳掌
  perception_goal: 感覺壓力在腿內側和腳掌內側；不是腳底踢水
  success_signal: 能在水中垂直維持高度；感覺到腿內側的推力
  failure_signal: 感覺不到腿內側壓力；腳底在踢
  deficiency_fixes:
  - 11
  source: There's a Drill for That
- id: Br3
  name_en: Vertical Breaststroke Kick
  name_zh: 垂直蛙式踢腿
  strokes:
  - breaststroke
  category: kick
  equipment: []
  l_target:
  - L2
  - L3
  abc_type: B
  purpose_zh: 垂直蛙式踢腿感覺正確的鞭式踢法，膝蓋不前推
  how_to:
  - 在深水區保持垂直，踢蛙式腿
  - 腳跟收回臀部，膝蓋不超過身體線
  - 只用腿不用軀幹發力，身體會上下浮動；當蛙式踢水熱身很好
  perception_goal: 感覺腳踝翻出後從內側踢水；踢完腳合攏
  success_signal: 踢水後身體上彈；感覺從內側有推力
  failure_signal: 膝蓋前推超過身體線；感覺上彈很弱
  deficiency_fixes:
  - 11
  - 12
  - 13
  source: There's a Drill for That
- id: Br4
  name_en: Vertical Kick with Streamline Arms
  name_zh: 垂直踢腿流線臂
  strokes:
  - breaststroke
  category: kick
  equipment: []
  l_target:
  - L3
  abc_type: B
  purpose_zh: 流線臂垂直踢腿增加難度，訓練快速鞭式踢腿
  how_to:
