premise: '划手距離是<mark>技術</mark>指標，划頻是<mark>生理</mark>指標——兩者是不同的對象，不可混為一談。<span class="cert">🔵</span>'
moves:
  - n: 1
    name: '入水位置'
    one: '手在肩前入水，不跨中線'
    l: 'L2–L3'
    physical: '入水點應在<mark>肩線延伸前方</mark>、手臂接近完全伸展處（約肩寬、距頭部 30–45 公分），指尖朝前斜下切入。跨越中線會讓入水後第一個動作變成大幅<mark>外掃</mark>，產生橫向分力誘發蛇行，肩胛骨無法穩定。小指可略轉朝下入水，有助降低入水阻力（教練觀測，主要見於 hip-driven 自由式，非通用物理量）🟠。'
    boundary: '入水位置的本體感知極不可靠——泳者對自己手臂落點的判斷準確度遠低於實際，這是感知問題不是解剖限制。最可靠的確認是側錄，不要單靠「感覺手在肩前」。'
    drills:
      - '單臂划手'
      - '描黑線'
      - '靜音入水'
    cue_bad: '頭部正前方輕輕滑入水'
    cue_why: '入水過短會壓縮延伸時間、失去晚期回臂的加速能量轉移，且手在頭頂落水製造正面阻力。'
    cue_good: '指尖領先、積極前伸，在肩線前方切入'
    lnote: 'L2 延伸感知的建立基礎；入水過短會讓 L2 延伸感知無法萌芽。'

  - n: 2
    name: '捕水 EVF'
    one: '高肘抓水，推進的起點'
    l: 'L3–L4'
    physical: '高肘的目的是<mark>降低上臂阻力</mark>，不是讓前臂推進。上臂是自由式中阻力最大的部位——高肘讓上臂與游進方向平行、截面積最小化，同時讓<mark>手掌</mark>朝向後方、推進面積最大化。手掌才是主推進面，不是前臂。'
    boundary: '<mark>前鋸肌</mark>是 EVF 的硬體前提。前鋸肌疲勞後肩胛骨失穩，高肘姿態無法維持——這不是技術感知問題，是肌肉撐不住。長距離後段崩潰多半是前鋸肌耐力問題，不要用感知訓練介入。'
    drills:
      - '握拳划手'
      - '帆船划手'
      - '三點觸碰'
    cue_bad: '前臂壓下去推水'
    cue_why: '前臂是圓形截面，推進效果遠差於手掌；高肘是為了降上臂阻力。'
    cue_good: '肘尖保持朝向前方游進方向'
    lnote: 'L3–L4 的核心技術點；連動鏈耦合要到 L5。'

  - n: 3
    name: '拉水加速'
    one: '手掌加速向後推，不是定速划'
    l: 'L3–L4'
    physical: '捕水後進入推進相，手掌從 3 點鐘加速推到 9 點鐘，路徑<mark>接近直線向後</mark>——傳統 S 形路徑是高速攝影出現前缺乏測量工具的誤解，S 形其實是身體轉體造成的視覺副產品。手速必須從捕水起點<mark>逐漸加速</mark>，不是定速推水；後象限是推進力峰值，深度約 8–10 吋，手掌不應穿破水面。'
    boundary: '拉水推進感知屬可訓練的感知能力，不是硬體邊界。但若前鋸肌已失守導致捕水結構瓦解、轉為直臂蠻力划水，加速感會跟著消失——此時根因在硬體支撐，不在拉水技術本身。'
    drills:
      - '單臂划手'
      - '握拳划手'
      - '指尖拖水'
    cue_bad: '刻意走 S 形路徑'
    cue_why: '每次方向改變都要減速再加速，每次減速都是推進力損失；且把注意力放在路徑形狀會脫離水壓感知。'
    cue_good: '手掌向後加速、維持路徑穩定'
    lnote: 'L3 手感核心；提速後能否穩定維持加速感是 A 型在 L4–L5 的關卡。'

  - n: 4
    name: '旋轉耦合'
    one: '旋轉時機對上推力峰值'
    l: 'L4–L5'
    physical: '身體旋轉本身<mark>不產生推進力</mark>，但旋轉速度峰值與划手推力峰值<mark>耦合</mark>時，能量疊加放大推力。旋轉是放大器，不是引擎。啟動旋轉的是推水末段的<mark>肩胛肌群</mark>（菱形肌收縮、後縮肩胛骨），髖部被動跟隨，不是腰或髖主動發動。'
    boundary: '旋轉幅度有解剖與風格差異：Hip-driven 髖旋轉 45–60°，Shoulder-driven 僅 20–30°，不同風格泳者的旋轉描述截然不同都屬有效。幅度受時間窗口限制——高划頻下物理上沒有時間完成大幅旋轉，這是力學邊界不是感知問題。'
    drills:
      - '俄式滾轉'
      - '三划滑行'
      - '髖部划水'
    cue_bad: '主動轉髖帶動划手'
    cue_why: '混淆因果——髖是被動跟隨者；高划頻下刻意轉髖造成時機錯亂與額外能量消耗。'
    cue_good: '推水末段感覺肩胛骨往脊椎縮，對側自然跟著轉'
    lnote: '耦合感知屬 L5 層次；L3–L4 基礎捕水推進未穩前不優先處理。'

  - n: 5
    name: '踢水節律'
    one: '踢水和划手整合，不是各跑各的'
    l: 'L3–L5'
    physical: '踢水有四個功能，不只推進：<mark>推進</mark>（補划手空窗期）、<mark>升力</mark>（下半身維持水平、降正面截面積）、<mark>慣性</mark>（速度波動最小化）、<mark>平衡穩定</mark>（抵消回臂側向分力）。六拍踢的對側配對來自反扭矩：右手入水時身體向該側滾轉，對側腳踢下抵消蛇行。感知重點是整合，不是力道。'
    boundary: '<mark>踝關節蹠屈幅度</mark>是踢水效率的硬體邊界。踝關節僵硬者（跑步背景常見）腳掌無法朝後，踢水效率大幅下降甚至制動——這是解剖限制，須先確認踝關節能否完整蹠屈，不能用感知訓練介入。柔韌性可後天訓練改善，但改善先於速度提升。'
    drills:
      - '超人踢水'
      - '流線踢水'
      - '垂直踢水'
    cue_bad: '腿要踢有力、踢得快'
    cue_why: '踝關節蹠屈不足時加大力量只是更有力地製造阻力；力量不是問題，整合節律才是。'
    cue_good: '踢腿有跟上划手嗎？還是各自跑？'
    lnote: 'B 型核心訓練軸；L3 建立踢水推力感、L4 整合、L5 外部干擾下維持。'

  - n: 6
    name: '頭部位置'
    one: '頭不抬，眼球上轉換氣'
    l: 'L2–L4'
    physical: '頭部是自由式中<mark>本體感知最不可靠</mark>的部位——「感覺頭壓低了」不等於頭實際是低的。波阻隨速度急遽上升（約與速度三次方 v³ 成正比），接近競速時約佔總阻力 25%（低速時較低）。頭部微抬→下半身下沉→踢水要對抗傾斜→能量預算被佔用，代價隱性累積，長距離尾段才顯現。換氣靠嘴巴轉進<mark>弓形波凹陷</mark>，視線靠眼球上轉，頭部本身不移動。'
    boundary: '頭部位置幾乎全是感知問題而非解剖限制——這也是為什麼陸上示範正確、下水卻自動回到微抬習慣（感知系統沒被重新校正）。因為本體感知最不可信，這個環節必須靠外部確認（錄影、蛙鏡基準線），不能只信主觀感覺。'
    drills:
      - '頭帶平衡 — 面朝下'
      - '頭帶平衡 + 旋轉'
      - '無氣泡'
    cue_bad: '換氣時眼睛看天花板 / 抬頭換氣'
    cue_why: '頭部過度旋轉打斷旋轉連動鏈、誘發換氣側手入水偏移；抬頭直接造成下半身下沉。'
    cue_good: '嘴角轉進水面凹陷，眼睛看斜前方，另一側鏡片還有一半在水裡'
    lnote: 'L2 換氣建立的關鍵；頭部過度旋轉是 C 型局部遮蔽最常見的觸發點。'

  - n: 7
    name: '划距感知'
    one: '察覺這趟划得比較短了'
    l: 'L4–L6'
    physical: 'SL（每划距離）是技術品質最直接的外部指標，也是疲勞崩潰的<mark>第一個訊號</mark>——SL 下降先於 SR 下降。泳者本能反應剛好相反：感覺慢→划更快（提高 SR）→每划推進力下降但划次增加→消耗更多能量→技術繼續惡化。精英的優勢不是更高 SR，而是<mark>高 SR 下維持 SL 不下降</mark>。'
    boundary: '划距感知是可訓練的覺察能力，不是硬體邊界——目標是把「游完才發現划短了」推進到「游泳中途就能偵測」。但疲勞後主觀感知可信度下降，此時需回到 SPL 客觀數字，不能單靠感覺。'
    drills:
      - '高爾夫計分'
      - '三划滑行'
      - '指尖拖水'
    cue_bad: '游累了就划快一點'
    cue_why: '疲勞時提 SR 掩蓋 SL 下降，短期有用但長期加速技術崩潰。'
    cue_good: '先確認每划還有水感、推多遠，再考慮快慢'
    lnote: '能在中途察覺 SL 開始縮短是 L5→L6 的核心里程碑；疲勞崩潰序列的第一層。'

  - n: 8
    name: '旋轉連動鏈'
    one: '回臂入水放大對側推力（進階）'
    l: 'L5–L6'
    physical: '回臂手從最高點<mark>加速下落</mark>、入水時動能傳遞到對側划手末段推力，產生 coupling 能量。耦合要有效，回臂必須<mark>持續加速到入水</mark>（不能在入水前減速）。肩旋轉峰值在拉水前段、髖旋轉峰值在拉水末段，兩者分開強化整個拉水週期。'
    boundary: '這是 L5 以上才會浮現的感知層次，屬感知成熟度問題而非硬體邊界。在 L3–L4 過早追求「整體連在一起」的感覺，往往是個別環節（抓水、踢水推進）尚未穩固卻誤以為「很好」——需先確認基礎感知穩定，不是直接進入連動鏈。'
    drills:
      - '俄式滾轉'
      - '三划滑行'
      - '超人趕上'
    cue_bad: '回臂要快、要有力'
    cue_why: '回臂在空中不接觸水，本身不產生推進力；用力揮臂只製造全身張力、觸發 C 型遮蔽。重點是鬆弛加速與時機，不是力道。'
    cue_good: '回臂放鬆、持續加速到入水那一刻'
    lnote: 'L5 的耦合感知層次；連動鏈要等基礎捕水與推進感知穩固後才會出現。'
