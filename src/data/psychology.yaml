domain: psychology
domain_name_zh: 心理
themes:
- id: psych.fear
  name_zh: 水中恐懼
  nav_zh: 恐懼
  when_zh: 還不敢放手、一下水就僵、怕到不敢開始時
  order: 1
  status: complete
  band: 初學端
  l_band: L0–L2
  level_tag: 初學
  concept_count: 7
  premise:
    layer: public
    certainty: 🔵
    one_line: 水中恐懼的核心常不是「怕水本身」，而是「怕在水裡失去對身體的控制」—— 而恐懼一旦啟動，會從源頭關閉學習所需的感知頻寬，所以它是 L0 的閘門，不是性格問題。
  concepts:
  - id: psych.fear.control_loss
    name_zh: 怕的是失控，不是水
    nav_zh: 失控感
    order: 1
    status: complete
    phenomenon:
      certainty: 🟢
      text: 針對游泳情境開發的恐懼量表（FWAQ, Misimi 等 2020, n=2,074）把水中恐懼拆成三個因子： 與水環境接觸、水的自然力量、以及「水中動作控制感」。其中「對水中動作控制感的缺失」 是三者裡最強的恐懼預測因子。換句話說，怕水的人多半不是怕水這個物質， 而是怕自己一進水就失去對身體的掌控。
    l_levels:
    - L0
    l_note: 恐懼閘門落在 L0——在呼吸與漂浮感知建立之前就把學習擋住。
    misconception_refs:
    - cue: 不要怕，水很安全
      why: 用「安全」回應失控恐懼，沒有觸及核心（怕的不是水危險，是怕自己會失控），反而否定了對方的感受。
      better: 先把可預測性與控制權還給對方——「你隨時可以站起來/抓邊，每一步由你決定」。
    intervention_refs:
    - name: 系統減敏（焦慮層級分階）
      certainty: 🟡
      how_to: 列出由弱到強的暴露階梯（坐池邊→腳入水→膝→腰→臉碰水），每階在放鬆狀態下充分習慣再進下一階。
    - name: 先建立信任再入水
      certainty: 🟠
      how_to: 恐懼者需先在池外建立教練關係與情緒安全，不急著下水（ERIC 教學實踐指引）。
    population_note: 「失控」這個簽名在成人初學身上會被社會評價放大（「這年紀還不會」）， 介入要先卸評價威脅；族群差異見本主題「恐懼的不同臉孔」。
    sources:
    - Research/心理/03_水中恐懼與學習者心理.md#FWAQ
  - id: psych.fear.perception_masking
    name_zh: 恐懼會關掉水感
    nav_zh: 恐懼遮蔽
    order: 2
    status: complete
    phenomenon:
      certainty: 🔵
      text: 恐懼啟動時，神經系統把感知資源全部分配給外感受（水在哪？深嗎？我要沉了嗎？）， 系統性壓制內感受與本體感覺。但水感正是建立在這些被壓制的安靜信號上——細微的浮力回饋、 流場感、壓力分佈。結果是：恐懼者就算把動作教給他，也「感覺不到水」，因為感知頻寬已被恐懼佔滿。 這是「先把動作學會就好」之所以對恐懼者無效的原因——通道在 L0 就被關了。
    hardware_boundary:
      certainty: 🔵
      text: 注意這是跨領域推導：注意力窄化、內感受壓制等機制來自臨床恐懼/焦慮研究， 外推到游泳情境合理但游泳專屬的「感知遮蔽」直接量測仍是研究空白，不是已坐實的游泳實證。
    l_note: 解釋「為什麼對恐懼者教動作形式會學不進去」——感知遮蔽發生在 L0。
    misconception_refs:
    - cue: 先把動作學會，怕水自然就好了
      why: 感知被恐懼遮蔽時動作根本學不進去；把順序顛倒了。
      better: 先降恐懼、打開感知頻寬，再教動作——感知是輸入，動作是輸出。
    sources:
    - Research/心理/03_水中恐懼與學習者心理.md#感知遮蔽機制
  - id: psych.fear.freeze_reflex
    name_zh: 凍結是反射，不是膽小
    nav_zh: 凍結反射
    order: 3
    status: complete
    phenomenon:
      certainty: 🟢
      text: 「凍結」（freeze）是杏仁核投射到中腦導水管周圍灰質（PAG）的神經反射，不是膽小或故意不配合。 防衛反應是一條串聯：預警凍結（交感主導，警覺但不動）可能升級成崩潰性不動 （背側迷走主導，解離、像關機）。兩者外觀都是「不動」，但神經狀態相反。
    hardware_boundary:
      certainty: 🔵
      text: 在水中，凍結者無法主動輸出動作，而動覺回饋（水如何回應你的動作）需要主動輸出才會產生—— 所以凍結是最深的感知遮蔽：不只感覺不到水，連感覺不到自己在動。這是反射層， 無法用「動起來啊」的指令解除（游泳情境的死亡案例比例本身仍是研究空白）。
    l_note: L0 最深層的遮蔽狀態。
    misconception_refs:
    - cue: 他就是不肯動 / 不配合
      why: 凍結是不自主的防衛反射，不是抗拒；催促等於加重威脅。
      better: 降低威脅、恢復安全信號（聲音、觸碰許可、可預測性），讓神經系統先離開凍結。
    sources:
    - Research/心理/03_水中恐懼與學習者心理.md#凍結反應
  - id: psych.fear.co2_breath_panic
    name_zh: 換氣過度反而會引爆憋氣恐慌
    nav_zh: 換氣恐慌
    order: 4
    status: complete
    phenomenon:
      certainty: 🔵
      text: 恐懼者典型是上胸淺快呼吸。淺快換氣讓血中 CO₂ 偏低，於是「想呼吸」的慾望感變弱， 人就會不知不覺憋氣憋太久；一旦 CO₂ 回升並驟然超過閾值，就觸發一次微型恐慌，感知瞬間關閉、技術崩解。 矛盾就在這裡：表面上的「換氣過度」反而是後段憋氣恐慌的引信。
    hardware_boundary:
      certainty: 🟢
      text: 對 CO₂ 上升的敏感度有生理底盤：受訓潛水員的 CO₂ 耐受明顯高於恐慌傾向者 （Kyriakoulis 2025）。提高耐受要靠漸進訓練，不是靠意志撐住。
    intervention_refs:
    - name: 陸上腹式呼吸
      certainty: 🔵
      how_to: 先在陸上讓學習者感受「吐氣時想呼吸的慾望是正常的」，不把這個感覺當警報。
    - name: 嘴碰水面吐氣（氣泡回饋）
      certainty: 🔵
      how_to: 用看得見的氣泡提供視覺回饋，降低憋氣的隱性焦慮。
    - name: 規律呼吸節奏
      certainty: 🔵
      how_to: 建立固定的吸—轉頭—吐入水節律，規律本身就抑制 CO₂ 驟升。
    sources:
    - Research/心理/03_水中恐懼與學習者心理.md#呼吸介入
  - id: psych.fear.diving_reflex_calm
    name_zh: 同一片水，也能讓人冷靜
    nav_zh: 潛水反射
    order: 5
    status: complete
    phenomenon:
      certainty: 🔵
      text: 水對恐懼者同時打開兩條相反的迷走神經通路。一條是背側迷走：水=威脅+呼吸限制→崩潰凍結。 另一條是潛水反射：臉部接觸（偏冷的）水→三叉神經感知→迷走神經激活→心跳反射性減緩→副交感優勢→ 產生鎮靜。也就是說，同一片水可以是威脅，也可以是冷靜的開關，差別在於怎麼進入。
    hardware_boundary:
      certainty: 🟢
      text: 潛水反射的生理路徑（三叉神經 CN V 感知、迷走神經 CN X 減緩心跳、臉部冷刺激最強）是已知的； 但「用它當游泳教學的鎮靜工具」是從恐慌症臨床研究外推，游泳教學方案的效果仍未驗證（研究空白）。
    intervention_refs:
    - name: 漸進臉部接觸水
      certainty: 🔵
      how_to: 引導學習者緩慢讓臉部接觸水，利用潛水反射的自然鎮靜——前提是先建立安全感，避免突然的冷水觸發驚嚇而轉成交感主導。
    sources:
    - Research/心理/03_水中恐懼與學習者心理.md#潛水反射
  - id: psych.fear.safety_precondition
    name_zh: 沒有安全感就學不進去
    nav_zh: 安全前提
    order: 6
    status: complete
    phenomenon:
      certainty: 🔵
      text: 神經系統只有在判定「安全」時才會進入學習就緒狀態，開放接收新技術（多迷走理論的腹側迷走狀態）。 水的陌生本身就是一串新奇威脅信號：重力消失、視覺模糊、聲音改變。教練的聲調、節奏、眼神接觸、 一致性，會被學習者的神經系統自動評估（neuroception），決定他能不能維持在能學習的狀態。 這是框架外推（多迷走理論在游泳的操作化測量仍是研究空白），但方向上與所有教學經驗一致。
    misconception_refs:
    - cue: 凶一點他才會認真 / 嚇一下就敢了
      why: 威脅信號把神經系統推離學習就緒態，恐懼者只會更關閉，不是更專注。
      better: 用穩定、可預測的安全信號（清楚的流程、觸碰許可、一致的語氣）維持學習狀態。
    intervention_refs:
    - name: 池外先建立信任
      certainty: 🟠
      how_to: 進水前先建立教練關係與情緒安全（ERIC 教學實踐指引）。
    - name: 可預測流程 + 觸碰許可
      certainty: 🔵
      how_to: 每一步先說會發生什麼、徵得同意再做，把不可預測性降到最低。
    sources:
    - Research/心理/03_水中恐懼與學習者心理.md#社會安全感
  - id: psych.fear.population_faces
    name_zh: 恐懼的不同臉孔（依族群）
    nav_zh: 族群差異
    order: 7
    status: complete
    phenomenon:
      certainty: 🟠
      text: 「水中恐懼」是同一個標籤，在不同族群指向完全不同的介入點，不能一套水性課通用： 兒童初學是陌生環境的新奇威脅加上父母恐懼的代際傳遞，安全感一建立就快速消退； 成人初學疊加了社會羞恥與自我意識，失控簽名被「這年紀還不會」的評價威脅放大； 鐵人三項多半泳池能游，怕的不是水而是開放水域情境（看不到底、群泳被踩踏、無法觸壁）， 是有能力的泳者在賽境被暫時打回 L0；青少年競技的「怕」多半已不是 L0 水恐，而是表現/評價焦慮。
    population_note: 框架紀律：本專案教學對象涵蓋全光譜、沒有單一主客群。恐懼文獻嚴重偏壓兒童泳課與一般非游泳者， 其他族群（成人初學的社會性恐懼、鐵人開放水域 panic、青少年評價恐懼）多為質性/二手轉述， 屬素材缺口而非「次要對象」，不以兒童 L0 資料外推填空。
    misconception_refs:
    - cue: 把鐵人三項或青少年的「怕」用兒童 L0 水性課來處理
      why: 族群混淆——他們的恐懼不在 L0 水性，介入點完全不同。
      better: 成人先卸評價威脅再暴露；鐵人做開放水域情境減敏（群泳模擬、定位呼吸）；青少年往表現焦慮查。
    sources:
    - Research/心理/03_水中恐懼與學習者心理.md#族群特異性
- id: psych.interaction
  name_zh: 心理–感知–生理交互
  nav_zh: 身心交互
  when_zh: 不怕了，但一緊張身體就僵、換氣一亂整個垮時
  order: 2
  status: complete
  band: 初學端
  l_band: L0–L2
  level_tag: 初學
  concept_count: 8
  premise:
    layer: public
    certainty: 🔵
    one_line: 心理狀態不是「影響」身體的外力，而是和感知、生理共用同一條神經迴路—— 喚醒會直接改寫肌肉張力與本體感覺解析度，所以「放鬆才有水感」是生理事實，不是雞湯。
  concepts:
  - id: psych.interaction.anterior_insula_gain
    name_zh: 焦慮者前島把身體訊號放大為威脅
    nav_zh: 前島放大
    order: 1
    status: complete
    phenomenon:
      certainty: 🟢
      text: 焦慮與高度喚醒狀態下，前島皮質（anterior insula）對身體內在訊號的增益（gain）升高： 同樣的心跳加速、呼吸節律改變、浮力造成的內臟位移，在焦慮者腦內被解讀為更強烈的威脅訊號 （Paulus & Stein 2010, PMID 20490545）。前島是所有主觀「感覺」的整合中心，整合了 心率、血氧、溫度與內臟壓力後輸出「此刻身體狀態如何」的主觀感受（Craig 2002, 2009）。 水中的「感覺不舒服」因此往往不是水本身的危險，而是前島整合多種中性訊號後放大輸出的主觀不適。
    hardware_boundary:
      certainty: 🔵
      text: 前島敏感化機制來自臨床焦慮/憂鬱研究（Paulus & Stein 2010）與神經影像（Craig 2002/2009）， 均為陸上實驗室或非游泳情境。外推至水中游泳教學屬跨領域推導：游泳情境下浮力卸除重力對內臟的 壓迫，提供了額外的位移感知，可能放大前島增益效應，但游泳場景專屬的前島量測目前仍為研究空白。 內感訓練可改變前島迴路已有初步支持（Translational Psychiatry 2024, DOI 10.1038/s41398-024-02933-9）。
    l_levels:
    - L0
    - L1
    l_note: 前島增益升高時，學習者感知頻寬被威脅性自我監控佔據，外部水流訊號被壓制。 此機制是 L0–L1 感知建立的心理底層障礙——不先降低前島敏感化，感知通道難以對流場開放。
    intervention_refs:
    - name: 重複正向水中暴露（降前島激活閾值）
      certainty: 🔵
      how_to: 漸進式水中暴露（從腳入水到面部入水）提供重複的「身體訊號→無威脅結果」配對， 有助於重新校準前島對水中身體訊號的評估增益。Baba et al. (2021) 顯示 25 分鐘水浸後內感準確性提升、心率下降，支持水中暴露本身具有內感訓練效果。
    - name: 正念/內感覺知訓練
      certainty: 🔵
      how_to: Haase et al. (PMC4692309) 顯示正念訓練使海軍陸戰隊員的前島反應模式 向菁英運動員靠攏（遇到呼吸負荷時抑制而非放大前島反應）。陸上正念訓練 外推至游泳教學仍需驗證，但方向支持用於降低前島敏感化。
    population_note: 前島放大效應在焦慮傾向個體最強，但機制本身跨族群存在。兒童初學的前島整合系統尚未 成熟，對「新奇身體訊號」的評估基準不同；競技泳者的前島反應模式已透過重複訓練重新校準， 在氣流受阻時反而表現出前島抑制（Paulus et al. 2012, PMC3261851）。成人初學因社會威脅 疊加（羞恥/自我意識），前島整合的威脅訊號來源更複雜。文獻多來自臨床焦慮或菁英運動員 研究，初學者族群的游泳前島量測仍為研究空白。
    sources:
    - Research/心理/08_心理感知生理交互.md#1.1
    - Research/心理/08_心理感知生理交互.md#1.3
  - id: psych.interaction.stress_hypertonia
    name_zh: 張力升高是感知閘門，不只是阻力
    nav_zh: 張力閘門
    order: 2
    status: complete
    phenomenon:
      certainty: 🟢
      text: 焦慮觸發交感激活後，γ-運動神經元活性升高，肌肉基線張力隨之上升。實驗顯示 中度焦慮使前運動時間的 EMG 活性增加（Barreto et al. 2017, DOI 10.1016/j.neulet.2017.02.033）；肌肉放鬆則可恢復焦慮者的運動意象能力 （PMC11723612, 2025）。肌張力升高不只增加水中阻力：關節受器（Ruffini 末梢） 在皮膚被拉緊時飽和，機械感受器對水流方向與壓力的感知通道因此受阻。 身體緊繃同時也造成動作時序提前（前饋控制崩潰），解釋了初學者 EMG 早啟動現象（Vaz et al. 2016, PMID 26878097；Olstad et al. 2017）的 可能神經機制：γ-運動神經元活性升高 → 肌梭虛報張力喪失 → 提前觸發保護性收縮。
    hardware_boundary:
      certainty: 🔵
      text: 'Barreto et al. (2017) 與 PMC11723612 (2025) 為陸上焦慮 EMG 研究； 水中浮力已改變肌張力基線，焦慮性肌張力升高在水中的量值與感知影響可能與陸上不同。 Ruffini 末梢飽和阻斷水感的具體路徑為推導（🔵），游泳場景中尚無直接量測。 初學者 EMG 早啟動的焦慮成因（解釋 #1）有文獻支持但仍為最強假說，非定論。'
    l_levels:
    - L0
    - L1
    - L2
    l_note: 張力閘門在 L0–L2 的影響最直接：當身體緊繃時，感知系統無法接收到細緻的 浮力回饋與流場壓力訊號，L1 的漂浮感知和 L2 的推進阻力感知都需要低張力狀態才能建立。
    misconception_refs:
    - cue: 放輕鬆就好了
      why: 口令正確但無操作化：未告訴學習者「放輕鬆」的身體感覺是什麼，也未提供 任何感知錨點讓他們知道自己有沒有達到低張力狀態。對高焦慮者， 抽象的「放鬆」指令反而可能增加「我沒辦法放鬆」的認知負荷。
      better: 給具體感知目標：「讓手腕像水草一樣漂浮」「感覺水在托著你，不要幫忙撐」—— 讓低張力有可感知的錨點，而非靠意志壓制緊繃。
    intervention_refs:
    - name: 先建立低張力感知錨點，再加入技術要求
      certainty: 🔵
      how_to: 在安全漂浮狀態（有支撐）下讓學習者確認「低張力感覺是什麼」， 再逐步移除支撐。肌肉放鬆訓練（PMC11723612）在焦慮者身上 可恢復運動計畫能力，先做陸上放鬆再入水是合理前置步驟。
    population_note: 兒童初學的基線肌張力因發展階段不同，焦慮引發的額外升高程度與成人不同， 且兒童難以言語報告張力狀態。競技泳者的張力控制已自動化， 張力升高通常只在高壓賽境才顯著影響感知。鐵人三項開放水域情境的群泳接觸 可能觸發急性肌張力升高，影響最初幾百公尺的感知品質。 文獻（Barreto 2017, PMC11723612）均為一般焦慮/EMG 研究，非游泳專屬。
    sources:
    - Research/心理/08_心理感知生理交互.md#1.2
    - Research/心理/08_心理感知生理交互.md#4.2
  - id: psych.interaction.rpe_psychobiological
    name_zh: 做不到是努力知覺超標，不是肌力不夠
    nav_zh: 努力知覺
    order: 3
    status: complete
    phenomenon:
      certainty: 🟢
      text: Marcora 的心理生物模型（Marcora, Staiano & Manning 2009, PMID 19131473）顯示： 90 分鐘認知作業後，心肺指標不變，但受試者的力竭時間縮短 15.1%（RPE 更高）—— 純心理疲勞即可透過提升努力知覺（RPE）縮短表現。潛意識呈現情感性訊號（笑臉） 可在不知情下降低 RPE 並延長耐力（Blanchfield, Hardy & Marcora 2014, PMC4263011）。 正向自我對話使耐力提升約 18%（Blanchfield et al. 2014）。 核心主張：運動的終止決策由「努力知覺 vs. 潛在動機閾值」的比值決定，而非肌肉生化失敗。
    hardware_boundary:
      certainty: 🔵
      text: Marcora 的研究基礎為自行車/跑步耐力情境，非游泳。游泳初學者的 RPE 額外包含 溺水恐懼成分與前島放大效應，其動機架構與純耐力運動不同，尚無游泳場景的直接量測。 Noakes 的中央調節者理論（PMID 9140893；Tucker 2009, PMID 19224911）與 Marcora 在 RPE 是最關鍵測量指標這一點上達成共識，兩者均支持「游泳中的停止訊號是腦層決策而非肌肉失敗」 的推導方向，但游泳技術崩潰的 RPE 分解實驗目前為研究空白。
    l_levels:
    - L0
    - L1
    - L2
    l_note: 對防衛型初學者，在水中「感覺做不到」的 RPE 包含三個可區分的成分： 生理疲勞（較小）、恐懼性前島放大（較大）、認知負荷（技術未自動化）。 降低 RPE 的介入點因此不是肌力訓練，而是依序降低恐懼性成分與認知負荷。
    misconception_refs:
    - cue: 多游幾趟體力上來就好了
      why: 把「做不到」的原因歸結為體力/肌力不足，實際上初學者的停止訊號 主要來自 RPE 超出動機閾值（恐懼 + 認知負荷 + 生理）， 純粹增加游趟數不能降低 RPE 的焦慮成分，甚至可能因反覆失敗提升 RPE 基線。
      better: 先識別 RPE 升高的來源：是呼吸節律失調（降換氣認知負荷）、 還是肌張力引發的前島放大（先降張力）、還是真的體能問題。
    intervention_refs:
    - name: 正向自我對話（self-talk）
      certainty: 🟢
      how_to: Blanchfield et al. (2014) 的正向自我對話使 RPE 升高速率降低、耐力提升約 18%， 機制為情感性訊號直接調節 RPE。游泳教學中鼓勵性語言的效果方向一致， 但游泳場景的量測有待研究。
    - name: 降低認知負荷（自動化換氣）
      certainty: 🔵
      how_to: 感知訓練降低水中游泳的認知負荷（動作自動化後 RPE 貢獻降低）， 是 RPE 管理的結構性介入，效果比意志力壓制更持久。
    population_note: 兒童的動機閾值與成人不同，兒童 RPE 量表（如兒童版 Borg）需使用年齡適配工具。 競技泳者的 RPE 主要為生理成分，焦慮貢獻小。鐵人三項的水中 RPE 在起點群泳 時因情境威脅陡升，可能超過訓練時的 RPE 基線，導致「訓練游得好比賽卻崩」。 Marcora 研究樣本均為成人受訓者，其他族群的外推需謹慎。
    sources:
    - Research/心理/08_心理感知生理交互.md#1.4
    - Research/心理/08_心理感知生理交互.md#5.1
    - Research/心理/08_心理感知生理交互.md#5.2
  - id: psych.interaction.attentional_narrowing
    name_zh: 高喚醒時注意力過濾掉流場訊號
    nav_zh: 注意窄化
    order: 4
    status: complete
    phenomenon:
      certainty: 🟡
      text: Easterbrook (1959, PMID 13658305) 的 Cue Utilization 假說：情緒激活升高時， 可利用的外周線索範圍線性縮窄。低喚醒時注意力廣，包含雜訊；中度喚醒時注意力範圍 最適，感知頻寬匹配任務需求，表現最佳；高喚醒時注意力過度集中於「中心線索」， 外周訊號系統性被排除。游泳水感的核心訊號（手掌壓力梯度、前臂貼水面感、 體側流場方向）在高喚醒者的注意力框架中屬「外周線索」，因此被自動過濾。 高喚醒學習者的中心線索鎖定在「不要溺水」（呼吸位置、身體浮沉）， 水感訊號成為注意力資源分配後的殘餘。
    hardware_boundary:
      certainty: 🔵
      text: Easterbrook (1959) 為認知心理學實驗室研究，非水中情境。游泳的感官環境 （護目鏡、水下噪音、溫度）可能額外壓縮外周感知頻寬，使窄化效應在水中比陸上更強， 但此「強化版」尚無直接量測（見研究空白 🔴-08）。 Yerkes-Dodson 倒 U 型曲線（中度喚醒最佳）在水中的精確「最佳喚醒點」未量測。
    l_levels:
    - L0
    - L1
    - L2
    l_note: L0–L1 的首要任務是將喚醒降至中度範圍，才能讓水感的外周訊號頻寬開啟。 L3 以上的精細感知訓練（手感/腳感）在高喚醒狀態下無效，因為那些訊號 在注意力資源分配時已被排除在外。
    intervention_refs:
    - name: 先降喚醒、再進水感訓練
      certainty: 🔵
      how_to: 潛水反射（臉部接觸水）、深慢呼吸、降低教學刺激密度，先將喚醒帶入中度範圍， 再引導注意力轉向外周水感訊號。對高喚醒學習者，技術指令的數量也要縮減—— 指令過多本身就是一個喚醒來源。
    population_note: 注意力窄化機制跨族群存在，但「中心線索」的定義因族群而異： 兒童中心線索可能是父母的臉或聲音；成人初學是呼吸能否控制； 鐵人三項在賽境的中心線索是群泳位置和計時器；競技泳者的中心線索在高壓賽境可能偏移 至競技焦慮而非流場感知。文獻樣本偏壓認知心理學的一般成人，族群差異待研究。
    sources:
    - Research/心理/08_心理感知生理交互.md#1.6
  - id: psych.interaction.vagal_tone_fear_extinction
    name_zh: 迷走張力決定脫敏快慢
    nav_zh: 迷走脫敏
    order: 5
    status: complete
    phenomenon:
      certainty: 🟢
      text: 靜息心率變異性（HRV）較高的個體，在恐懼消弱訓練（extinction learning）中 更快速、更完整地消除恐懼反應（Pappens et al. 2014, PMID 25181542, PLoS ONE 9(9):e105054）。 高迷走張力（高 HRV）反映腹側迷走系統的參與能力，關聯到安全感建立速度與學習靈活性。 高特質焦慮者靜息 HRV 持續降低；自律訓練（autogenic training）可提升 HRV （Miu, Heilman & Miclea 2009, PMID 19059813）。 Porges 的多元迷走神經理論（1994/2011）提供框架：學習就緒狀態對應腹側迷走系統的主導， 高 HRV 個體更容易維持在此狀態下接受新訊息。
    hardware_boundary:
      certainty: 🔵
      text: Pappens et al. (2014) 的恐懼消弱研究為內感恐懼制約範式（非游泳），外推至 「高 HRV 的游泳初學者脫敏速度更快」屬推導（見 dossier §六 🔴-04：此假說未驗證）。 游泳場景中 HRV 作為脫敏速率預測指標的直接研究目前為研究空白。 Porges 多元迷走神經理論的游泳教學應用同為框架推導，操作化量測待研究。
    l_levels:
    - L0
    - L1
    l_note: 如果靜息 HRV 確實預測游泳脫敏速率，則初診時的 HRV 評估可作為 L0 學習者所需暴露階梯長度的前置估算指標——這仍是假說，提供研究方向。
    intervention_refs:
    - name: 提升迷走張力的訓練（自律訓練 / 呼吸訓練）
      certainty: 🟡
      how_to: Miu et al. (2009) 顯示自律訓練可逆轉焦慮者的 HRV 降低。 水中的規律深慢呼吸、潛水反射啟動，可能在游泳課中直接練習迷走張力—— 但游泳課前後的 HRV 變化量測尚待研究。
    population_note: HRV 的正常參考區間因年齡、性別、體能水平差異顯著。兒童靜息 HRV 天生較高且波動大， 不宜用成人標準解讀。競技泳者基線 HRV 通常高於一般人，但賽前焦慮下仍可能驟降。 Pappens et al. (2014) 樣本未限定游泳族群，所有族群外推均屬 🔵 推導。
    sources:
    - Research/心理/08_心理感知生理交互.md#1.7
    - Research/心理/08_心理感知生理交互.md#4.1
  - id: psych.interaction.freeze_prefrontal_shutdown
    name_zh: 凍結時前額葉下調，教得再好也聽不進
    nav_zh: 凍結停聽
    order: 6
    status: complete
    phenomenon:
      certainty: 🟢
      text: 防衛反應存在分級瀑布（Bracha 2004；Harvard Review of Psychiatry 2015, PMC4495877）： 從定向、預警凍結（交感主導）、逃跑/戰鬥，到強直性不動、崩潰性不動（背側迷走主導）。 凍結不是被動靜止，而是杏仁核→中腦導水管周圍灰質（PAG）路徑啟動的主動備戰狀態 （Roelofs et al. 2017, Phil Trans R Soc B 372:20160206）。 此狀態下，前額葉的下行抑制（executive control）減弱， 運動計畫與指令接收所需的前額葉功能暫時受阻。
    hardware_boundary:
      certainty: 🔵
      text: 水中防衛型學員凍結狀態的神經機制為跨領域推導（來自動物恐懼研究與臨床防衛反應文獻）， 游泳情境中「前額葉因凍結而受阻導致指令接收失敗」尚無直接量測。 背側迷走崩潰（解離）與交感預警凍結在外觀上均為「不動」，但神經狀態相反， 介入方式不同；水中識別兩者的可靠方法尚待研究。
    l_levels:
    - L0
    l_note: L0 最深層的感知遮蔽狀態：凍結者無法主動輸出動作，而動覺回饋需要主動輸出才產生。 在凍結狀態下繼續推進技術指令等於加重威脅訊號，可能深化而非解除凍結。
    misconception_refs:
    - cue: 講了這麼多次還是不動，就是不想學
      why: 凍結是 PAG 路徑的神經反射，不是抗拒或故意不配合。 在凍結狀態下增加指令頻率或加重語氣，對神經系統而言是威脅訊號升高， 可能觸發更深層的防衛反應（從預警凍結升至崩潰性不動）。
      better: 識別凍結信號後，暫停所有技術指令，先恢復安全感： 降低聲音、提供身體控制感（可以離開水）、等待神經系統離開凍結再繼續。
    population_note: 兒童的凍結信號可能更難與「不想學」區分，因為兒童語言自我報告能力有限。 成人在社會脈絡下可能「表演配合」但實際仍處於凍結邊緣，外觀行動但水感通道關閉。 凍結文獻多來自動物研究與臨床創傷研究，游泳教學中輕度凍結的識別缺乏標準化方法。
    sources:
    - Research/心理/08_心理感知生理交互.md#1.8
  - id: psych.interaction.breathing_cognitive_load
    name_zh: 換氣未自動化時，每次呼吸都閃斷一次水感
    nav_zh: 換氣負荷
    order: 7
    status: complete
    phenomenon:
      certainty: 🔵
      text: 陸上呼吸是腦幹自動化、幾乎零注意力成本的。游泳換氣則是必須與划臂週期精密對時的運動任務： 轉頭/抬頭時機、吐氣-吸氣窗口、氣道保護。對未自動化的泳者，每一次換氣都要求 把一份注意力資源從流場感知通道暫時抽走，投向「這口氣的執行」。 此機制建立在已驗證的雙重任務成本與 Easterbrook 注意力窄化之上： 換氣時機到達 → 注意力被徵召去執行換氣 → 流場感知通道（掌心壓力、前臂貼水、 體側漩渦）暫時失去精度加權 → 該換氣週期內水感「閃斷」→ 若泳者察覺變糊 → 喚醒微升 → 注意力窄化疊加 → 惡性循環。 此機制可解釋長期教學觀察到的「換氣側划手系統性比非換氣側差」現象。
    hardware_boundary:
      certainty: 🔵
      text: 此整條機制鏈為推導（🔵），建立在雙重任務文獻與 Easterbrook (1959) 之上； 游泳換氣的認知負荷量值，以及換氣側 vs. 非換氣側水感精度差異的直接量測， 目前尚無第一手數據（研究空白 🔴-09）。 不焦慮的泳者（低喚醒）此機制仍成立，但幅度應小於高焦慮狀態。 對自動化程度高的競技泳者，此成本在正常速度下接近零，只在衝刺/缺氧段才浮現。
    l_levels:
    - L1
    - L2
    - L3
    l_note: 換氣閃斷在 L1–L2 最影響感知建立的連貫性：L1 需要在漂浮中感知浮力回饋， 但換氣動作打斷了這個感知窗口；L2 的推進阻力感知在換氣週期內精度下降。 L3 以上的精細水感訓練若不同步自動化換氣，每一趟的換氣側都會是感知弱點。 對 L0 防衛型學習者，換氣帶來的認知負荷疊加前島放大，可能是一次喚醒升高點。
    misconception_refs:
    - cue: 換氣不好是因為你頭轉得不夠快/不夠及時
      why: 把換氣問題歸因為純動作形式，忽略了換氣是認知負荷注入點—— 只練轉頭速度不能降低換氣的注意力成本，水感閃斷的根本原因是 換氣動作尚未自動化，而非頭的移動時機。
      better: 讓換氣動作本身先在低壓環境自動化（站立換氣 drill → 浮板換氣） 再整合入完整划水，而非在完整游泳中反覆糾正頭的位置。
    population_note: 此機制對成人初學與兒童初學最強（換氣最不自動化）。 兒童因注意力資源總量較有限，換氣的認知負荷比例相對更高，解釋了兒童 「會游但換氣一加就崩」的常見現象。競技泳者換氣已高度自動化，殘餘成本 在高強度訓練/缺氧段才顯著。鐵人三項選手若在公開水域改換氣頻率 (1:2 → 1:3)，換氣側的認知負荷比預期高，可能影響感知品質。
    sources:
    - Research/心理/08_心理感知生理交互.md#1.9
  - id: psych.interaction.water_immersion_interoception
    name_zh: 水浸不只脫敏，同時訓練內感覺知
    nav_zh: 水浸內感
    order: 8
    status: complete
    phenomenon:
      certainty: 🟢
      text: Baba et al. (2021, IJERPH 18(19):10259, DOI 10.3390/ijerph181910259) 顯示： 25 分鐘水浸後，內感準確性（interoceptive accuracy）提升，心率下降。 長期游泳訓練者與非訓練者在靜態條件下的內感指標無差異，但水浸過程中 有即時性的內感提升效應。此發現支持「水中暴露本身是內感訓練」的假說—— 水浸提供了浮力卸載重力、體溫刺激、靜水壓，創造了陸上難以複製的 內感刺激情境，在此情境下的身體覺知練習具有訓練效果。
    hardware_boundary:
      certainty: 🟢
      text: Baba et al. (2021) 發現長期游泳訓練者在靜態條件下與非訓練者的內感指標無差異， 意味著內感提升效應是情境性的（水浸中），不能自動外推至「游泳訓練提升一般性內感能力」。 恐水個體在水浸中的內感準確性變化（是否與非恐水個體相同，或被焦慮放大/壓制） 目前為研究空白（🔴-03）。Paciorek & Skora (2020, DOI 10.3389/fpsyg.2020.01659) 提供迷走神經刺激改善內感覺知的機制背景，與水浸途徑可能有交集但未直接連結。
    l_levels:
    - L0
    - L1
    l_note: 若水浸的內感訓練效果在恐水個體中得到確認（🔴 待研究），則漸進水中暴露的教學設計 不只是「讓學習者脫敏」，同時也在提升其感知水中身體訊號的準確度—— 兩個機制同時運作，為 L0→L1 過渡提供雙重支撐。
    intervention_refs:
    - name: 無結構性水中靜止浸泡（作為感知前置）
      certainty: 🔵
      how_to: 技術訓練前安排 10–20 分鐘的低結構水中靜止時間（站立、扶邊）， 讓學習者在非任務狀態下讓身體適應水中內感環境， 可能降低後續技術練習時的前島增益，打開感知頻寬。 Baba et al. (2021) 的效果為 25 分鐘，陸上正念文獻建議逐步積累， 最適時長在游泳教學情境中未直接測量。
    population_note: Baba et al. (2021) 的研究樣本為成人，恐水者、兒童、競技泳者的水浸內感效應 均需分別驗證。水浸提升內感的效果被合理推測在內感敏感度較低的個體（高焦慮者、 體感覺知較弱者）更大，但此推測目前缺乏數據支持。 鐵人三項選手在開放水域的感官環境（能見度低、水溫冷）下，水浸訓練效果 與泳池情境的差異尚未比較。
    sources:
    - Research/心理/08_心理感知生理交互.md#1.3
    - Research/心理/08_心理感知生理交互.md#4.1
- id: psych.motivation
  name_zh: 動機與動機氣候
  nav_zh: 動機
  when_zh: 提不起勁、練不下去、想找回能一直練下去的動力時
  order: 3
  status: complete
  band: 貫穿全程
  l_band: L0–L6
  level_tag: 全程
  concept_count: 9
  premise:
    layer: public
    certainty: 🟢
    one_line: 能不能持續感覺水，底層取決於動機氣候——教練把焦點放在「精熟自己」還是「贏過別人」， 會在源頭決定學習者願不願意冒險去探索新的感覺。這是感知能生長的土壤，貫穿初學到競技。
  concepts:
  - id: psych.motivation.bpn_triad
    name_zh: 感知土壤的三根支柱：自主、勝任、連結
    nav_zh: 三大需求
    order: 1
    status: complete
    phenomenon:
      certainty: 🟡
      text: 自我決定理論（SDT，Deci & Ryan 2000）主張人類有三項基本心理需求（BPN）， 需求滿足時產生內在動機、幸福感與持續參與；需求受阻時產生受控動機、倦怠與退出。 三需求為：自主（行為出於自我意志而非外部壓力）、勝任（感受到有效應對挑戰的能力、有進步感）、 連結（感受到被他人接納與關心、與群體有歸屬感）。游泳直接實證確認三需求在泳者中同樣作用： Conroy & Coatsworth (2007, PMID 18769531) 在青少年休閒泳者中驗證教練自主支持→BPN 滿足； Teixeira et al. (2020, PMID 31578934, n=799 精英泳者) 發現 BPN 滿足→享受→意圖持續的序列中介。
    hardware_boundary:
      certainty: 🔵
      text: BPN 需求滿足對學習開放性的效應，在游泳情境具有跨研究一致性，但「BPN 滿足如何調節 本體感覺解析度或感知探索頻寬」目前仍無游泳專屬神經測量（研究空白 🔴01/🔴05）， 屬跨領域推導而非游泳直接量測。
    l_levels:
    - L0
    - L1
    - L2
    - L3
    - L4
    - L5
    - L6
    l_note: 三需求全 L 範圍持續運作：L0 的連結感決定能否在水邊建立安全基礎； L2–L4 的勝任感回饋是每次感知躍升的內在獎勵；L5–L6 的自主感決定選手能否主動導引自己的感知探索。
    sources:
    - Research/心理/04_動機與自我決定.md#核心理論
    - Research/心理/04_動機與自我決定.md#游泳特異研究
  - id: psych.motivation.continuum
    name_zh: 從「被逼來」到「想來」：動機不是有無，是深淺
    nav_zh: 動機光譜
    order: 2
    status: complete
    phenomenon:
      certainty: 🟡
      text: SDT 的動機連續體把動機分為從左（外在/受控）到右（內在/自主）六個區間： 無動機（amotivation）→ 外在調節 → 投射調節 → 認同調節 → 整合調節 → 內在動機。 越右側預測長期堅持、享受與幸福感；越左側預測倦怠、退出與 amotivation。 游泳縱向直接實證（Pelletier et al. 2001, DOI 10.1023/A:1014805132406, n=369, 22 個月追蹤）： 內在動機是堅持最強的正向預測因子，無動機（amotivation）是退出最強的負向預測因子； 教練的自主支持行為正向預測自主調節形式（即右移）。連續體本身並非游泳原創，但在游泳中有最直接的縱向驗證。
    l_levels:
    - L0
    - L1
    - L2
    - L3
    - L4
    - L5
    - L6
    l_note: 連續體的位置決定學員在每個 L 級投入的注意力資源：外在調節者「完成動作」不「感覺動作」； 內在動機者把感知探索本身當作獎勵，是 L4–L6 細緻感知發展的前提。
    misconception_refs:
    - cue: 他只要下水就好，動機不重要
      why: 研究直接顯示動機類型（內在 vs 無動機）縱向預測退出與否， 而非只影響「表現多好」。動機是持續參與的長期結構，不是短期門票。
      better: 把課程設計成讓學員在過程中體驗能力進步（勝任感），而非把動機問題留給學員自己解決。
    sources:
    - Research/心理/04_動機與自我決定.md#核心理論
    - Research/心理/04_動機與自我決定.md#SDT應用
  - id: psych.motivation.autonomy_support
    name_zh: 教練語言是動機土壤的施肥或施毒
    nav_zh: 自主支持
    order: 3
    status: complete
    phenomenon:
      certainty: 🟢
      text: 教練的自主支持行為（autonomy-supportive coaching）包含：提供選擇、接納負向情緒、 給理由而非命令、關注選手意見、讚美自主行為。游泳直接實證： Conroy & Coatsworth (2007, PMID 18769531) 在青少年休閒泳者（n=165）中驗證自主支持教練行為 正向預測 BPN 滿足與自主動機。 Minkels et al. (2023, DOI 10.3389/fspor.2023.1236256, n=128 節荷蘭游泳課) 發現 現行游泳教學**嚴重壓制自主需求**，只有採用 SDT 設計課程的教師表現明顯更好。 控制行為（controlling coaching）——壓力、威脅、條件式獎勵——預測需求受阻（need thwarting）， 研究確認需求受阻更強烈地預測倦怠、抑鬱症狀（Bartholomew et al. 2011；Vansteenkiste & Ryan 2013）。 Liu et al. (2025, DOI 10.1177/17479541251400621) 的系統性回顧進一步確認： 教練自身的動機品質也是關鍵變項（閉環：教練 BPN→選手 BPN→教練 BPN）。
    misconception_refs:
    - cue: 不練就沒進步，說到做到才是認真教練
      why: 命令式語言（「你必須 / 沒得選 / 就這樣做」）屬控制行為，直接壓制自主需求， 導致外在調節而非精熟動機——學員在教練面前做，不在時不做，感知探索窗口更窄。
      better: 把命令換成「你想先試哪一個？」或「做完這組，注意到手感有什麼不同？」—— 給理由與選擇，而非直接指定，同時保持技術清晰度。
    - cue: 做到我說的才給你上下一個動作
      why: 條件式獎勵（「達標才有下一步」）是受控動機的典型驅動，把動機外化到達標本身， 讓學員把注意力放在「符合教練標準」而非「感知自己的身體」。
      better: 把進展框為「你注意到了什麼、身體說準備好了嗎」——以感知自評替代外部條件閘門。
    sources:
    - Research/心理/04_動機與自我決定.md#SDT應用
    - Research/心理/04_動機與自我決定.md#需求受阻
  - id: psych.motivation.mastery_vs_performance_climate
    name_zh: 精熟氣候讓感知生長，表現氣候讓感知收縮
    nav_zh: 動機氣候
    order: 4
    status: complete
    phenomenon:
      certainty: 🟢
      text: 動機氣候（motivational climate，Ames 1992）分兩種：精熟氣候（mastery/task-involving） 強調個人進步、努力、學習與相互支持；表現氣候（performance/ego-involving）強調打敗他人、排名、 才能評比。TARGET 六維度（任務多樣化、讓選手參與決策、認可所有人進步、合作分組、個人進步評估、允許足夠學習時間） 是建構精熟氣候的操作工具。游泳直接實證： Moulds et al. (2023, DOI 10.1177/17479541231174806, n=203 澳洲青少年泳者)： 教練創造的精熟氣候評分**直接區分退出 vs 持續**。 Moulds et al. (2026, DOI 10.3389/fpsyg.2026.1771962)：游泳教練精熟氣候介入（混合方法RCT） 降低運動焦慮增幅、提升參與意願。Teixeira et al. (2020, PMID 31578934, n=799)： 任務氣候→BPN 滿足+享受→意圖持續的序列中介。 兩種氣候對感知探索的作用：精熟氣候把錯誤框為訊息（而非失敗），選手更願意停在不確定感覺中等待身體調整； 表現氣候把錯誤解讀為能力不足，選手傾向重複有把握的感覺而非探索新感覺。
    misconception_refs:
    - cue: 公布成績排行榜讓大家看看誰最努力
      why: 公開排名是最典型的表現氣候操作（TARGET 中 Recognition 維度的反例）； 在已有社會比較壓力的環境（競技訓練隊）更會把注意力從「自己感覺如何」拉向「排在第幾」， 壓縮感知探索空間。
      better: 只公布個人縱向進步（本週 vs 上週），不橫向比較；認可「今天注意到了一個新感覺」而非只認可圈數或秒數。
    - cue: 看看旁邊的泳者怎麼做
      why: 把注意力引向他人表現是外部社會比較觸發，激活自我導向評估， 把感知資源從內感受拉走；對低勝任感學員傷害尤甚。
      better: 改「注意你自己的手在水裡感覺到什麼」——感知目標語言天然是精熟氣候工具。
    sources:
    - Research/心理/04_動機與自我決定.md#動機氣候
    - Research/心理/04_動機與自我決定.md#游泳特異研究
    - Research/心理/04_動機與自我決定.md#連結
  - id: psych.motivation.amotivation_trap
    name_zh: 無動機時，感知學習事實上停擺
    nav_zh: 無動機陷阱
    order: 5
    status: complete
    phenomenon:
      certainty: 🔵
      text: 當選手進入 amotivation 狀態（行為完全外在驅動、無自主意志），感知學習事實上不可能發生。 原因：感知學習（尤其 L4–L6 的精細感知）需要「主動注意力投入」——選手必須自願把意識資源 放在身體感覺上。Pelletier et al. (2001) 直接確認無動機是泳者退出的最強負向預測因子； 但從 amotivation→感知中斷的神經機制是跨領域推導：注意力資源理論（Kahneman）、 運動學習中的意向效果（ideomotor effect）與 SDT 合併推導——amotivation 的外部驅動狀態使 自我監控動機缺席，感知探索頻寬歸零。動機介入因此是感知教學的前置條件，而非附加項。
    hardware_boundary:
      certainty: 🔵
      text: 「amotivation 直接測量到感知探索頻寬」目前無游泳直接量測（研究空白 🔴05）， 此處是 SDT 縱向實證（退出預測）加上注意力理論的跨領域推導，標記 🔵 不冒充直接實驗證據。
    l_levels:
    - L0
    - L1
    - L2
    - L3
    - L4
    - L5
    - L6
    l_note: 影響全 L 範圍，但在 L4–L6 最關鍵——精細感知需要主動注意力；L0–L2 的動作形式模仿在 amotivation 下還可維持表面完成，因此容易被教練誤判為「學得還好」。
    sources:
    - Research/心理/04_動機與自我決定.md#連結
    - Research/心理/04_動機與自我決定.md#SDT應用
  - id: psych.motivation.competence_moderator
    name_zh: 勝任感低的學員對表現氣候最脆弱
    nav_zh: 勝任調節
    order: 6
    status: complete
    phenomenon:
      certainty: 🟢
      text: 表現氣候（ego-involving climate）對選手的傷害程度受主觀勝任感調節：勝任感高時尚能承受 社會比較壓力，勝任感低時傷害最大。游泳直接實證：Masters swimmers study (2025, DOI 10.3389/fpsyg.2025.1574429, n=566 美國 Masters 泳者，平均 54.82 歲)： 自我氣候×低主觀勝任感→對承諾意願產生強烈負向交互效果。 低知覺勝任感是所有初學族群的共同起點：兒童初學、成人初學、長期停游後回訓者。 因此表現氣候對這幾群的課堂設計傷害最大；競技族群（青少年/兒童競技）勝任感較高， ego 氣候的主要傷害點不在承諾退出，而在壓縮再探索空間（見概念 4）。
    population_note: 全族群光譜注意事項：勝任感調節效果不限於成人——兒童初學同樣低勝任感、同樣脆弱； 競技青少年勝任感相對高但並非免疫，尤其在技術停滯期（plateau）時脆弱度上升； 鐵人三項泳者的游泳段勝任感幾乎接近初學者水位，文獻無第一手 ego 氣候傷害量化（素材缺口）； Masters 泳者研究提供了最直接的成人非競技族群數據。
    misconception_refs:
    - cue: 競爭能激發孩子的鬥志
      why: 對低勝任感學員（初學兒童或剛接觸感知學習的任何族群），競爭型刺激直接撞上勝任感調節效果， 產生「自我氣候×低勝任感」的最負面交互，最快觸發退出或表面敷衍。「鬥志」在已有勝任感基礎的選手才適用。
      better: 先用精熟氣候建立可量化的個人勝任感基礎（能感覺到進步），再考慮是否引入適量競爭框架， 且競爭對象是自己上週的感知記錄，而非他人。
    sources:
    - Research/心理/04_動機與自我決定.md#族群特異性
    - Research/心理/04_動機與自我決定.md#連結
  - id: psych.motivation.climate_biology
    name_zh: 表現氣候不只傷動機，也傷身體
    nav_zh: 氣候傷身
    order: 7
    status: complete
    phenomenon:
      certainty: 🔵
      text: 精熟氣候 vs 表現氣候的差異不只是心理感受，也反映在生物指標上。跨運動外推實證： Hogue et al. (2024, PMID 38242101, RCT 56 名男大學生，雜耍技能)：表現氣候組顯示 顯著高於基線的唾液 IL-6（發炎指標）＋威脅評估＋BPN 受阻；精熟氣候組對應更高需求滿足與正向情緒。 Hogue et al. (2025, DOI 10.3389/fpsyg.2025.1667429, 籃球罰球)：精熟氣候（關懷任務導向） 在投籃生物力學、正向情緒、動機指標上均優於自我氣候；自我氣候組顯示心理社會壓力反應。 這是首批以生物指標量化氣候傷害的實驗，從技術習得角度直接顯示精熟氣候促進動作學習。 游泳專屬氣候生物指標尚無研究（研究空白 🔴03），以上均屬跨運動外推。
    hardware_boundary:
      certainty: 🔵
      text: IL-6 是急性期發炎標記，在 30 分鐘短期技能任務中的升高幅度能否外推至游泳長期訓練場景尚未驗證。 樣本限男性大學生，對兒童、競技青少年、成人初學、鐵人三項、Masters 族群的生物指標效應 均屬外推，不可直接套用數字。方向性結論（表現氣候→壓力反應→技術習得下降）的跨項目一致性 目前有兩個不同技能任務（雜耍、籃球）支持，仍需游泳情境複製。
    sources:
    - Research/心理/04_動機與自我決定.md#精熟氣候實驗研究
  - id: psych.motivation.hmiem_bottomup
    name_zh: 一次感知成功可以由下而上修復對游泳的整體態度
    nav_zh: 由下而上
    order: 8
    status: complete
    phenomenon:
      certainty: 🔵
      text: Vallerand（1997）的動機層級模型（HMIEM）把動機分為三層： 整體層（跨情境的人格性動機，如「我是不是運動型的人」）、 情境層（對游泳這項活動的穩定動機傾向）、 狀態層（單次訓練當下的動機）。三層具有雙向影響：上層下行影響（整體→情境→狀態） 與下層上行修復（狀態體驗→情境態度→整體自我認定）。 「先給一次可以做到的感知成功」走的是 bottom-up 動機修復路徑： 單次的成功感知體驗（狀態層：「我今天真的感覺到水托住我了」）若反覆累積， 可由下而上修復對游泳的情境層動機，甚至鬆動「我不是水裡的料」的整體層自我認定。 此推導在 HMIEM 架構內邏輯一致，但「修復時間軸/次數」無游泳量化研究（🔵 推導）。 對成人初學（整體層常已固化負向自我認定）與長期恐水者尤其關鍵。
    hardware_boundary:
      certainty: 🔵
      text: HMIEM 三層架構的跨領域影響效應已有跨運動研究支持，但 bottom-up 修復速度、 所需的成功體驗「劑量」（幾次？密度多高？）在游泳感知情境無直接量化， 口頭鼓勵 vs 真實感知成功對情境層影響的差異也尚未在游泳中實驗對比。
    l_levels:
    - L0
    - L1
    - L2
    l_note: bottom-up 修復的槓桿點在 L0–L2：初學期的狀態層成功體驗決定情境層是否轉正。 L3 以後感知技能已建立，整體層自我認定的改變較已固化初學者容易。
    population_note: 全族群均有效，但操作槓桿不同：成人初學與長期恐水者的整體層負向自我認定最強， bottom-up 路徑是主要介入點（口頭說服效果有限）；兒童初學整體層尚未固化， 狀態層體驗直接塑造情境層；競技青少年的整體層通常已正向，bottom-up 修復主要針對 技術停滯期的情境層動機下滑；鐵人三項泳者多數游泳情境層負向（「最弱的一段」）， 成功的開放水域感知體驗是情境層修復的最有力路徑（🔵）。
    sources:
    - Research/心理/04_動機與自我決定.md#HMIEM
  - id: psych.motivation.population_engines
    name_zh: 不同族群的動機引擎和崩潰點完全不同
    nav_zh: 族群引擎
    order: 9
    status: complete
    phenomenon:
      certainty: 🟠
      text: 動機介入不能一套打全場。現有文獻按族群顯示不同的動機結構： 兒童初學與兒童競技：樂趣優先（fun primacy）＋父母參與是最強動力； 樂趣被表現壓力取代即快速流失（文獻默認族群，autonomy-support 研究主要在此族群）。 青少年競技：從外在/內攝向內化動機逐步轉移（HMIEM）； 參與在 ~11 歲前後達峰後遞減，機制=享受↓、功能性承諾↓、運動貶值↑， 退出存活分析（Difernand et al. 2025, PMID 40110418, n=160,861 法國泳者） 顯示女孩 13.16 歲、男孩 17.50 歲為退出峰值；表現最差下 10% 退出率高達 78–91%。 青少年自主支持的訓練情境比訓練量更能預測續留（系統回顧 PMID 29910410）。 成人初學：目標導向（健康、克服恐懼、社交、陪小孩）＋自我參照勝任感脆弱； 「學不夠快」的挫敗＋社會評價威脅是主要崩潰點；與恐懼主題（cluster 03）的成人恐懼簽名高度耦合。 鐵人三項：游泳是手段而非目的，動機是「不要在游泳段崩掉」的工具性投入； 開放水域 panic 打斷整場比賽信心是最主要崩潰點；鐵人三項游泳動機結構幾無第一手研究（🔴08）。
    population_note: 框架紀律：文獻嚴重偏壓兒童泳課與青少年競技隊，成人初學與鐵人三項是素材缺口， 不以兒童或競技文獻外推填空。上表各族群的崩潰點機制以平行並列而非統一模型呈現； 任何針對某一族群的介入設計不可直接套到其他族群。 退出峰值百分比數字（女 ~64% / 男 ~45%）來源為 🟠 待核原始文獻，不作精確引用。
    misconception_refs:
    - cue: 用青少年競技隊的成就目標框架直接教成人初學或鐵人三項
      why: 族群混淆——青少年競技的社會比較框架（「打贏隊友」「縮短秒數」）撞上成人初學的 低勝任感脆弱性或鐵人三項的工具性動機結構，產生前述最負向的氣候×勝任感交互效果。
      better: 成人初學優先個人進步里程碑；鐵人三項優先開放水域情境熟悉度的可控感。 各族群的動機語言（「你比上週進步了」vs「游泳段你可以掌控了」）需要分別設計。
    sources:
    - Research/心理/04_動機與自我決定.md#族群特異性
    - Research/心理/04_動機與自我決定.md#游泳特異研究
- id: psych.imagery
  name_zh: 意象與心理演練
  nav_zh: 意象
  when_zh: 想用想像在岸上補練、強化動作記憶時
  order: 4
  status: complete
  band: 貫穿全程
  l_band: L0–L6
  level_tag: 全程
  concept_count: 6
  premise:
    layer: public
    certainty: 🟢
    one_line: 在腦中預演一個水感，會活化和真正執行幾乎相同的神經通路—— 意象不是「想像放鬆」，而是把還抓不住的感覺先在離線狀態排練好，從初學的呼吸到競技的整場戰術都用得上。
  concepts:
  - id: psych.imagery.functional_equivalence
    name_zh: 意象在神經層等同於真實動作
    nav_zh: 功能等同
    order: 1
    status: complete
    phenomenon:
      certainty: 🟡
      text: 運動意象與實際執行動作共享相同的神經表徵——意象是在「無運動輸出」的狀態下，啟動同一套動作規劃、 意圖與神經迴路。這意味著意象不只是「想像」，而是一種真實的神經預演：大腦用意象「走一遍」動作， 對應的感知預測與運動迴路同時被激活。2025 年以 fNIRS 測量足球員的研究進一步發現： 專家在想象簡單動作時皮質激活效率更高；想象複雜感知技能（如水感）時激活更深層。 這提示高水平泳者對水感的意象效果可能比初學者更精確，而非更省力。
    hardware_boundary:
      certainty: 🟢
      text: 意象不只激活運動皮質，還誘發運動網絡的可塑性變化，並調節脊髓層面的突觸活動—— 這是意象能促進真實動作改善的神經基礎（PMC7063062）。注意：「功能等價」是跨運動領域的通用發現， 游泳情境下「水感神經表徵是否同樣被意象激活」仍是研究空白，外推時需標明。
    l_levels:
    - L0
    - L1
    - L2
    - L3
    - L4
    - L5
    - L6
    l_note: 貫穿全程：L0–L2 用意象預建入水、呼吸、漂浮的感知腳本；L3–L4 用意象強化手掌/前臂水壓的感知地圖； L5–L6 用意象整合全身場感知。每個 L 級的意象效果受當前技能水平決定，初學者意象精準度低但仍有益。
    sources:
    - Research/心理/05_意象與心理演練.md#1-功能等價functional-equivalence
  - id: psych.imagery.pettlep
    name_zh: 意象越像真實情境，效果越強
    nav_zh: PETTLEP
    order: 2
    status: complete
    phenomenon:
      certainty: 🟡
      text: Holmes & Collins（2001）基於功能等價理論提出 PETTLEP 七原則，核心邏輯是：意象情境越接近實際執行， 神經激活的重疊度越高，訓練效果越佳。七個元素分別是 Physical（姿勢）、Environment（環境細節）、 Task（肌肉張力與感知細節）、Timing（實際速度而非慢動作）、Learning（隨技能進步更新內容）、 Emotion（競技時的情緒喚醒）、Perspective（視角）。2022 年 20 年回顧已整合動作觀察的新方向； 2025 年日本大學生運動員研究（n≈800）實證 PETTLEP 多維結構，發現 Timing 可細分， 視角（第一/第三人稱）為獨立維度。
    intervention_refs:
    - name: PETTLEP 結構化游泳意象腳本
      certainty: 🟢
      how_to: P：穿泳衣、採取划水姿勢（手臂在水線位置）進行意象，而非隨意坐著想； E：重現泳池氣味、水聲、視覺，閉眼喚起場景細節； T：在意象中明確包含「手掌感受到的水壓、前臂流動感、肌肉張力」——這是水感的神經表徵層； T（Timing）：按實際划水節奏，不用慢動作； L：隨著技術精進，更新意象腳本（L2 漂浮感知 → L3 手感 → L4 前臂壓力梯度）； E（Emotion）：比賽前加入競技情緒； P（Perspective）：動覺意象以第一人稱（感受自己動）為主，技術分析時輔以第三人稱（觀察姿勢）。
    - name: VR 輔助 PETTLEP 意象（游泳）
      certainty: 🟢
      how_to: 2025 年 RCT（PMC12229036）顯示，VR 結合 PETTLEP 結構化意象在划臂距離、心率、RPE 等指標均優於傳統訓練。若具備條件，VR 可強化 E（環境）與 T（任務感知）元素的保真度。
    population_note: PETTLEP 的 L（Learning）元素是全光譜適用的關鍵：兒童初學的意象內容應保持簡單（入水、吐氣氣泡）； 青少年競技與鐵人三項可加入戰術與競技情緒層；成人初學若有水中焦慮，P 元素（姿勢）需謹慎， 避免在過度緊張狀態下進行高仿真意象反而強化焦慮記憶。現有 PETTLEP 研究以大學生競技運動員為主， 兒童與成人初學適用方式屬素材缺口，不以競技樣本直接外推。
    sources:
    - Research/心理/05_意象與心理演練.md#2-pettlep-意象模型
  - id: psych.imagery.kinesthetic_priority
    name_zh: 想「感覺」比想「畫面」更能強化水感
    nav_zh: 動覺優先
    order: 3
    status: complete
    phenomenon:
      certainty: 🟡
      text: '意象可依視角分為：內部視覺意象（第一人稱，看見自己動作）、外部視覺意象（第三人稱，旁觀自己）、 動覺意象（感受動作的觸感、阻力、肌肉張力）。Spittle & Morris（2007, PMID: 17566428）發現， 感知主導的任務（需即時感知環境回饋的開放技能）偏向內部視角；形式主導的封閉技能偏向外部視角。 游泳是封閉技能，但「感知水的阻力、壓力分佈、前臂角度」使其具備高度感知主導的成分， 因此動覺意象（KI）與內部視角的組合是強化水感的核心路徑。 2025 年多巴胺研究（n=42，DOI: 10.1007/s00426-025-02225-x）顯示，多巴胺能下降選擇性損害 內部視覺意象，而本體感覺準確度保持穩定——提示動覺/本體感覺與視覺意象涉及部分獨立的神經通路， 強化了「水感訓練需要動覺意象，而非只靠視覺想象」的理論根據。'
    hardware_boundary:
      certainty: 🔵
      text: 動覺意象＋內視角在游泳水感訓練中效果最強的主張是跨領域外推（來自開放/封閉技能視角研究 與多巴胺機制研究），游泳專屬的「動覺意象改善手掌/前臂水壓感知」直接 RCT 目前尚無， 是 Vortex 框架最高優先的原創研究方向。
    misconception_refs:
    - cue: 看優秀泳者的影片多想幾遍就能學到技術
      why: 純視覺意象（第三人稱）對「感知環境」類技能效果有限； 水感需要的是手掌/前臂的阻力感知模擬，影片觀看只提供形式資訊，不激活動覺通路。
      better: 以影片為輔助工具確認外部形式後，切換到閉眼動覺意象：想像手掌入水的阻力感、前臂的水壓， 而非想像自己「看起來」的樣子。
    population_note: 兒童的動覺意象能力（vividness）低於成人，且隨年齡發展；對年幼兒童（6 歲以下）不宜以複雜動覺意象為主， 宜以簡單感知描述（吹氣泡、腳踢水）帶領。青少年競技與成人初學的動覺意象能力差異明顯， 前者受訓年限長、意象能力通常較強；成人初學若缺乏相關感知基礎，動覺意象內容需從最粗粒度開始建立 （如「手放進水裡，感受水的溫度與阻力」）。鐵人三項有游泳基礎，可直接進入細粒度動覺意象訓練。 現有量表（VMIQ-2 / MIQ-RS）均為跨運動通用版，游泳專屬動覺意象量測仍是研究空白。
    sources:
    - Research/心理/05_意象與心理演練.md#4-內部視角-vs-外部視角internal--external-imagery-perspective
    - Research/心理/05_意象與心理演練.md#c-動覺意象-vs-視覺意象的分離效應
  - id: psych.imagery.feedforward_calibration
    name_zh: 意象是乾地上校準水感地圖的工具
    nav_zh: 前饋校準
    order: 4
    status: complete
    phenomenon:
      certainty: 🟢
      text: 'Kilteni 等（2018, PMID: 29691389）的 Nature Communications 研究直接證明： 運動意象涉及「預測動作的感知後果」——大腦的前向模型（forward model）在意象中被調用， 預測「如果這樣動，感覺會是什麼」。關鍵發現是：想象的自我觸碰會產生與真實觸碰相同的 觸覺衰減效應，遵循相同的時空原則。這意味著意象不只是「回放記憶」，而是主動預測感知後果—— 每一次動覺意象循環都在校準前向模型的「期望感知 vs 實際感知」差距。 2025 年 Frontiers Physiology RCT（n=57 精英游泳者，PMC12433939）進一步在游泳情境直接驗證： 閉眼＋運動意象組的腰椎本體感覺準確度顯著優於純技術組，是目前已知在游泳者身上 驗證「意象強化本體感覺精準度」的高品質 RCT。'
    hardware_boundary:
      certainty: 🔵
      text: 「動覺意象改善手掌/前臂水壓感知（feel for water）」仍是研究空白——目前游泳研究以腰椎本體感覺、 整體技術質量、成績為依變數，尚無研究直接以「手掌水壓感知分辨能力」為因變數。 Feedforward 校準連結水感的完整因果鏈屬 Vortex 框架原創推導，待游泳專屬實驗確認。
    l_levels:
    - L2
    - L3
    - L4
    - L5
    l_note: L2–L3：意象可預先建立「手掌入水時應感受到的阻力」感知腳本，縮短下水後感知地圖建立的時間； L4–L5：意象可精煉前臂壓力梯度、流場感知的細粒度預測，強化高水平感知判斷。
    sources:
    - Research/心理/05_意象與心理演練.md#5-運動意象與-feedforward-預測模型的關係
    - Research/心理/05_意象與心理演練.md#a-動覺意象能否預先建立或強化水感
  - id: psych.imagery.functional_types
    name_zh: 意象腳本有目的之分，不能只演練技術
    nav_zh: 意象類型
    order: 5
    status: complete
    phenomenon:
      certainty: 🟡
      text: 'Paivio（1985）與 Hall 等（1998, SIQ）把運動意象的功能分為五類： CS（Cognitive Specific，技能演練）、CG（Cognitive General，策略/戰術）、 MS（Motivational Specific，目標設定）、MG-A（Motivational General-Arousal，情緒與喚醒調節）、 MG-M（Motivational General-Mastery，自信與心理掌控）。 在 Vortex 框架中，「演練手掌入水時感知到的壓力與角度」屬 CS 類，直接針對感知技能； 「建立對水的信任感與自信」屬 MG-M 類，對恐懼者或長期技術卡關的泳者尤其重要。 2025 年多層次 meta 分析（86 研究 3593 名運動員，PMID: 40426460）發現， 意象與 1–2 種其他心理技巧（如放鬆技術）合用效果最佳；單純 CS 意象效果量為中等（d≈0.43）。'
    misconception_refs:
    - cue: 每次意象都想游一趟，把技術演練一遍就好
      why: 只做 CS 類意象會遺漏動機與情緒層面；若泳者面對恐懼或自信缺口， MG-M 類（掌控感意象）反而是優先項——先建立「我能做到」的感知，才能有效進行技術演練。
      better: 依當前需求選擇意象類型：下水前有焦慮 → MG-A（放鬆/喚醒調節）先行； 技術卡關 → CS（感知細節演練）；長期信心低落 → MG-M（掌控感場景）。
    population_note: CS 類意象（技能演練）需要足夠的感知基礎，對尚未建立 L2 以下感知的兒童初學者或恐懼者， CS 意象內容可能空洞或反效果（強化恐慌記憶）；應先以 MG-M（安全、掌控）類意象建立情緒基礎。 青少年競技與鐵人三項以 CS + CG（戰術）為主；成人初學若有社會評價焦慮，MG-M 類意象（「我游得到」） 的優先度高於技術演練。現有功能分類研究以競技運動員為主，兒童與恐懼族群的分類效度是素材缺口。
    sources:
    - Research/心理/05_意象與心理演練.md#3-意象的功能分類paivio-1985--hall-et-al-1998
  - id: psych.imagery.off_water_maintenance
    name_zh: 離水時，意象能減緩水感退化
    nav_zh: 離水維持
    order: 6
    status: complete
    phenomenon:
      certainty: 🟢
      text: 'Driediger、Hall & Callow（2006, PMID: 16368636）針對受傷運動員的質性研究發現， 運動員在無法練習時主動使用動覺意象「保住」動作感覺，明確意圖是防止技術退化。 這與功能等價理論一致：即便沒有真實的身體動作，意象仍在維持運動神經表徵的激活程度。 對游泳而言，受傷停水、旅行無法下水、季外訓練低谷期，動覺意象是維持水感神經表徵的可用工具， 優先於「等回去再練」。'
    hardware_boundary:
      certainty: 🔵
      text: 意象能「維持」水感神經表徵的假設合理，但「維持多久、退化速率降低多少」在游泳情境缺乏直接量測。 Driediger 研究對象為一般競技運動員（非游泳專屬），外推至「手掌水壓感知的保留」需謹慎。 停訓期意象的最佳頻率與結構（PETTLEP 標準適用性）同屬研究空白。
    intervention_refs:
    - name: 停訓期動覺意象維持方案
      certainty: 🔵
      how_to: 每日 10–15 分鐘，依 PETTLEP 原則進行：穿上泳衣或採取划水姿勢（P）， 重現泳池環境細節（E），明確想象手掌壓水、前臂承壓、踢水節律的感知細節（T）， 按實際游速進行（T-timing），包含回到水中的情緒期待（E-emotion）。 停訓結束後第一次下水前加做一組意象，縮短重新建立水感地圖的時間。
    population_note: 對競技青少年與鐵人三項在停賽/傷後期間最為實用，因為技術退化影響直接反映在成績。 兒童初學的「水感」本體感覺地圖尚未鞏固，停訓後意象維持效果理論上低於已建立感知基礎的泳者； 成人初學若剛開始建立感知，停訓期意象優先維持 MG-M 類（情緒安全感），而非複雜動覺細節。 意象維持方案對所有長期停水族群均有潛在效用，但目前文獻基礎來自受傷競技運動員， 其他停水情境（旅行、季外、育兒中斷）的效果是素材缺口。
    sources:
    - Research/心理/05_意象與心理演練.md#視角與測量
- id: psych.attention
  name_zh: 注意力焦點
  nav_zh: 注意力
  when_zh: 一上場就分心、不知道該把注意力放哪時
  order: 5
  status: complete
  band: 進階競技端
  l_band: L3–L6
  level_tag: 進階·競技
  concept_count: 6
  premise:
    layer: public
    certainty: 🟢
    one_line: 把注意力放在「手要怎麼動」（內部焦點）反而會打斷自動化、壓低表現； 放在「水被推開」（外部焦點）才讓動作流暢——感覺水的第三類焦點，是進階水感的注意力地基。
  concepts:
  - id: psych.attention.ef_if_definition
    name_zh: 注意力方向決定動作是受控還是自動
    nav_zh: 內外焦點
    order: 1
    status: complete
    phenomenon:
      certainty: 🟡
      text: 注意力焦點的方向分兩類。內部焦點（IF）：注意力指向身體部位或自身動作步驟， 例如「抬高手肘」、「把手拉回來」。外部焦點（EF）：注意力指向動作對環境造成的效果 或外在物件，例如「把水往後推」、「把手掌推向牆壁」。此分類由 Wulf & Prinz（2001）系統定義，核心主張是：將注意力指向動作「效果」 而非動作「步驟」，可以增強學習與表現。
    misconception_refs:
    - cue: 感受你的手怎麼划
      why: 這是典型的內部焦點指令——把泳者注意力鎖在身體部位（手的動作）， 根據受限動作假說（CAH），這會干擾皮質下自動化迴路，使動作變得僵硬、不流暢。 在有一定自動化基礎的泳者身上，此指令反而會使表現下降。
      better: 把注意力移向效果：「感覺水被你的手掌推往後方」—— 相同的動作但焦點落在水（外部），讓自動化機制自行處理手的路徑。
    - cue: 把手肘抬高
      why: 「把手肘抬高」是內部焦點指令，注意力鎖在關節位置， 對已有自動化基礎的泳者可能干擾流暢度；對初學者的研究較少，此指令 對尚未自動化者的效果尚不確定。
      better: 「讓你的指尖在最遠的地方感覺到水」——同時引導到正確動作形狀， 且焦點更偏向感知效果而非關節位置。
    population_note: 多數 EF/IF 實驗以成人受試者為主，兒童泳者族群直接資料極少； 初學者（兒童或成人）的自動化程度低，部分研究提示 proximal EF 或混合策略 在初學階段可能比 distal EF 更適合，不應將精英/成人研究結論直接套用至兒童初學。 鐵人三項、青少年競技、成人初學對此框架的反應差異均屬素材缺口，需分族群判斷。
    sources:
    - Research/心理/01_注意力焦點與動作學習.md#1-內部焦點-vs-外部焦點定義
  - id: psych.attention.cah
    name_zh: 內部焦點會綁架自動化，外部焦點讓動作自組
    nav_zh: 約束行動
    order: 2
    status: complete
    phenomenon:
      certainty: 🟡
      text: 受限動作假說（Constrained Action Hypothesis, CAH）的核心命題： 採用內部焦點時，動作者對動作施加有意識的控制，干擾了皮質下自動化迴路， 使動作「受限」（constrained）、變得更僵硬、耗能更高。 採用外部焦點時，動作系統可利用自動化控制程序自然自組（self-organize）， 動作更流暢、更高效。實驗典型設計（動態平衡板任務）顯示，外部焦點組 平衡誤差更小、雙重任務探針反應時間更短，代表自動化程度更高。 游泳直接研究（Freudenheim et al., 2010）在中等程度游泳者身上複製此效果： EF 指令（「把水往後推」）組泳速顯著優於 IF 指令（「把手拉回來」）組。
    hardware_boundary:
      certainty: 🔵
      text: 'CAH 的神經機制主張（有意識控制干擾皮質下迴路）是理論推導， 直接的游泳神經影像測量仍是研究空白。游泳任務（持續開放技能） 與 CAH 核心實驗（離散平衡板任務）性質不完全可比，外推需謹慎。 此外，2024 年一篇穩健貝葉斯元分析（PMID: 39480294）修正發表偏誤後， 外部焦點優越性的平均效果量接近零，且各研究異質性極高—— 「EF 永遠優於 IF」的強版命題需要放棄；效果因人、因任務、因情境而異。'
    l_levels:
    - L3
    - L4
    - L5
    - L6
    l_note: 自動化干擾效應在已建立一定自動化基礎的泳者（L3 以上）最相關； L0–L2 的初學者尚未自動化，IF 是否同樣有害尚無定論。
    misconception_refs:
    - cue: 游泳時多想動作才能進步
      why: 「多想」等同於強化內部焦點，在有自動化基礎的泳者身上 反而會干擾自動化迴路，使動作更僵硬而非更精確。 Stoate & Wulf（2011）的精英游泳者研究顯示，IF 組泳速顯著慢於對照組。
      better: 讓注意力停在動作對水的效果上——「水是不是被你推走了」—— 而非停在身體部位；高技能者需要的是更好的感知回饋，不是更多的意識控制。
    population_note: 游泳直接研究（Freudenheim 2010、Stoate & Wulf 2011）受試者分別為 「中等程度游泳者」與「精英游泳者」，兒童泳者、青少年競技、鐵人三項、 成人初學均缺乏直接游泳 CAH 資料。兒童初學可能需要不同的焦點引導策略， 不應以成人中等/精英資料外推。
    sources:
    - Research/心理/01_注意力焦點與動作學習.md#2-受限動作假說cah
    - Research/心理/01_注意力焦點與動作學習.md#6-批判性補充bayesian-meta-analysis
    - Research/心理/01_注意力焦點與動作學習.md#游泳直接證據
  - id: psych.attention.elite_resilience
    name_zh: 精英泳者自動化強，但內部焦點仍有打擾力
    nav_zh: 精英韌性
    order: 3
    status: complete
    phenomenon:
      certainty: 🟡
      text: 'Stoate & Wulf（2011）研究精英游泳者（EF vs IF vs 控制組）發現： EF 組表現與控制組相同；IF 組泳速顯著慢於控制組。 這說明精英者有強大的自動化保護機制，不需要外部焦點也能維持高水準—— 但內部焦點仍有足夠的打擾力使表現下降。 另一項精英游泳者起跳動作研究（HMS, 2021, PMID: 33845276）則顯示， EF 下動作事件序列提前（更好的自組織），但結果指標（相對峰功率、5m 時間） 無顯著差異——彈性維持，結果持平但動作品質提升。'
    l_levels:
    - L5
    - L6
    l_note: 精英級（L5–L6）的泳者對注意力干擾有較高耐受度， 即使 EF 效果不明顯，避開 IF 仍有意義。
    misconception_refs:
    - cue: 精英選手當然可以一邊想動作一邊游
      why: 實驗結果相反：即使是精英泳者，刻意採用 IF 仍會使泳速顯著下降； 精英者的自動化程度讓他們不「需要」想，不代表「想了也沒事」。
      better: 精英者的訓練目標應是讓動作更不需要被意識到—— 教練反饋以感知效果為錨點，不以身體部位為錨點。
    population_note: 此主題直接游泳資料集中在精英成人或大學競技泳者； 兒童競技、青少年競技的精英群體，以及鐵人三項選手， 在 EF/IF 干擾敏感度上缺乏直接研究，不應直接套用精英成人的容忍度預設。
    sources:
    - Research/心理/01_注意力焦點與動作學習.md#游泳直接證據
  - id: psych.attention.distance_effect
    name_zh: 焦點越遠離身體，動作越自由
    nav_zh: 距離效應
    order: 4
    status: complete
    phenomenon:
      certainty: 🟡
      text: 外部焦點中，越遠離身體的焦點（distal EF）比越靠近身體的焦點（proximal EF）更有效。 例子：注意靶心優於注意飛鏢路徑；注意終點線優於注意船的穩定性。 機制：更遠的焦點使動作效果更易與身體動作本身區分，更清晰啟用「以效果為目標」的運動規劃； 讓自動化系統有更多空間自組織，身體動作退為手段而非目的。 2025 年一篇系統性回顧與元分析（PMC12424610）整體支持此方向， 但指出個人差異與技能水平調節此效果：高技能者從 distal 獲益更穩定； 低技能者部分研究顯示 proximal EF 可能更合適（更近的回饋錨點）。
    hardware_boundary:
      certainty: 🔵
      text: 游泳環境是均質水體，缺乏陸地運動研究的清晰外部目標（靶心、終點線、沙坑）； 「把水往後推」算 distal 還是 proximal EF 本身就有爭議。 游泳中距離效應的直接比較研究幾乎空白（🔴）， 現有結論來自非水中運動外推，游泳應用需以 🔵 謹慎對待。
    l_levels:
    - L3
    - L4
    - L5
    - L6
    l_note: 技能水平調節距離效應：L3–L4 初中階泳者可能從「中距離」外部焦點開始， 高水準泳者（L5–L6）才穩定從 distal EF 獲益。
    misconception_refs:
    - cue: 專注在你的手感覺到什麼（跟水接觸的地方）
      why: 「手感覺到什麼」是 proximal 的感知焦點，按距離效應， 對有自動化基礎的泳者效果不如將焦點移往水流路徑的更遠端； 且「手的感覺」本身帶有 IF 傾向（感覺來自本體感覺系統）。
      better: 「感覺水流過你的整條手臂往後方流走」——焦點從手掌移往水流的遠端效果。
    population_note: 距離效應的游泳直接研究空白；陸地文獻受試者以成人為主。 兒童初學焦點控制能力本身尚未成熟，「遠端焦點」可能超出其注意力掌控範圍； 兒童族群的最適焦點距離應分開評估，不得從成人文獻外推。 鐵人三項選手在開放水域可能需要利用真實的遠端地標（浮球、岸上目標） 作為 distal EF 的物理錨點，這是有別於池泳的族群特異應用。
    sources:
    - Research/心理/01_注意力焦點與動作學習.md#4-距離效應distance-effect
    - Research/心理/01_注意力焦點與動作學習.md#研究空白
  - id: psych.attention.water_sense_third_category
    name_zh: 「感覺水」不是 IF 也不是 EF——水感是感知耦合
    nav_zh: 第三類焦點
    order: 5
    status: complete
    phenomenon:
      certainty: 🔵
      text: Wulf 的 EF/IF 二元框架在游泳「感覺水」的情境下面臨分類困難。 支持「感覺水 = EF」：水是身體外的環境，感覺水的阻力與回饋是外部焦點 指令（「推水」）執行時的自然感知後果，與意動原則相容。 支持「感覺水 = 特殊 IF 或框架外」：水中感覺主要來自本體感覺與皮膚壓力受器， 這是身體內部感知系統的輸出；Gottwald et al.（2020）提示當任務高度依賴 本體感覺訊息時，與之相符的內部焦點表現反而可能最佳。 生態動力學視角（Frontiers, 2023, PMC10244639）則主張 EF/IF 二元框架 本身在水感情境下不充分——任務是運動者與環境的感知耦合， 而非注意力落點的二元選擇。 本專案的理論定位：「感覺水」最接近一種第三類別——感知耦合 （perceptual coupling），注意力的對象是身體與水的交界面， 感覺本身就是動作調節的訊號，而非效果的「驗證」。 這與 Wulf 框架不是矛盾，而是不同層次的描述： Wulf 描述指令語言如何影響短期表現；水感框架關注感知靈敏度的長期培育。
    hardware_boundary:
      certainty: 🟢
      text: 'Heath（2022, DOI: 10.1080/17458927.2022.2135358）的民族誌研究顯示， 競技游泳者將水質感知視為具身知識的核心，是「身體知識與技能動作共同產生的感知」， 而非外加的注意力焦點指令。2024 Bayesian meta-analysis（PMID: 39480294） 修正發表偏誤後外部焦點優越性效果接近零，支持「焦點效果因情境而異」的結論， 也為「感覺水」作為特殊類別提供了理論空間。 「感覺水作為獨立注意力策略的實驗研究」目前是研究空白（🔴）。'
    l_levels:
    - L3
    - L4
    - L5
    - L6
    l_note: 感知耦合層次的水感訓練是 L3 以上的核心主題—— 在基礎自動化建立後，訓練感知靈敏度讓自動化系統有更豐富的輸入訊號可用。
    misconception_refs:
    - cue: 感覺水就是外部焦點，所以比想動作好
      why: 「感覺水 = EF」的推論會讓人誤以為只要「想著水」就自動符合 Wulf 框架的優越效果； 但感覺水的注意力目標（本體感覺 + 皮膚壓力的交界感）和 Wulf 典型 EF （靶心、終點線等可視外部目標）在機制上有根本差異，不應混用。
      better: 不以 EF/IF 分類衡量「感覺水」的訓練價值； 水感訓練的目標是提升感知靈敏度，使動作系統從更豐富的訊號中自組織—— 這是獨立的訓練軸線，不在 EF/IF 競爭框架內。
    - cue: 感覺水是 IF，所以會打斷自動化，不應該練
      why: 把「感覺水」歸類為 IF 後，直接套用 CAH 得出「不應練」的結論， 跳過了「本體感覺主導型任務中 congruent IF 可能最優」的例外， 也忽略了生態動力學框架對 EF/IF 二元分類本身的批評。
      better: 「感覺水」的訓練目標是建立感知系統的靈敏度，不是競爭 EF/IF 框架下的注意力位置； 兩者目標層次不同，不應互相否定。
    population_note: Heath（2022）的研究對象為競技青少年游泳者——感知耦合框架的直接游泳資料主要來自此族群。 兒童初學、鐵人三項、成人初學在「感知主導型水感培育」上均缺乏直接研究； 生態動力學框架是理論外推，不同族群的感知耦合發展路徑可能有顯著差異。
    sources:
    - Research/心理/01_注意力焦點與動作學習.md#外部焦點-vs-感覺水-的張力分析
    - Research/心理/01_注意力焦點與動作學習.md#與水感框架的連結
    - Research/心理/01_注意力焦點與動作學習.md#6-批判性補充bayesian-meta-analysis
  - id: psych.attention.association_dissociation
    name_zh: 長距離游泳：監測身體 vs 轉移注意力，各有用途
    nav_zh: 聯結與分離
    order: 6
    status: complete
    phenomenon:
      certainty: 🟡
      text: 耐力型運動中有另一條平行的注意力框架，與 Wulf 的 EF/IF 軸獨立。 聯結策略（Association）：注意力集中在身體內部感覺——心跳、呼吸節奏、 肌肉感覺、疼痛與疲勞訊號。分離策略（Dissociation）：注意力轉移到 外在刺激或無關思緒，以抑制不適感覺（聽音樂、數呼吸、看場景等）。 Morgan & Pollock（1977）的經典研究顯示精英長跑者傾向聯結策略， 業餘者傾向分離；但 Masters & Ogles（1998）20 年回顧指出兩者研究結果 並不一致，方法論差異大。游泳直接研究（TSP, 1999）顯示休閒游泳者 採聯結策略比控制組游得更快；另有研究提示長距離游泳中 認知策略的「偏好適配程度」比策略類型本身更重要。
    l_levels:
    - L3
    - L4
    - L5
    - L6
    l_note: 聯結 vs 分離策略在長距離比賽中最相關（L3 以上，有基礎自動化後才有意義選擇策略）； 短衝比賽技術維持多需聯結策略持續監測技術感覺；長距離高強度末段可借助分離策略 繞開疲痛感，讓配速繼續。
    intervention_refs:
    - name: 技術聯結策略（短距衝刺 / 技術維持段）
      certainty: 🔵
      how_to: 設定「技術感覺錨點」（如每次換氣都回來確認水感）， 作為聯結的內容——聯結的不是疼痛訊號，而是技術感覺訊號。
    - name: 分離策略（長距離高強度末段）
      certainty: 🟡
      how_to: 預先設計分離的「目標」（節拍、計圈、場景）； 不是「不想任何事」而是「把注意力帶到另一個具體目標」， 避免分離策略反而讓注意力漂移。
    population_note: 聯結 vs 分離的游泳研究以休閒游泳者與業餘泳者為主；精英游泳者的資料不足。 鐵人三項選手在長距離游泳段（尤其開放水域）的認知策略是素材缺口—— 開放水域的定位需求可能強制要求部分外部注意力，使純分離策略難以維持。 兒童泳者的聯結/分離能力受後設認知發展限制，不應套用成人策略框架。 青少年競技泳者長距離訓練中的認知策略使用幾乎無直接研究。
    sources:
    - Research/心理/01_注意力焦點與動作學習.md#5-聯結-vs-分離策略association-vs-dissociation
    - Research/心理/01_注意力焦點與動作學習.md#游泳特異證據-vs-跨運動外推
- id: psych.self_talk
  name_zh: 自我對話與心理技能
  nav_zh: 自我對話
  when_zh: 腦中雜念停不下、想用自我喊話穩住表現時
  order: 6
  status: complete
  band: 進階競技端
  l_band: L3–L6
  level_tag: 進階·競技
  concept_count: 8
  premise:
    layer: public
    certainty: 🟢
    one_line: 自我對話不只是打氣——指導式自我對話能在動作當下調準感知焦點， 而負面自我對話會佔走本該用來感覺水的工作記憶。這是可訓練的心理技能，不是天生的性格。
  concepts:
  - id: psych.self_talk.trainable_skill
    name_zh: 自我對話是技能，不是性格
    nav_zh: 可練技能
    order: 1
    status: complete
    phenomenon:
      certainty: 🟢
      text: 自我對話（self-talk）是人清醒時持續運作的內部獨白，包含技術指令、激勵語言、自我評價、 注意力導向等多種功能。跨 32 個研究、62 個效應值的元分析顯示，整體效果量 ES = 0.48—— 自我對話對運動表現有中等顯著效益，且「經過訓練介入的自我對話」優於未訓練的即興自我對話。 這表示自我對話不是固定的性格傾向，而是可以系統性訓練的心理技能。 對泳者而言，關鍵不是「正向思考」口號，而是自我對話是否可信（believable）並導向當下任務。
    misconception_refs:
    - cue: 你就是個容易想太多的人
      why: 把自我對話模式歸為不可改變的性格，讓泳者放棄主動調整的可能。 實際上干擾性思維是可量測、可介入的認知歷程，不是固定特質。
      better: 把注意力模式外化為「這趟你腦子裡在跑什麼」——讓泳者觀察自己的內部話語， 再給具體的替換提示語，而非性格評斷。
    population_note: 自我對話研究的受試者高度集中在競技青少年與大學生運動員； 兒童初學的自我對話能力受語言與後設認知發展限制，年齡越小效果越難類推， 不可用競技成人資料外推；成人初學的干擾性思維多夾雜社會評價（「這年紀才學」）， 介入切入點與競技族群不同；鐵人三項群體游泳段的焦慮機制又與前述不同，需另行處理。
    sources:
    - Research/心理/06_自我對話與心理技能訓練.md#核心概念
    - Research/心理/06_自我對話與心理技能訓練.md#關鍵文獻清單
  - id: psych.self_talk.ist_mst_matching
    name_zh: 指導型配技術任務，激勵型配耐力任務
    nav_zh: 指導配激勵
    order: 2
    status: complete
    phenomenon:
      certainty: 🟢
      text: 自我對話依內容分兩大類：指導型（IST，如「手肘高提」「把水推後」）指向具體技術動作或注意焦點； 激勵型（MST，如「撐過去」「我可以」）指向努力、信心、情緒調節。 配對假說（Matching Hypothesis）的元分析支持：IST 在精細動作技能任務上成效顯著優於 MST； MST 在耐力與爆發力任務上效果明顯。游泳池中的直接研究（水球精度任務 vs 力量任務） 複製了同樣的模式：精度任務 IST 優、力量任務 MST 優， 兩者均能降低干擾性思維（interfering thoughts）。
    l_levels:
    - L2
    - L3
    - L4
    - L5
    - L6
    l_note: 技術精煉階段（L3–L6）多屬「精細動作 → IST 優先」； L2 以下感知基礎建立期的泳者，若尚無穩定動作模板，IST 的效果較難預測。 長距離耐力游泳段（鐵人三項游泳、1500m）屬「耐力任務 → MST 優先」， 與 L 等級無關，取決於任務性質。
    misconception_refs:
    - cue: 正面想就好，想著「我可以」技術就會穩
      why: 激勵型自我對話提升信心與努力，但不傳遞任何技術焦點信息。 精細動作任務（如轉身節奏、入水角度）需要注意力導向的指導型提示， 純激勵語言無法替代。
      better: 依任務性質選語言：技術學習趟用指導型提示詞（一個動作重點、一個感知目標）； 衝刺或耐力趟再切換激勵型語言。不混用同一趟。
    - cue: 多給幾個要點他才能記住
      why: 工作記憶同時處理多條指令時反而加重認知負荷，干擾自動化執行。 游泳中同時說「手肘高、頭別抬、腿別沉」等於要求泳者分配注意力到三個焦點—— 感知頻寬被佔滿，水感信號反而進不來。
      better: 每趟只給一個提示詞，讓其餘動作維持自動化執行。
    sources:
    - Research/心理/06_自我對話與心理技能訓練.md#指導型-vs-激勵型自我對話
    - Research/心理/06_自我對話與心理技能訓練.md#游泳特異研究-vs-跨運動外推
  - id: psych.self_talk.external_focus_ist
    name_zh: 「把水推後」比「拉手」更有利熟練執行
    nav_zh: 外部焦點語
    order: 3
    status: complete
    phenomenon:
      certainty: 🟢
      text: 指導型自我對話依注意力焦點可進一步分為：外焦點化 IST（描述動作對水的效果， 如「把水推到身後」「讓水從掌心滑過」）和內焦點化 IST（描述身體部位的位置， 如「拉手回來」「手肘彎曲」）。 游泳速度研究（Freudenheim et al. 2010）顯示，外焦點指令（"push the water back"） 比內焦點指令（"pull hands back"）顯著縮短 16m 時間，對中級前泳者與專家泳者均成立。 其機制來自「受約束行動假說」（Constrained Action Hypothesis, Wulf 2013）： 外焦點促進運動程序的自動化執行；內焦點引發有意識干預，破壞流暢動作。 這解釋了為何 Vortex 框架的流體意圖語言（「推水方向、水的回饋」） 比身體運動語言（「手臂路徑、關節位置」）更利於技術鞏固。
    hardware_boundary:
      certainty: 🔵
      text: 這個規律在熟練度較高的泳者身上更顯著；早期學習階段（L0–L1）部分研究顯示 內焦點在動作模板初建時也有作用。外焦點化 IST 的優勢主要在技術鞏固與自動化階段， 不可一概而論地對所有學習者、所有動作阶段施用。
    l_levels:
    - L3
    - L4
    - L5
    - L6
    l_note: L3 以上的泳者已有基礎動作模板，自動化與精煉為主——外焦點化 IST 優勢最大。 L0–L2 的初學者與恐懼者尚在建立基本動作語彙，內外焦點指令的相對優勢仍需個別評估。
    misconception_refs:
    - cue: 手肘高提、手進水線不過中線（持續給身體部位指令）
      why: 對有一定技術基礎的泳者，身體部位導向的指令把注意力拉向內焦點， 觸發有意識的肌肉監控，干擾已建立的自動化動作，反而讓動作退步或僵硬。
      better: 把相同技術意圖轉為流體結果語言： 「手肘高提」→「讓掌心一直朝向池底那端」； 「進水不過中線」→「讓指尖找到它自己的水，別切到另一邊的水」。
    sources:
    - Research/心理/06_自我對話與心理技能訓練.md#與水感框架指令層次注意力焦點的連結
    - Research/心理/06_自我對話與心理技能訓練.md#游泳特異研究-vs-跨運動外推
  - id: psych.self_talk.interfering_thoughts_bandwidth
    name_zh: 負面自我對話佔工作記憶，水感信號進不來
    nav_zh: 干擾佔頻
    order: 4
    status: complete
    phenomenon:
      certainty: 🔵
      text: 游泳中水感知（水壓分佈、流場變化、浮力回饋等）是細微的感知信號， 需要注意頻寬才能接收和處理。干擾性思維（interfering thoughts）——包含擔憂成績、 反覆復盤失誤、預判失敗——持續佔用工作記憶資源，與感知處理競爭相同的認知頻寬。 游泳池中的實驗研究（Hatzigeorgiadis et al. 2004）直接量測到：IST 和 MST 均能顯著降低干擾性思維的報告量，而干擾性思維降低與表現提升相關。 跨領域推導：工作記憶在焦慮狀態下的容量縮減是認知心理學的核心發現； 游泳情境中干擾思維→感知頻寬減少的直接量測仍是研究空白。
    hardware_boundary:
      certainty: 🔵
      text: 注意：「干擾性思維降低 → 表現提升」的因果鏈在游泳池中有直接實驗支持； 但「干擾思維 → 水感信號受阻」的說法是從工作記憶容量理論外推至游泳感知， 不是已直接量測的游泳實證，使用時需誠實標注推導性質。
    misconception_refs:
    - cue: 你要集中精神、專心
      why: 「專心」作為裸命令，不傳遞任何注意力焦點內容——泳者不知道要「專心在哪裡」。 對已有干擾思維的泳者，這句話增加一層焦慮（「我應該要專心但做不到」）， 而非給出注意力重新錨定的工具。
      better: 給出具體的感知錨點：「這趟把注意力放在掌心感受水壓這一件事上」。 干擾性思維沒有辦法靠命令消除，但可以被明確的感知目標「擠走」。
    population_note: 不同族群的干擾思維來源不同：競技青少年多為成績/排名焦慮； 成人初學多為社會評價（「出醜」「這年紀才學」）； 鐵人三項在開放水域段的干擾思維有很強的環境觸發成分（看不到底、人群）。 介入語言要對應來源，不能套同一個提示詞。
    sources:
    - Research/心理/06_自我對話與心理技能訓練.md#自我對話的作用機制
    - Research/心理/06_自我對話與心理技能訓練.md#與水感框架指令層次注意力焦點的連結
  - id: psych.self_talk.tense_drift
    name_zh: 心思跑去過去或未來，水感就斷線
    nav_zh: 時態漂移
    order: 5
    status: complete
    phenomenon:
      certainty: 🟠
      text: Bauman（Science of Swimming Faster, Ch.16）提出「重力（gravity）」隱喻： 身體只能在「現在」，但心智可以漂移到三個時態。 高效表現的條件是心智與身體在「當下」對齊—— 這與 Vortex 框架中「水感知」需要當下感覺輸入的機制直接對應： 水感是一個實時信號，過去（「上一趟游得很爛」）或未來（「萬一出發失誤怎麼辦」） 的心智時態讓泳者根本不在水裡，感知通道無從更新。 建設性自我對話的時態特徵是當下導向（「現在的工作是這一刻游快」） 與過程導向（「這次轉身要乾淨」），而非結果導向（「我必須破個人最好成績」）。
    misconception_refs:
    - cue: 把目標設成個人最佳（PR）
      why: 以個人最佳成績作為單一賽前目標，成功機率本身極低， 造成高賽前焦慮並把心智拉向未來結果，脫離當下過程感知。 這不是「放棄高標準」，而是目標的時態框架問題。
      better: 把目標語言從結果（「破PR」）轉向當下過程（「這趟的工作是：起跑後第一個臂循環感受水壓， 保持節奏到 25m」）。結果目標可以存在，但賽中的自我對話換成過程提示詞。
    population_note: 時態偏移在競技青少年（結果焦慮）與成人初學（社會評價焦慮）都很常見， 但觸發源和語言形式不同；兒童競技較少出現複雜結果性自我對話， 但父母賽後評價可能在下場前就植入「必須表現好」的時態框架。 文獻來源（Bauman, 書籍二手）描述的主要是競技成人泳者情境， 對非競技或兒童族群屬外推，需謹慎。
    sources:
    - Research/心理/06_自我對話與心理技能訓練.md#自我對話的時態框架過去現在未來
  - id: psych.self_talk.mst_endurance_efficiency
    name_zh: 激勵型自我對話讓耐力游泳更快，但感覺不到更累
    nav_zh: 激勵耐力
    order: 6
    status: complete
    phenomenon:
      certainty: 🟢
      text: 業餘鐵人三項選手的游泳段研究（Matos et al. 2020）顯示：激勵型自我對話（MST） 組的游泳成績提升 2.8%，每 150m 配速加快，且自覺費力程度（RPE）與對照組相同—— 也就是說 MST 在不增加主觀努力感知的情況下提升了耐力游泳表現。 此機制符合 MST 的功能定位：延後疲勞的主觀體驗、維持努力強度。 這表示耐力游泳段（長距離、鐵人三項游泳）是 MST 直接有效的場景， 不需要「感覺更累才有效」的心理準備。
    l_levels:
    - L2
    - L3
    - L4
    - L5
    l_note: 此效果適用於有基礎游泳能力的耐力游泳情境（鐵人三項、中長距離競技、馬拉松游泳）。 技術學習期的泳者或 L0–L1 的初學者，主要任務是感知基礎建立而非耐力維持， MST 對這個階段的幫助有限，不可直接類推。
    population_note: Matos 2020 的受試者為業餘鐵人三項選手，游泳能力中等偏上。 對兒童初學或純競技短距離泳者的適用性需獨立研究，目前不可外推； 鐵人三項族群是本研究最直接受益的群體，亦是現有游泳專屬研究最薄弱的族群之一—— 此研究填補了部分缺口。
    sources:
    - Research/心理/06_自我對話與心理技能訓練.md#關鍵文獻清單
    - Research/心理/06_自我對話與心理技能訓練.md#游泳特異研究-vs-跨運動外推
  - id: psych.self_talk.pre_performance_routine
    name_zh: 賽前例行程序讓每次起跑都從相同感知基準線出發
    nav_zh: 賽前例行
    order: 7
    status: complete
    phenomenon:
      certainty: 🟢
      text: 賽前例行程序（Pre-Performance Routines, PPR）是在比賽前依固定順序執行的身心準備序列。 跨 112 個效應值的元分析（Rupprecht et al. 2021）顯示 PPR 對運動表現有效： 前後測設計 SMC = 0.31，實驗設計 Hedges' g = 0.64（低壓條件）。 1996 亞特蘭大奧運後對 8 支美國代表隊的訪談研究（Gould et al. 1999）發現， 達標隊與未達標隊最大差異之一，是達標隊有已練習且在大賽中仍堅持執行的身心準備計畫。 游泳專屬研究（Richard et al. 2021，46 名 NCAA D1 泳者）顯示 PPR 介入 在速度與動作效能指標上效果不顯著，但情緒狀態顯著改善—— 表明 PPR 主要作用在情緒穩定與注意力聚焦，而非直接提升生理輸出。 從 Vortex 框架看，PPR 中的熱身與感知提示詞練習， 可作為「感知通道校準」的儀式：讓泳者在起跑前建立當天的水壓回饋基準線。
    hardware_boundary:
      certainty: 🔵
      text: 「PPR 作為感知校準儀式」是 Vortex 框架與 PPR 研究的整合推導， 非已被直接驗證的游泳實證；PPR 對情緒狀態的效果（Richard 2021）是現有游泳直接證據， 對客觀速度指標的效果仍有限，使用時需誠實說明研究發現的範圍。
    misconception_refs:
    - cue: 比賽前反覆告訴自己「要放鬆、要放鬆」
      why: 重複激勵性口號若與實際身體狀態脫離（已經很緊卻硬說放鬆）， 會讓泳者感知到指令與現實的落差，反而增加焦慮或自我懷疑； PPR 的有效性來自與固定感知/行為序列的連結， 裸口號缺少可執行的行為錨點。
      better: PPR 中的自我對話提示詞要與具體可感知的行為綁定—— 例如「腳踩啟動點、深呼吸、感覺水溫」的固定序列， 而不是漂浮在空中的激勵語言。
    population_note: PPR 文獻以競技成人與大學運動員為主（包含游泳 NCAA D1 研究）； 兒童競技泳者的 PPR 設計需考量認知發展限制（序列記憶、後設認知）—— 過複雜的例行程序可能增加負擔而非減少； 成人初學多無比賽情境，PPR 的等效場景是練習前的固定熱身感知校準序列； 鐵人三項的 PPR 需同時涵蓋三項間的身心切換，與純游泳 PPR 有結構差異。
    sources:
    - Research/心理/06_自我對話與心理技能訓練.md#賽前例行程序
    - Research/心理/06_自我對話與心理技能訓練.md#關鍵文獻清單
  - id: psych.self_talk.systematic_training
    name_zh: 練過的自我對話比臨時起意有效
    nav_zh: 系統練習
    order: 8
    status: complete
    phenomenon:
      certainty: 🟢
      text: 41 名競技青少年泳者（平均年齡 14.6 歲）參與的 10 週自我對話訓練研究 （Hatzigeorgiadis et al. 2014）顯示：系統性自我對話介入組的游泳表現改善 顯著優於無訓練的控制組，且長期訓練介入優於短期。 跨運動的元分析（Hatzigeorgiadis et al. 2011）亦顯示， 「有接受自我對話訓練」的組別效益高於「未訓練而即興使用」的組別。 系統性 PST（心理技能訓練）整體回顧（2023 review of reviews）顯示 12 週 PST 的改善可持續至 6 個月後，長期或個人化 PST 效果優於短期標準化 PST， 但現有研究品質普遍偏低（critically low quality），需謹慎詮釋。 實用推論：自我對話 cue word 需要在訓練中反覆與特定感知狀態綁定， 才能在比賽壓力下被可靠地觸發——臨場被動重複口號幾乎無效。
    intervention_refs:
    - name: 泳者自訂自我對話腳本（customized cue words）
      certainty: 🟢
      how_to: 由泳者自己選擇或創造與自身動作感知對應的提示詞（不由教練代定）， 在訓練趟中與目標感知反覆連結，直到提示詞能可靠地喚起對應感知狀態。 Zach（2024 游泳整合回顧）建議泳者自訂腳本並與教練共同評估。
    - name: 分階段導入（陸上 → 訓練低壓趟 → 高壓趟 → 比賽）
      certainty: 🟢
      how_to: 自我對話技能從陸上練習（識別干擾思維、選 cue word）開始， 先在低壓訓練趟中測試，穩定後導入計時趟或模擬賽，最後帶入正式比賽。 跳過低壓練習直接在比賽中試用新 cue word，成功率低。
    population_note: Hatzigeorgiadis 2014 的受試者為競技青少年泳者，是目前游泳直接實證最強的族群； 兒童初學者（尤其低齡）的自我對話訓練能力受發展限制， 正式 PST 計畫結構對 8 歲以下兒童的適用性需謹慎； 成人初學的 PST 結構可完整適用，但干擾思維內容（社會評價）需納入訓練素材； 鐵人三項目前有耐力 MST 直接研究支持（Matos 2020），但完整 PST 計畫適用性無直接游泳資料。
    sources:
    - Research/心理/06_自我對話與心理技能訓練.md#心理技能訓練套裝計畫
    - Research/心理/06_自我對話與心理技能訓練.md#關鍵文獻清單
- id: psych.arousal
  name_zh: 喚醒、焦慮與壓力崩潰
  nav_zh: 喚醒與崩潰
  when_zh: 一比賽就緊到崩、越想控制越糟時
  order: 7
  status: complete
  band: 進階競技端
  l_band: L3–L6
  level_tag: 進階·競技
  concept_count: 8
  premise:
    layer: public
    certainty: 🟢
    one_line: 壓力下表現崩潰，常不是「練不夠」，而是焦慮把流暢的自動化動作打回「逐步監控」—— 和初學的失控恐懼是同一條迴路，只是發生在競技端的高水平泳者身上。
  concepts:
  - id: psych.arousal.inverted_u
    name_zh: 倒 U 曲線是粗糙的起點，不是定律
    nav_zh: 倒U曲線
    order: 1
    status: complete
    phenomenon:
      certainty: 🟡
      text: Yerkes-Dodson（1908）的原始實驗用電擊強度對比老鼠辨別任務，並非直接測量喚醒與運動表現。 倒 U 曲線是後人（1950 年代起）從圖形形狀反向命名——原作者從未使用「arousal」一詞。 廣為流傳的版本是：喚醒過低或過高均削弱表現，中等最佳；任務難度越高，最佳喚醒點越低。 2024 年《Trends in Cognitive Sciences》的系統性重審（PII S1364-6613(24)00078-0） 指出，倒 U 曲線在文獻中的實證支持遠比教科書描述稀薄，需要重新概念化—— 特別是「一條曲線適用所有人」這個預設，忽略了個體差異。 在游泳等封閉技術性動作（closed-skill）場域，喚醒影響的機制可能不只是「量」的多寡， 還有「類型」（透過注意力配置改變、肌肉張力前饋干預感知通道、誘發再投資行為三條路徑）。
    hardware_boundary:
      certainty: 🔴
      text: 不同泳距（50m 爆發 vs 1500m 有氧）是否有不同最佳喚醒點，現有研究幾乎全是跨運動外推， 游泳特異的曲線形狀尚未有直接實驗資料。
    misconception_refs:
    - cue: 比賽前要讓自己興奮到最佳狀態
      why: 「最佳狀態」因人而異，更因任務類型而異；把教科書的「中等喚醒最佳」當成普適處方， 會讓高喚醒下表現更好的游者刻意壓低自己，反而破壞功能性情緒狀態。
      better: 先識別「這位游者在什麼情緒強度下歷史表現最佳」，再針對個人設計賽前激活策略， 而不是套用單一「中等最佳」的模板。
    population_note: 倒 U 假說文獻多從成人競技運動員樣本建立；兒童初學、鐵人三項開放水域情境、 成人初學在不同情境中的喚醒反應均未系統研究。 青少年競技的評價焦慮與高水平游泳員的競賽焦慮屬不同結構，不可互相外推最佳喚醒範圍。
    sources:
    - Research/心理/02_喚醒焦慮與壓力崩潰.md#核心理論
  - id: psych.arousal.izof
    name_zh: 最佳情緒區是個人化的，不是普適的
    nav_zh: 最佳區
    order: 2
    status: complete
    phenomenon:
      certainty: 🟡
      text: Hanin（1978/1986）在蘇聯頂尖運動員中提出個人最佳功能區（IZOF）： 每位運動員有自己的最佳情緒激活區，寬度約 ±4 分（STAI 量尺）， 且區域位置因人而異——有些運動員在高焦慮下表現最佳，有些則在低焦慮下更好。 關鍵是「對該個體是否功能性」，而非情緒的效價（正面/負面）。 IZOF 後擴展涵蓋憤怒、快樂等多種情緒；游泳員中有小樣本研究顯示， 個人最佳情緒狀態與較佳競賽表現相關（樣本數有限，屬觀察性資料）。
    l_levels:
    - L3
    - L4
    - L5
    - L6
    l_note: IZOF 的教練應用落在 L3 以上的競技游者—— 初學者的優先任務是建立感知安全基礎（L0–L2），而非情緒激活管理。
    misconception_refs:
    - cue: 告訴所有游者「冷靜下來就好」
      why: 部分游者在高情緒激活下才進入最佳功能狀態；強制壓低喚醒可能把他們推出最佳區。 IZOF 說明「最佳」是個人化座標，不是強度固定點。
      better: 先透過賽後回顧（最佳場次 vs 最差場次的賽前情緒描述對比）識別每人的功能性情緒簽名， 再設計個人化賽前策略，允許個體差異存在。
    population_note: IZOF 文獻主要來自蘇聯/東歐高水平成人運動員；游泳員中的直接研究多為小樣本觀察， 屬素材缺口。兒童競技游者的情緒激活最佳區尚無系統資料； 鐵人三項的開放水域環境使情緒激活混入環境恐懼，診斷需區隔。
    sources:
    - Research/心理/02_喚醒焦慮與壓力崩潰.md#核心理論
  - id: psych.arousal.catastrophe
    name_zh: 高認知焦慮下，崩潰是跳崖，不是滑坡
    nav_zh: 災變崩潰
    order: 3
    status: complete
    phenomenon:
      certainty: 🟡
      text: 'Hardy（1990）的災難模型（Catastrophe Model）提出，喚醒對表現的影響取決於認知焦慮的水平： 低認知焦慮時，喚醒-表現仍呈平滑倒 U； 但高認知焦慮 + 高生理喚醒同時發生時，跨越某個臨界點後，表現會發生「災難式跌落」—— 不是漸進惡化，而是突然崩潰。更關鍵的是「滯後效應（hysteresis）」： 崩潰後要回到原表現水平，需先大幅降低喚醒，不是稍微調整就能回來。 Hardy, Parfitt & Pates（1994）在滾球運動的場地實驗（PMID: 7932942）部分支持此模型。 自信心是偏置因子：高自信把崩潰閾值推右（更晚觸發），低自信推左（更容易觸發）。'
    hardware_boundary:
      certainty: 🔵
      text: 游泳的技術崩潰——尤其是長距離後段的動作形式崩解、節拍紊亂——可能符合非線性崩潰的模式， 但「跨越閾值後的階躍式崩潰」在游泳的直接驗證仍是研究空白；從其他運動外推需降級。
    l_levels:
    - L3
    - L4
    - L5
    - L6
    l_note: 災難式崩潰主要發生在已建立技術自動化、但面臨高賭注競賽的游者（L3 以上）； 初學者尚未自動化，崩潰機制不同（見恐懼主題 psych.fear）。
    misconception_refs:
    - cue: 放鬆一下就好了
      why: 滯後效應意味著一旦觸發崩潰式跌落，「微調放鬆」不足以回復—— 需要的是先大幅降低整體激活水平，才能從崩潰分支回到正常分支。 把滯後效應誤作線性可調的假設，會讓教練低估介入強度。
      better: 崩潰一旦發生，先完全移除壓力源（放慢節奏、退出衝刺計畫、甚至停下重整）； 等激活大幅下降後再循序恢復強度，而不是在崩潰狀態中繼續撐。
    population_note: 災難模型文獻以成人高水平競技運動員為主；滯後效應在青少年競技游者尚未直接研究。 鐵人三項開放水域的環境干擾（能見度差、群泳、無法觸壁）可能加速高認知焦慮的積累， 在技術崩潰前已先觸發恐慌性動作退化，與封閉泳道情境的崩潰路徑可能不同。
    sources:
    - Research/心理/02_喚醒焦慮與壓力崩潰.md#核心理論
  - id: psych.arousal.reinvestment
    name_zh: 壓力下「想太多動作」會讓自動化崩潰
    nav_zh: 再投資崩潰
    order: 4
    status: complete
    phenomenon:
      certainty: 🟢
      text: '再投資（reinvestment）是 Masters（1992）提出的機制：技能熟練後通常以程序化形式儲存， 不需意識監控。壓力下，運動員「重新意識化」動作控制——工作記憶調用外顯的、基於規則的動作知識， 在線上即時控制動作機械。這會把自動化流程強制拉回外顯操控，觸發崩潰。 Masters & Maxwell（2008，DOI: 10.1080/17509840802287218）整合理論， 確認再投資不只是壓力反應，也是人格特質（disposition）： 個體在「再投資傾向」（MSRS 量表）上存在穩定差異—— 高外顯知識量 × 高再投資傾向 × 壓力情境 = 崩潰風險最高。 壓力情境觸發因子包括：觀眾/評審在場、高賭注決賽、先前失誤觸發自我修正衝動、新環境失去熟悉感知錨點。'
    l_levels:
    - L2
    - L3
    - L4
    - L5
    - L6
    l_note: 再投資崩潰的前提是「有程序化的自動化技能可以被破壞」—— L2 後段到 L3 的游者才開始具備可被再投資干擾的自動化； L0–L1 的恐懼/初學者崩潰機制不同（控制感缺失，見 psych.fear 主題）。 兩個主題的現象「看起來像」，但機制和干預方向相反，需要區辨。
    misconception_refs:
    - cue: 再拼一點，更專注在你的動作上
      why: 壓力下叫游者「更專注在動作上」正是再投資的觸發指令： 它把注意力強制指向動作細節，啟動外顯監控，加速崩潰。 這是教練在比賽關鍵時刻最常說但反效果最大的口令之一。
      better: 壓力情境下改用外部聚焦指令（「感覺水、切過水、讓身體滑過去」） 而非內部動作細節聚焦（「手要這樣、膝要彎」），讓自動化繼續運作不被打斷。
    - cue: 現在把動作調整回來
      why: 比賽中途的動作調整要求游者把自動化流程暫停，呼叫外顯規則比對並修正—— 即使调整方向正確，在壓力情境下執行的成本遠高於訓練中， 很可能觸發分析性麻痺（paralysis by analysis）。
      better: 比賽中「動作回饋」推遲到完賽後；比賽中提供的是感知錨點 （「節拍」「滑」「長一點」）而非技術指令。
    population_note: 再投資研究主體是成人高爾夫球手、籃球員等乾地運動員；游泳員的 MSRS 分數與技術崩潰頻率 的直接相關研究尚未見到（研究空白）。 兒童競技游者的外顯知識累積量通常低於成人，再投資風險結構不同； 青少年評價焦慮會提高再投資傾向，是值得關注的族群但缺乏直接游泳資料。 鐵人三項游泳段屬開放水域，環境新奇性（失去熟悉感知錨點）是獨立的再投資觸發因子， 與泳池封閉環境不同，不可直接外推。
    sources:
    - Research/心理/02_喚醒焦慮與壓力崩潰.md#核心理論
    - Research/心理/02_喚醒焦慮與壓力崩潰.md#Reinvestment專節
  - id: psych.arousal.explicit_monitoring
    name_zh: 越分析動作細節，程序化技能越容易在壓力下崩潰
    nav_zh: 外顯監控
    order: 5
    status: complete
    phenomenon:
      certainty: 🟢
      text: Beilock & Carr（2001）的實驗（高爾夫推桿 vs 字母算術，*J. Exp. Psychol. Gen.* 130(4), 701–725） 確認：專家技能以程序化形式儲存，在壓力下不是「資源不足」而崩潰， 而是壓力誘發自我意識 → 注意力轉向技術細節（skill-focused attention）→ 打斷自動化程序。 關鍵結果：程序化技能（推桿）在壓力下 choking；非程序化技能（算術）不受影響。 雙任務訓練無助防 choking；降低內部監控傾向才有效。 此機制與再投資理論高度重疊，差別是：Beilock 強調「注意力指向」是崩潰的觸發因， Masters 強調「外顯知識量」是崩潰的資源——兩者干預方向有差異， 前者聚焦注意力訓練，後者聚焦學習設計。
    l_levels:
    - L2
    - L3
    - L4
    - L5
    - L6
    l_note: 同再投資概念（psych.arousal.reinvestment），外顯監控崩潰需要「有程序化技能可以被打斷」作為前提。 新手反而倚賴外顯監控建立技術——壓力下的干擾機制對他們不適用； 初學者的崩潰是感知遮蔽（恐懼路徑），不是自動化被打斷。
    misconception_refs:
    - cue: 感覺不對的時候，試著更注意你身體的每個動作
      why: 壓力情境下「更注意身體動作」正是外顯監控的觸發指令。 程序化技能被有意識地拆解分析，反而打斷自動化流程。 這個教練常說的口令，在訓練中可能有幫助，在比賽壓力中幾乎必然適得其反。
      better: 感覺不對時把注意力移向外部效果（「感覺水在哪裡」「讓身體滑長一點」）， 而非掃瞄內部動作細節；感知目標語言正是設計來取代解剖指令的工具。
    sources:
    - Research/心理/02_喚醒焦慮與壓力崩潰.md#核心理論
  - id: psych.arousal.muscle_tension_loop
    name_zh: 焦慮改變你在水裡的「形狀」，讓水感失真
    nav_zh: 張力迴路
    order: 6
    status: complete
    phenomenon:
      certainty: 🔵
      text: '在陸地運動中，焦慮誘發的防禦性肌肉張力主要影響協調與速度。 游泳有一個在其他運動中不存在的迴路： 焦慮 → 防禦性肌肉張力（全身預先張力升高）→ 改變身體在水中的姿態與剛性 → 水對身體的阻力分佈改變 → 感知信號改變（感知到的水的回饋不再是「正常姿態」的水感）→ 水感失真 → 游者試圖再投資修正 → 自動化進一步崩潰。 這是焦慮破壞感知-動作自動化的**雙向迴路**，在游泳中因「感知通道本身是水」而特別顯著。 間接支持：Hazlett 等（1994，DOI: 10.1111/j.1469-8986.1994.tb01039.x） 確認廣泛焦慮症患者的肌肉 EMG 活動顯著高於對照組——焦慮不只是主觀感受，是肌肉電位的物理狀態。'
    hardware_boundary:
      certainty: 🔵
      text: 「焦慮→防禦性肌張力→流體動力學改變→水感知失真」的完整迴路是框架推導， 目前尚無游泳情境中直接測量此鏈路的研究。 各節點單獨有文獻支持（焦慮-EMG、姿態-流體動力學），但跨節點的完整因果鏈在游泳中是研究空白。
    l_levels:
    - L0
    - L1
    - L2
    - L3
    - L4
    - L5
    - L6
    l_note: 此迴路貫穿全 L 等——初學者的恐懼性全身緊縮（L0–L1 的沉體反應） 與競技游者壓力下的微張力（L4–L5 的手感失真）是同一機制在不同強度的表現。 L0 的嚴重程度遠高於競技端，但機制的「形狀」相同。
    misconception_refs:
    - cue: 放鬆你的手臂
      why: 防禦性張力在緊張時是全身性的、不自主的； 只叫「放鬆某部位」忽略了張力的根源是焦慮，不是局部習慣。 局部口令常讓游者把注意力移向那個部位（觸發再投資），反而更緊。
      better: 從感知切入而非部位切入——「讓手滑過去」而非「放鬆手臂」； 或先降低焦慮來源（降低評估感）再回到感知目標語言。
    population_note: 此迴路對兒童初學的意義是「沉體 + 感知遮蔽的雙重關閉」； 對鐵人三項游者的意義是「開放水域環境焦慮快速觸發防禦張力，讓技術退回 L1 層次」； 對競技游者的意義是「在高強度壓力場景（決賽、被超越）中微量張力改變感知精度」。 三個族群表現出的現象相似但嚴重程度和情境觸發完全不同，不能用同一套干預強度處理。
    sources:
    - Research/心理/02_喚醒焦慮與壓力崩潰.md#游泳特異性
    - Research/心理/02_喚醒焦慮與壓力崩潰.md#與水感框架的連結
  - id: psych.arousal.breath_reinvestment
    name_zh: 焦慮先打亂呼吸節拍，節拍亂了再投資就跟著來
    nav_zh: 呼吸再投資
    order: 7
    status: complete
    phenomenon:
      certainty: 🔵
      text: 游泳的呼吸必須在精確的動作視窗中完成（換氣節拍），是動作序列的計時錨點。 焦慮誘發的呼吸急促（交感神經激活）打亂換氣的節拍， 游者察覺到節拍混亂後，傾向「有意識地重設節拍」——即對呼吸動作本身進行外顯監控， 把本已自動化的呼吸協調拉入工作記憶管控，進一步觸發再投資。 此外，游泳時面部長期入水，一般情境下可用的「深呼吸放鬆」介入選項受到限制， 焦慮誘發的呼吸急促更難被即時中斷。 在陸地運動中不存在這個節拍-監控的雙重鎖鏈，這是游泳情境下壓力崩潰的特殊路徑。
    hardware_boundary:
      certainty: 🔵
      text: 「焦慮→呼吸急促→節拍亂→有意識重設→再投資」的鏈路是從框架推導， 游泳情境中直接量測此序列的研究仍是空白； 呼吸急促與焦慮的關聯本身有生理支持（交感激活），但後續鏈路屬外推。
    l_levels:
    - L1
    - L2
    - L3
    - L4
    - L5
    - L6
    l_note: 呼吸節拍計時錨的崩潰從 L1 開始有意義（L0 尚未建立節拍）； 競技游者（L3 以上）在節拍亂後的再投資反應更強，因為他們積累了更多可供「重設」的外顯知識。
    misconception_refs:
    - cue: 現在先調整呼吸節奏再繼續
      why: 壓力下叫游者「調整呼吸節奏」本身就是要求他對自動化呼吸協調做外顯監控—— 在陸地上可行（可暫停任務），在比賽中游到一半時幾乎必然觸發再投資。
      better: 訓練中建立「節拍的感知錨點」而非「節拍的技術規則」； 比賽中用感知語言（「在水裡滾一下」「讓臉轉出去」）而非節奏計數指令。
    population_note: 兒童初學的呼吸節拍尚在建立中，焦慮對節拍的干擾對他們更根本（屬 L1 學習阻礙而非壓力崩潰）； 青少年競技在評賽壓力下的呼吸急促目前缺乏直接游泳研究，是素材缺口； 鐵人三項開放水域群泳起跑的呼吸節拍干擾（被踩踏、吸到浪）是環境誘發的節拍崩潰， 機制相似但觸發源不同——干預需從環境減敏著手而不只是節拍訓練。
    sources:
    - Research/心理/02_喚醒焦慮與壓力崩潰.md#游泳特異性
  - id: psych.arousal.implicit_learning
    name_zh: 讓技術「說不出口」，才能在壓力下不崩潰
    nav_zh: 內隱學習
    order: 8
    status: complete
    phenomenon:
      certainty: 🟢
      text: '再投資崩潰需要兩個條件：壓力 + 可供調用的外顯動作知識。 內隱學習設計從源頭切斷第二個條件：讓技能以非語言化的程序性形式習得， 工作記憶中沒有可被再投資劫持的顯性規則。 主要策略： ① 類比教學（analogy instruction）：用整體意象取代分解規則， Poolton 等（2007，DOI: 10.1260/174795407780367177）蝶泳實驗 確認「像海豚那樣踢」比「膝蓋先彎曲再伸展推水」在壓力下更穩健。 ② 外部聚焦（external focus of attention）：指向身體外部效果的注意力 比內部身體聚焦更能支持自動化（Wulf 等多篇研究，2001–2010）。 游泳應用：「讓手切過水線」vs「控制手掌角度」。 ③ 降低顯性回饋密度：訓練中不在每趟後詳細分析技術，讓感知探索先於解釋。 ④ 正念/接受導向訓練：正念降低「評估衝動」（PMC10497761）， 減少游者在壓力下啟動外顯知識搜尋的傾向。'
    l_levels:
    - L0
    - L1
    - L2
    - L3
    - L4
    - L5
    - L6
    l_note: 內隱學習設計貫穿全 L 等，但「防止再投資崩潰」的目標集中在 L2 以上； L0–L1 的內隱設計目標是建立基礎感知-動作連結，副效益是同時降低未來再投資風險。 重要限制：解剖性硬體邊界（踝關節活動度、肩部活動度）必須用外顯說明讓學習者理解， 不適合套用類比替代——這是內隱設計的邊界。
    misconception_refs:
    - cue: 現在告訴我你手怎麼划的（在比賽壓力下）
      why: 在壓力情境中要求游者語言化技術過程，正是再投資的搜尋指令； 語言化成功 = 外顯規則被調用到工作記憶 = 下一個動作的崩潰風險升高。
      better: 將「技術回顧」推遲到完全脫離壓力情境後； 訓練中多問「你感覺到什麼」而非「你知道怎麼做嗎」， 讓技術以感知描述而非技術規則的形式被儲存。
    population_note: 內隱學習研究的游泳直接樣本以成人或青少年乾式訓練研究為主； 兒童初學因認知發展限制，外顯規則本就不易建立，類比教學對他們天然適合但難以驗證「抗崩潰」效果； 成人初學帶入大量生活技術外顯知識（「游泳就是手划腳踢」），內隱學習設計需要同時解除這些預設； 鐵人三項游者多有多年技術積累外顯知識，再投資風險高，是內隱重設計的高優先候選族群。
    sources:
    - Research/心理/02_喚醒焦慮與壓力崩潰.md#Reinvestment專節
    - Research/心理/02_喚醒焦慮與壓力崩潰.md#核心理論
- id: psych.flow
  name_zh: 心流與去再投資
  nav_zh: 心流
  when_zh: 想進入忘我、把好表現守在壓力下時
  order: 8
  status: complete
  band: 進階競技端
  l_band: L3–L6
  level_tag: 進階·競技
  concept_count: 10
  premise:
    layer: public
    certainty: 🔵
    one_line: 最高水準的水感是「不再去想」——心流狀態下控制權交還給自動化系統， 刻意的自我監控（再投資）反而是頂尖表現的最大干擾。這是 L5–L6 全身場感知的心理對應端。
  concepts:
  - id: psych.flow.action_awareness_merging
    name_zh: 「不知道怎麼做到的」才是 L6 心流的語言
    nav_zh: 覺察合一
    order: 1
    status: complete
    phenomenon:
      certainty: 🟡
      text: Csikszentmihalyi（1990）把心流九維度分為前提、即時體驗、後效三層；其中「行動與覺察融合」 （action-awareness merging）是最標誌性的即時體驗維度：做的人與做的動作之間的距離感消失， 不再「觀看自己游泳」，而是直接「就是在游」。Jackson（1995）訪談 28 名精英運動員（含游泳選手）， 游泳者描述的核心語言是「我就只是在游，感覺不到我在控制每個動作」。 這不是比喻，而是自動化控制系統（基底核、內隱程序記憶）取代顯性前額葉監控的現象學描述。
    hardware_boundary:
      certainty: 🔵
      text: 行動與覺察融合對應的神經機制是動作控制從前額葉皮質轉移到基底核的自動化路徑—— 這是跨領域外推（Dietrich, 2004 的暫時性前額葉低激活假說；Floyer-Lea & Matthews, 2005 的 fMRI 研究），游泳情境的直接量測仍是研究空白。「不知道怎麼做到」是意識無法觸及自動化程序的 現象學側面，不是技術失憶——動作品質在此狀態往往達到個人最佳。
    l_levels:
    - L5
    - L6
    l_note: L5 泳者有時進入局部自動化的短暫融合（「這段手感覺對了」）， L6 的特徵是全身場感知層面的融合——描述語言從「某部位對了」轉移到「不知道怎麼做到的」。 L3–L4 仍在顯性控制階段，局部技術點尚在意識監控中，行動與覺察融合尚未出現。
    misconception_refs:
    - cue: 比賽前要把每個動作細節都在腦中跑過一遍，確認都對才下水
      why: 這個指令主動要求顯性監控，正是再投資（reinvestment）的觸發機制， 實際上阻止行動與覺察融合的發生；對有足夠自動化程度的進階泳者，這會降低表現。
      better: 賽前心像演練的焦點放在整體節律感、水的感覺、身體輕鬆的狀態， 而不是動作清單逐步驗核。
    sources:
    - Research/心理/07_心流與最佳表現.md#1-csikszentmihalyi-心流九大維度
    - Research/心理/07_心流與最佳表現.md#4-精英運動員心流研究jackson1995-1996
    - Research/心理/07_心流與最佳表現.md#游泳特異研究-vs-跨運動外推
  - id: psych.flow.challenge_skill_balance
    name_zh: 太難焦慮、太易無聊、剛好才有心流
    nav_zh: 挑戰平衡
    order: 2
    status: complete
    phenomenon:
      certainty: 🟡
      text: 心流最核心的觸發條件是「感知到的挑戰難度」與「自身技能水準」的匹配 （Csikszentmihalyi, 1990）。挑戰高於技能 → 焦慮（anxiety）；技能高於挑戰 → 無聊（boredom）； 兩者匹配且皆高 → 心流通道（flow channel）。Engeser & Rheinberg（2008）以划船運動員為樣本 確認挑戰-技能平衡調節心流與表現的關係，自我效能感是重要的調節變數。 這個模型最重要的教學意涵是：心流是**可以工程化設計**的——任務難度可以調，技能本身也隨練習增長， 因此教練能主動製造心流的前提條件，而不是被動等待它降臨。
    hardware_boundary:
      certainty: 🔵
      text: Engeser & Rheinberg（2008）以划船運動員為主要樣本，效應量偏小（混合結果）； 游泳情境無直接量化研究（研究空白 🔴）。外推至游泳情境合理，但「挑戰-技能匹配 保證觸發心流」的因果鏈尚未在游泳中建立——匹配是必要條件而非充分條件。
    l_levels:
    - L0
    - L1
    - L2
    - L3
    - L4
    - L5
    - L6
    l_note: 每個 L 級都有當層的挑戰-技能匹配點，不是只有精英才能到達這個匹配帶。 L0–L2 的「剛好能做到但需要專注」（如能連續吐氣 10 次）就是當層的挑戰-技能匹配； L5–L6 的匹配點是整場游泳的節律感與水的共振。
    misconception_refs:
    - cue: 先把技術鞏固好，心流自然就來了，不用刻意設計
      why: 技術進步只解決了技能端，挑戰端若沒有跟著調整（任務太易就無聊、太難就焦慮）， 心流通道仍不會出現；心流發生需要兩端同時匹配，不是等技術夠強就自動開啟。
      better: 每次訓練設計時同時調整挑戰難度（任務難度、距離、限制條件）與評估學員的技能狀態， 讓任務落在「剛好做得到但要專注」的帶寬內。
    sources:
    - Research/心理/07_心流與最佳表現.md#2-挑戰-技能平衡challenge-skill-balance模型演化
    - Research/心理/07_心流與最佳表現.md#flow-reinvestment-軸線的水感應用
    - Research/心理/07_心流與最佳表現.md#心流的發展軌跡flow-不是-l6-的專利推導
  - id: psych.flow.indirect_control
    name_zh: 心流不能直接命令自己進去
    nav_zh: 間接控制
    order: 3
    status: complete
    phenomenon:
      certainty: 🟢
      text: Swann 等人（2012）系統回顧 1992–2011 年精英運動心流文獻（n=17 篇），最重要的核心結論之一是： 「多數研究者認為心流不能直接製造，但可透過創造前提條件提高發生機率（間接可控）。」 Harris 等人（2021）meta 分析也指出現有多數研究是相關性設計，無法確定「先進 flow 再表現好」 還是「表現好才感覺 flow」。這個因果方向不確定性意味：任何「保證讓你進心流」的指導方案 都超出當前實證基礎；心流是概率性現象，前提條件只能提高機率，不能保證觸發。
    population_note: 心流研究嚴重偏向精英運動員，兒童初學、成人初學、鐵人三項業餘選手的 心流發生率和形態直接量化數據幾乎缺失（研究空白 🔴）。 兒童初學在低技能層級就特別容易進入類心流的吸收狀態（遊戲性、低自我意識）， 這與精英運動員的心流機制是否相同，目前沒有直接比較研究。
    sources:
    - Research/心理/07_心流與最佳表現.md#5-swann-等人心流系統回顧2012
    - Research/心理/07_心流與最佳表現.md#8-心流-表現關係-meta-analysis
  - id: psych.flow.flow_vs_clutch
    name_zh: 心流是「讓它發生」；clutch 是「讓它成功」
    nav_zh: 心流與關鍵
    order: 4
    status: complete
    phenomenon:
      certainty: 🟢
      text: Swann 等人（2017, 2021）的 Flow-Clutch 框架區分出兩種不同的高表現狀態。 心流（flow）：輕鬆、自動化、享受，注意力是漫散式當下專注，意識控制低， 行動自動發生，活動中即感受到享受。 Clutch 狀態：強烈、費力、緊繃，注意力高度聚焦於特定目標，意識控制高，刻意執行， 活動後才覺得享受（當下只有強度感）。 高爾夫選手描述：心流是「letting it happen」；clutch 是「making it happen」——同樣的「讓它發生」 這個字，語意完全相反。兩者不在同一時刻共存，但同一場比賽中可先後出現。
    l_levels:
    - L4
    - L5
    - L6
    l_note: Clutch 在 L3–L4 競技情境（重大比賽關鍵段）常見；flow 則更常與 L5–L6 的全身場感知並存。 但 clutch 也需要一定的基礎自動化（L3+），純 L0–L2 初學者的壓力反應更接近恐懼崩潰， 不是 clutch 的費力專注。游泳比賽最後 50 公尺是 clutch 還是 flow 主導，目前無游泳特異研究（🔴）。
    population_note: Flow-Clutch 量表（Swann et al., 2021, 2023）以廣義運動/休閒運動者為樣本， 競技游泳場景的適用性尚待游泳專屬研究確認（外推至游泳標 🔵）。 對兒童競技與青少年競技：兩種狀態都可能出現，但比例和觸發條件的系統研究缺失。
    sources:
    - Research/心理/07_心流與最佳表現.md#6-flow-vs-clutch-statesswann-等人2017-2023
  - id: psych.flow.reinvestment
    name_zh: 壓力讓人重新「想」動作，反而搞砸
    nav_zh: 壓力再投資
    order: 5
    status: complete
    phenomenon:
      certainty: 🟡
      text: 再投資（reinvestment）理論（Masters, 1992；Masters & Maxwell, 2008）： 個體在壓力下用工作記憶重新叫回顯性規則知識，以意識控制動作。 Beilock & Carr（2001）在高爾夫推球實驗中確認：高技能者被要求監控動作細節時表現下滑， 低技能者反之——這是「choking under pressure」的核心機制之一。 游泳情境中，再投資的外觀是泳者在比賽中開始「清單思考」： 「手臂要伸長、轉肩多一點、頭不要抬太高……」——逐步驟顯性控制重新上線， 動作失去流暢性，出現前半程刻意、後半程崩解的模式。 再投資與心流的關係是：再投資激活時，心流（尤其是「行動與覺察融合」）不可能同時發生。
    hardware_boundary:
      certainty: 🔵
      text: Beilock & Carr（2001）研究是高爾夫推球，Masters（1992）、Masters & Maxwell（2008） 研究樣本非游泳專屬；再投資機制外推至游泳合理（壓力下顯性監控增加是跨運動現象）， 但游泳專屬的再投資-心流直接量測仍是研究空白（🔴）。
    misconception_refs:
    - cue: 比賽時要更專注在每個動作細節，確認你在做對的事
      why: 這個指令在比賽情境中主動觸發再投資，對已有自動化程度的進階泳者會打斷流暢性， 導致「分析癱瘓（paralysis by analysis）」；這是行業內廣泛出現的賽前指導語。
      better: 進階泳者賽前焦點應放在整體感覺（節律、輕鬆、水感）而不是動作清單； 顯性技術檢查保留在練習中，賽前最後指令選一個感知焦點（如「感覺水幫你」）不選動作清單。
    sources:
    - Research/心理/07_心流與最佳表現.md#reinvestment-理論masters-1992masters-maxwell-2008
    - Research/心理/07_心流與最佳表現.md#flow-vs-reinvestment-對照
  - id: psych.flow.de_reinvestment
    name_zh: 放掉顯性控制，信任習得的感知——L6 的心理開關
    nav_zh: 去再投資
    order: 6
    status: complete
    phenomenon:
      certainty: 🔵
      text: Vortex 框架中 L5→L6 的過渡不只是技術問題，更是一個心理轉換點： 成功「去再投資」（de-reinvestment）——放掉顯性自我監控，信任已習得的隱性感知模式。 在 L5，泳者已具備相當自動化能力，但可能仍習慣性地進行局部顯性監控（「我的入水夠遠嗎？」）； L6 的「水我合一、水在幫我」描述語言，正是再投資降到最低、行動與覺察融合程度最高時的 現象學報告。這不是放鬆注意力，而是注意力從「監控部位」轉移到「感受整體場」。 類比學習（analogy learning，Liao & Masters, 2001）用一個比喻意象取代逐條顯性技術指令， 目的正是降低顯性知識累積、讓學習走隱性路徑——這個機制外推到游泳去再投資是合理的 機制推導（🔵），但游泳「類比指導→降再投資→近心流」的直接第一手實證目前尚缺（🔴）。
    l_levels:
    - L5
    - L6
    l_note: L1–L3：顯性學習必要，再投資在此階段是學習工具，不是問題； L4：技能-挑戰開始接近匹配，有時進短暫心流； L5→L6 轉換點：去再投資是關鍵——放掉顯性監控，信任隱性感知。 強行把去再投資用在 L1–L2 反而危險：初學者需要顯性知識建立基礎感知框架， 過早要求「不要想，直接感覺」會讓感知無從錨定。
    misconception_refs:
    - cue: 不要去想你在做什麼，放鬆，讓身體自己來（對初學者說）
      why: 去再投資策略用在尚未建立足夠自動化的初學者身上是錯誤的： L0–L2 泳者沒有穩固的隱性程序知識，「讓身體自己來」會讓他們在水中失去方向感； 這個指令在初學端造成的是焦慮，不是心流。
      better: 去再投資語言只用在 L4+ 且已有足夠自動化基礎的泳者； 初學者需要清晰的顯性感知目標（「試試看，吐氣的時候感覺你的臉放鬆」），不是「不要想」。
    sources:
    - Research/心理/07_心流與最佳表現.md#flow-reinvestment-軸線的水感應用
    - Research/心理/07_心流與最佳表現.md#與水感框架-l5-l6-水我合一的連結
    - Research/心理/07_心流與最佳表現.md#reinvestment-理論masters-1992masters-maxwell-2008
  - id: psych.flow.hypofrontality
    name_zh: 心流時大腦的「自我監控區」暫時退場
    nav_zh: 額葉退場
    order: 7
    status: complete
    phenomenon:
      certainty: 🟡
      text: Dietrich（2004）提出暫時性前額葉低激活假說（transient hypofrontality）： 心流狀態下，掌管自我監控、評估與抑制的前額葉皮質活動暫時降低， 導致自我意識消退、時間感扭曲、自動化感提升。這在神經層面解釋了心流九維度中的 「失去自我意識」與「行動與覺察融合」——不是自我消失，而是負責觀察自我的 神經迴路暫時讓位給執行自動化動作的基底核路徑（Floyer-Lea & Matthews, 2005；Seidler et al., 2005）。 對游泳的意涵：L6 泳者描述的「不再監控我的動作，感覺一切在對的位置」， 在神經層面對應的正是前額葉退位、基底核接管的狀態。
    hardware_boundary:
      certainty: 🔵
      text: Dietrich（2004）是理論框架（Consciousness & Cognition）， Floyer-Lea & Matthews（2005）和 Seidler et al.（2005）的 fMRI/PET 研究是動作自動化的 神經相關物，不是心流的直接量測——兩者的連結是推導（🔵）。 游泳運動員心流狀態的神經影像研究目前幾乎不存在（研究空白 🔴）。
    l_levels:
    - L5
    - L6
    l_note: 前額葉退位需要動作已達到足夠的自動化程度（L4+）， 才能將控制權讓給基底核；L0–L3 的動作仍在建立自動化，前額葉的顯性介入 在這些層級是必要的，不是問題。
    population_note: 前額葉低激活假說來自成人神經科學研究，兒童前額葉尚未完全成熟（約 25 歲前持續發展）， 外推至兒童游泳情境需特別謹慎。兒童的「流暢吸收狀態」可能通過不同的神經機制達成， 不能直接套用成人前額葉假說。
    sources:
    - Research/心理/07_心流與最佳表現.md#9-心流的神經認知機制
  - id: psych.flow.flow_across_levels
    name_zh: 初學者也有心流——挑戰-技能匹配在每個 L 都有觸發點
    nav_zh: 各層心流
    order: 8
    status: complete
    phenomenon:
      certainty: 🔵
      text: 挑戰-技能平衡模型（Csikszentmihalyi, 1990）的核心是「匹配是相對於當前技能水平的」， 因此心流的觸發條件在每一個技能層級都可以達到，只是心流的內容隨 L 級遷移。 L0–L2：把任務難度壓到「剛好做得到但要專注」（如能連續吐氣、能在水面漂住 5 秒）， 泳者報告「我浮起來了！」「一直動而且沒有沉」——這是對控制感初獲的吸收狀態，autotelic 雛形。 L3–L4：局部技術點剛好可控，「這一段手感覺對了」——局部自動化的短暫融合。 L5–L6：全身場感知共振，「水在幫我，不知道怎麼做到」——前述 L6 標誌。 把心流留給精英是對挑戰-技能模型的誤讀；早期心流是動機燃料， L0–L2 的「做得到」吸收狀態正是把學習者帶回水裡的內在驅動力。
    l_levels:
    - L0
    - L1
    - L2
    - L3
    - L4
    - L5
    - L6
    l_note: 各 L 級的心流「內容」不同：L0–L2 是控制感初獲的吸收；L3–L4 是局部自動化融合； L5–L6 是全身場感知融合。三者都是心流，但描述語言和觸發條件截然不同， 不能用 L6 心流的語言去期待 L0 泳者，也不能用 L0 的「浮起來很開心」 等同於 L6 的「水我合一」。
    population_note: 兒童初學者低自我意識、遊戲傾向，在 L0–L2 相對容易進入類心流吸收狀態； 成人初學者自我意識較高（社會評價壓力），在低技能層級鬆掉監控更難， 需要更刻意的難度調節與去評價環境，才能讓早期心流發生。 鐵人三項和青少年競技泳者的心流觸發點通常在 L3+ 以上，與初學端不同。 各族群跨技能層級的心流量化比較研究在游泳項目中幾乎缺失（研究空白 🔴）。
    sources:
    - Research/心理/07_心流與最佳表現.md#心流的發展軌跡flow-不是-l6-的專利推導
    - Research/心理/07_心流與最佳表現.md#2-挑戰-技能平衡challenge-skill-balance模型演化
  - id: psych.flow.water_as_feedback
    name_zh: 水本身就是心流需要的即時回饋
    nav_zh: 水即回饋
    order: 9
    status: complete
    phenomenon:
      certainty: 🔵
      text: 心流的前提條件之一是「即時回饋」（unambiguous feedback，Csikszentmihalyi, 1990 第三維度）： 行動者隨時知道自己做得好不好。游泳的獨特性在於，這個回饋通道是**物理環境自然提供的**—— 水的阻力感、水面反力、水流在皮膚上的壓力分佈，在每一次划手、每一次踢水時都即時回應。 Jackson（1995）的游泳選手訪談中，「水的感覺（即時回饋）」是他們描述心流前提條件時最常提到的 游泳特異元素。這意味：技術層面的水感建立（L1–L5）和心理層面的心流前提條件， 在游泳中是同一件事的兩個側面——感知水的能力提升，心流即時回饋通道的訊噪比也隨之提升。
    hardware_boundary:
      certainty: 🔵
      text: 「水感（aquatic proprioception）作為心流即時回饋的機制」是跨領域推導： 具體由哪些感覺通道（壓力感受器、前庭系統、皮膚機械感受器）承載心流的即時回饋維度， 缺乏直接研究（研究空白 🔴）。即時回饋是心流的前提，水感是即時回饋的可能載體—— 但從「水感高→心流即時回饋增強→心流更容易發生」這條因果鏈的中間兩個節點， 目前沒有游泳專屬實證。
    l_levels:
    - L1
    - L2
    - L3
    - L4
    - L5
    - L6
    l_note: L0 的即時回饋主要是「有沒有沉、有沒有憋到」的生存性回饋，不是細緻水感； L1+ 開始建立浮力回饋；L3+ 有划手阻力分佈；L5–L6 達到全身場感知， 即時回饋的訊號密度最高，與心流融合的條件最完整。
    population_note: 開放水域游泳（鐵人三項情境）的即時回饋通道與泳池不同： 泳池有觸壁回饋、水道線參照、清澈水底；開放水域無觸壁、能見度低、有波浪。 即時回饋訊號的稀釋或干擾是否影響心流發生率，目前無研究。
    sources:
    - Research/心理/07_心流與最佳表現.md#1-csikszentmihalyi-心流九大維度
    - Research/心理/07_心流與最佳表現.md#游泳特異研究-vs-跨運動外推
    - Research/心理/07_心流與最佳表現.md#與水感框架-l5-l6-水我合一的連結
  - id: psych.flow.izof_individual_zones
    name_zh: 最佳喚醒不是一個點，也不是人人相同
    nav_zh: 個人喚醒區
    order: 10
    status: complete
    phenomenon:
      certainty: 🟡
      text: Hanin（1978–2000）的 IZOF（Individual Zones of Optimal Functioning）框架指出： 每位運動員有個人化的最佳喚醒/情緒區間，在區間內表現最好，偏高或偏低都導致下滑。 關鍵有兩點：① 這是「區間」而非「點」；② 因人而異——有人需要高度激活才能進入最佳狀態， 有人需要平靜。Hanin 的研究樣本曾包含游泳、划船、體操運動員。 與心流框架的連結：IZOF 界定了讓心流前提條件成立的喚醒帶——不在個人區間內， 挑戰-技能匹配達到了，心流也不容易出現；在區間內，則其他前提條件更容易匯聚。 IZOF 解釋「為何同樣的賽前喚醒策略對不同選手效果不同」。
    hardware_boundary:
      certainty: 🟠
      text: Hanin 的 IZOF 以書籍和部分期刊論文形式流傳（Hanin, 2000, *Emotions in Sport*, Human Kinetics）， 游泳專屬的 IZOF 測量原始論文需進一步查證；目前本 dossier 的游泳引用是書籍二手引用（🟠）。 IZOF 與心流的直接連結是框架外推（🔵），兩個理論的整合尚無系統性實證。
    population_note: IZOF 的個人化意涵在跨族群場景最具實踐意義： 兒童競技選手（喚醒區間寬但情緒調節能力尚在發展）、青少年競技（評價焦慮易把喚醒推出區間）、 鐵人三項業餘選手（賽境不確定性高，喚醒區間管理更難）、成人初學（高自我意識縮窄了舒適帶）， 所需的喚醒管理策略截然不同。「賽前幫選手衝勁」的一刀切策略可能讓部分選手的喚醒 超出個人最佳區間，反而遠離心流前提條件。
    misconception_refs:
    - cue: 比賽前一定要讓自己興奮起來，這樣才有氣勢
      why: 這個指令預設所有選手的最佳喚醒都在「高激活端」； IZOF 框架表明有選手需要平靜狀態才能表現最佳，強制提高喚醒反而把他們推出最佳區間。
      better: 了解每位選手的個人化最佳喚醒帶（透過系統記錄比賽前情緒狀態與表現的關係）， 再針對性調整賽前激活/冷靜策略，而不是一套走天下。
    sources:
    - Research/心理/07_心流與最佳表現.md#7-理想表現狀態ips--the-zone
    - Research/心理/07_心流與最佳表現.md#游泳特異研究-vs-跨運動外推
