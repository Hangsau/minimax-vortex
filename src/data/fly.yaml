premise: '蝶式的推進是頭到腳的<mark>波動傳遞</mark>，不是手腳上下擺動；波動起於壓胸，終於腳尖。<span class="cert">🔵</span>'
moves:
  - n: 1
    name: '波動啟動（壓胸起波）'
    one: '胸骨下壓，能量傳到腳'
    l: '前置–L2'
    physical: '推進是<mark>頭尾方向波動傳遞</mark>，不是上下擺動。波動起源於<mark>胸骨/下肋主動下壓</mark>，沿體軸傳至踝，振幅逐節放大（Sanders 1995 正弦 H1 波、鞭打力學）。腳踝是終點加速器，不是發力源。'
    boundary: '<mark>胸椎活動度</mark>是波動觸發的硬體前提。胸椎僵硬者胸部下壓幅度受限，腰部會過度代償。胸椎活動度不足是硬體問題，需陸上活動度訓練優先，不是感知問題。'
    drills:
      - '胸部下壓'
      - '仰面流線蝶腿'
    cue_bad: '臀部上下動帶起波浪'
    cue_why: '髖部是波動放大器（中繼），不是發力源；意識放臀部會用主動上下代償，波動傳不到腿尖。'
    cue_good: '壓胸起波（頭部+胸骨協同下壓）'
    lnote: '前置感知波動游是整個框架的起點。'

  - n: 2
    name: '第一踢（入水踢）'
    one: '手入水同時踢，啟動波動'
    l: 'L2–L3'
    physical: '第一踢在手臂入水同時發生：<mark>啟動波動鏈</mark>、填補手未捕水時的推進空隙、定位身體深度（決定 EVF 角度）、提供髖部上浮力矩。entry-kick 時機越早，臂推進期越長、阻力越低（r=-0.45, Strzała 2017）。加速度貢獻 1.9 m/s²。'
    boundary: '第一踢的功能依賴波動傳遞已建立；波動未建立時，第一踢只是「又一次腿部發力」。'
    drills:
      - '胸部下壓'
      - '跨過木桶'
    lnote: '第一踢與第二踢功能完全不對稱，須分別訓練。'

  - n: 3
    name: '外划定位'
    one: '輕展開到捕水位置'
    l: 'L3–L4'
    physical: '外划<mark>不是推進動作，是捕水位置的定位動作</mark>——讓手臂到達 EVF 起始位置。有升力推進（約 1.4 m/s²）但不可主動強調，主動外划壓縮 Insweep 加速空間。外划相是蝶式週期中技術最不穩定的環節（Porto 2024）。'
    boundary: '<mark>肩關節活動度</mark>是外划到位的硬體前提。肩活動度不足者外划無法順滑展開，會用過大幅度代償。硬體問題與感知問題不同：靜止狀態建不起前臂水壓即指向硬體。'
    drills:
      - '寬Y型划水'
      - '頭朝下划水（窄Y）'
    cue_bad: '手入水靠近中線/額頭正前方'
    cue_why: '入水過窄使捕水角度不良、外划被迫更大幅度代償。正確入水點在肩線延伸前方（11點/1點）。'
    cue_good: '入水約肩寬，指尖斜下切入'
    lnote: '外划幅度收斂是 L5–L6 路徑精煉重點。'

  - n: 4
    name: '捕水 EVF（高肘）'
    one: '高肘抓水，前臂面向後'
    l: 'L3–L4'
    physical: '捕水建立後<mark>肘下移、前臂向後旋轉</mark>，前臂整個面面向推進方向（推進面最大化），上臂維持平行游進方向（阻力最小化）。<mark>上臂是阻力來源，不是推進來源</mark>。'
    boundary: '<mark>前鋸肌</mark>穩定肩胛骨是 EVF 的硬體前提；疲勞後肩胛骨失穩，高肘不可維持。'
    drills:
      - '泡棉滾筒高肘捕水'
      - '深度捕水'
    lnote: 'A 型核心；前臂 vs 手掌的解析度是診斷關鍵。'

  - n: 5
    name: '內划爆發（主推進）'
    one: '前臂面推水爆發'
    l: 'L4'
    physical: 'Insweep 是蝶式<mark>最大推進相，加速度峰值 4.2 m/s²</mark>（Mason 1992）。雙臂加速向內、向後、向上畫弧，肘屈曲，手掌在胸口下方匯合。接 Upsweep 同步第二踢形成第二推進峰值（2.3 m/s²）。「外划輕內划爆」：外划是靜態定位，須保留爆發的前向空間。'
    drills:
      - '蝶式划手跑直線'
      - '外划到組合'
    cue_bad: '水下整條路徑刻意走 S 形/鑰匙孔'
    cue_why: '菁英水下路徑更接近直線後推；刻意 S 形增加橫向阻力、拉長外划時間。S 形是軀幹起伏的視覺副產品，非刻意手部路徑。'
    cue_good: 'EVF 後直線加速後推'
    lnote: 'A 型 L4 主推進相核心。'

  - n: 6
    name: '出水（推完了）'
    one: '手推到水壓消失即出水'
    l: 'L5'
    physical: '出水順序：<mark>肩→肘→前臂→手掌（小指先出）</mark>。Upsweep 結束時手掌「推不到水了」，此時與第二踢同步、髖部上升帶動手臂出水。出水應是被彈出去的，不是被拉出去的。'
    drills:
      - '蝶式恢復臂（水下）'
      - '二二二組合'
    lnote: 'L5 連鎖：水壓消失是第二踢的觸發接點。'

  - n: 7
    name: '第二踢（髖提升、手臂發射）'
    one: '踢下去，手臂被彈出'
    l: 'L4–L5'
    physical: '第二踢（Exit/Power Kick）與 Upsweep 同步：推進疊加（2.3 m/s²）、<mark>髖部上升對抗上身出水的下沉</mark>、提供手臂出水初始動量、重置波動相位。協調難度四式最高，<mark>疲勞後最先崩潰</mark>的環節。'
    boundary: '<mark>肩關節活動度</mark>是 Recovery 低位路徑的硬體前提；即使第二踢正確，肩活動度不足仍被迫走高舉弧線。'
    drills:
      - '保持低位換氣'
      - '破水動作'
    cue_bad: '第二踢在手「離水」時發生（踢手出水）'
    cue_why: '第二踢應在手肘伸展前、雙手通過肚臍時啟動，比手臂出水更早；太晚則須用背部肌肉主動拉手出水。'
    cue_good: '划手末段、手過肚臍時踢'
    lnote: 'B 型 L4 順序感知核心。'

  - n: 8
    name: '呼吸時序（下巴向前）'
    one: '下巴向前，不向上'
    l: 'L3–L4'
    physical: '呼吸方向須<mark>向前（chin forward），不向上（head up）</mark>。向前：下巴沿波動切線前推，髖部維持高位，波動鏈延續。向上：頸椎後仰、頸肌收縮，髖部強制下沉，Cd 大幅上升，波動鏈在此斷裂。上身上浮是波動帶起的，不是主動抬頭。'
    boundary: '波動不足以帶起上身時，向前也吸不到氣——根本是波動問題，不是呼吸方向問題。'
    drills:
      - '保持低位換氣'
    cue_bad: '換氣時頭往上抬高看前方'
    cue_why: '成人頭部約 5 公斤，向上抬升須用手臂/踢腿大力抵消，頸椎後仰使波動鏈斷裂、髖部下沉。'
    cue_good: '下巴向前穿出（chin skimmer），幾乎貼水面'
    lnote: 'C 型 L3–L4；側向換氣為合法替代，不應禁止。'

  - n: 9
    name: '空中恢復（Recovery）'
    one: '低位飛過，入水受控停頓'
    l: 'L4–L5'
    physical: 'Recovery 目標：<mark>最低能量成本、最短時間</mark>讓雙臂回到能觸發高品質波動的入水位置。低位弧線前提：出水有初始動量、肩胛骨主動內收、肩關節活動度。入水「受控停頓」讓水平動量轉為胸部下壓的垂直動量，直接助力第一踢；<mark>拇指先、約 45° 切入、肘高於手</mark>。'
    boundary: '<mark>肩關節活動度</mark>不足是 Recovery 高位路徑最常見的硬體原因；感知訓練無法改善硬體限制，須陸上測試排除。'
    drills:
      - '拇指拖水恢復'
      - '輕鬆恢復蝶式'
      - '慢速前恢復'
    cue_bad: '回臂要高舉、大弧度、手臂遠離身體'
    cue_why: '高舉/大弧度造成能量耗損、三角肌主動抬臂負擔，且常是第二踢品質不足的代償。'
    cue_good: '低位側擺、小指側領先、近掠水面'
    lnote: 'L5 連鎖：髖部到位「被帶起」決定下一週期起點。'
