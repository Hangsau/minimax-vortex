premise: '蛙式是四式中阻力最大的泳式，每個週期都在製造又對抗阻力——核心是手腳<mark>時序</mark>，不是力量。<span class="cert">🔵</span>'
moves:
  - n: 1
    name: '阻力存在（火箭漂）'
    one: '先感覺阻力才能減阻'
    l: '前置感知'
    physical: '蛙式是四式中<mark>阻力最大</mark>的泳式，每個動作週期都在製造和對抗阻力。身體緊與鬆的<mark>阻力截面積不同</mark>，滑行距離就不同——這是所有蛙式技術的底層。'
    boundary: '緊鬆差異太小常代表身體緊鬆程度沒真正改變，是動作幅度問題而非感知敏銳度問題。'
    lnote: '任何動作習慣建立之前進行。'

  - n: 2
    name: '腿部推進（夾水）'
    one: '踢完身體還在走'
    l: 'L2'
    physical: '蛙腿推進力<mark>不是往後蹬的反作用力</mark>，而是 outsweep + insweep 產生<mark>渦流合併後向後噴射</mark>的動量傳遞（Tanaka CFD 2024）。L2 重點是腳掌翻轉、夾水、感覺水被往後推。'
    boundary: '坐岸邊潑水時腳掌翻不出來，是<mark>踝關節活動度</mark>問題，不是感知問題；踝蹠屈柔韌性可靠軟組織訓練改善。'
    drills:
      - '牆邊蛙式腿'
      - '浮力棒踢腿'
      - '墓碑浮板踢腿'
    cue_bad: '像青蛙一樣踢'
    cue_why: '青蛙用腳趾間蹼往前推，蛙式選手用小腿內側和腳往後推，方向相反，注意力會落在腳趾而非小腿內側。'
    cue_good: '腳掌外翻後像刀片往後劈水'
    lnote: 'L2 腿與手分開建立。'

  - n: 3
    name: '手部撐水（撐起換氣）'
    one: '外划撐起頭自然出水'
    l: 'L2'
    physical: 'L2 階段蛙式的手<mark>功能是撐起換氣，不是產生推進力</mark>。外划內抱讓頭自然浮出水面才算有效；追求手有沒有推水是跳級。'
    boundary: '換氣後肩頸上臂容易疲勞，通常是手沒真正撐起、靠肌力補——屬肌耐力範圍。'
    drills:
      - '蛙式手臂外撇'
      - '戴呼吸管游蛙式'
    lnote: 'L2 的手不做推進力討論。'

  - n: 4
    name: '外划邊界（Outsweep）'
    one: '捕水出現外划即停'
    l: 'L3'
    physical: '外划<mark>不產生向前推進力</mark>，功能是把手移到捕水最佳起始位置（Nicol 2022）。幅度有上限：超過肩膀寬度，側向分量增加、收腿阻力上升，向前有效推力下降。'
    boundary: '外划寬度受<mark>上肢力量</mark>決定——力量不足卻過寬，肘部下沉破壞後續高肘捕水。'
    drills:
      - '寬Y型划水'
      - '頭朝下划水（窄Y）'
    cue_bad: '手要划到最寬處再拉回來 / outsweep 越寬越好'
    cue_why: '側向分量隨幅度增加，向前有效分量佔比反而下降，同時收腿展開更寬、阻力增加，超過最優幅度後收益快速遞減。'
    cue_good: '外划在肌力可控範圍內，終點才是捕水發力起點'
    lnote: '外划終點即捕水點，是 L3 EVF 前提。'

  - n: 5
    name: '手部 Insweep 加速'
    one: '水壓出現立刻加速內夾'
    l: 'L3–L4'
    physical: 'Insweep（內划）是蛙式手臂的<mark>主推進相</mark>，精英比次精英更早啟動，允許更大推進力輸出（Nicol 2022）。手掌在胸口下方匯合，此階段最大加速度。'
    boundary: '前鋸肌等上肢肌耐力是維持高肘捕水姿態的硬體前提。'
    drills:
      - '握拳蛙式'
      - '蛙式拉手＋自由式踢水'
    cue_bad: '外划是主要推進動作 / 外划要有力'
    cue_why: '外划本身推進力很小，誤以為外划用力會提前消耗注意力在外划阻力上，錯失捕水時刻的前臂鎖水感。'
    cue_good: '外划最小施力，insweep 才全力加速'
    lnote: 'A 型 L3 最常見的感知錯位點。'

  - n: 6
    name: '腿部 Insweep 加速（渦流整合）'
    one: '腳掌到位再加速夾入'
    l: 'L3–L4'
    physical: '腿部夾水是蛙腿主推進機制，<mark>outsweep + insweep 渦流合併後向後噴射</mark>（Tanaka 2024）。渦流要整合，夾水必須加速——<mark>insweep 腳速 r=0.89 對應推進力</mark>（Hayashi 2025）。腳掌須翻到斜後方有水壓再加速。'
    boundary: '腳掌翻轉不完全是踝關節 / 髖內旋限制（硬體），與翻到位但加速時機太晚（感知）不同，先確認腳掌方向再判斷。'
    drills:
      - '垂直蛙式踢腿'
      - '超人蛙式踢腿'
    cue_bad: '手要用力夾 / 踢快一點'
    cue_why: '增加力量輸出或頻率不對應渦流整合；夾沒有加速則渦流不合併、推進力渙散（Hayashi 2025）。'
    cue_good: '踩到東西再推'
    lnote: '渦流整合是 L3–L4 腿部核心。'

  - n: 7
    name: '收腿路徑'
    one: '腳跟往外側臀部靠'
    l: 'L2–L3'
    physical: '最小阻力收腿路徑是<mark>腳跟往外側臀部靠，不是往正中間</mark>。髖外旋同時發生，大腿前移量最小，正面阻力最低，腳掌提前到翻轉位置。收腿是阻力最大的時刻（Tanaka 2024）。'
    boundary: '膝距能不能窄，根本決定因子是<mark>髖內旋幅度（Hip Internal Rotation）</mark>；股骨頸角度為固定骨骼結構，反覆練路徑無效時先評估髖內旋限制。'
    drills:
      - '仰面超人蛙式踢腿'
      - 'Barrowman腿（交替踢）'
    cue_bad: '腳跟碰屁股'
    cue_why: '幾何路徑必然往正中間收：膝蓋大幅前移、正面截面積激增、腳掌收完朝上需額外旋轉錯過最佳蹬水時機。'
    cue_good: '腳跟往外側臀部靠 + 確認靠左/右哪側'
    lnote: '指導語設計最差的典型案例。'

  - n: 8
    name: '滑行結束點'
    one: '速度開始快速掉才啟動下一划'
    l: 'L4–L5'
    physical: '蛙式是四式中<mark>唯一每個循環都有完整滑行</mark>的泳式。最優滑行結束點是速度開始快速下降時啟動下一個外划。太早打斷動能、太晚需更大力量重新加速。精英 arm glide phase 反而更長（Nicol 2022）。'
    boundary: '滑行長短依情境變動：衝刺最短、長距離較長；最優判準是<mark>不流失動能</mark>，不是追求滑行優美感。'
    drills:
      - '拉停踢停'
    cue_bad: '要滑行 / 滑行越長代表技術越好'
    cue_why: '在要求形式，學生不知道多久；過長滑行代表速度流失再重建，是耗能的，停頓後的重新加速會被誤認為良好推進。'
    cue_good: '感覺速度開始快速掉，那個瞬間才划'
    lnote: 'L4→L5 核心門檻，蛙式感知最難的一個。'

  - n: 9
    name: '手腳時序'
    one: '手射出去腿才收，不重疊'
    l: 'L4'
    physical: '蛙式效率<mark>最敏感的變數</mark>是 arm-leg coordination 時序（Nicol 2022）。兩個推進峰值（手 insweep + 腿踢）要盡量接近但<mark>不重疊</mark>——重疊時兩個推進力互相干擾。Late kick（Peaty）在 insweep 啟動時才踢腿。'
    drills:
      - '重疊時序'
      - '划次速度訓練'
    cue_bad: '手腳同時動 / 手完全前伸到底才能啟動踢腳'
    cue_why: '同時動等於同時踩油門和煞車，推進力相互干擾；手完全伸直才踢則製造完全停頓空窗，是競技速度流失主因。收腿準備可在 insweep 末段開始。'
    cue_good: '划手時腿保持流線、踢腳時手保持流線，推進相交替不重疊'
    lnote: 'L4 的核心問題。'

  - n: 10
    name: '連鎖觸發'
    one: '每個動作製造下一個的條件'
    l: 'L5'
    physical: 'L5 感知是<mark>每個動作製造了下一個動作需要的條件</mark>：手掌水壓建立→insweep 啟動；insweep 帶起身體→俯衝角度準備；阻力下降→蹬腿啟動；渦流整合完成→速度下降→下一外划啟動。每個接點是感知觸發，不是計時或記憶形式。'
    drills:
      - '時速拉手'
      - '單臂蛙式'
    lnote: 'L5 連鎖結構，末端感知穩固是前提。'

  - n: 11
    name: '波動（俯衝角度）'
    one: '角度對了升力自然出現'
    l: 'L5'
    physical: 'Wave style 波動有兩個功能：<mark>減阻</mark>（收腿時身體傾斜、膝蓋前移量最少）和<mark>流體升力</mark>（俯衝角度產生壓力差向上的力，物理機制確立，蛙式中量化貢獻尚未直接測量）。角度對了升力自然出現，不需特別做動作。'
    boundary: '<mark>腰椎伸展幅度</mark>限制肩膀能升起的高度——屬效率上限，動作可完成但 coupling 能量天花板降低，隨年齡下降。'
    drills:
      - '水下波動'
      - '潛水下衝'
    cue_bad: '波動要更大 / 讓肩膀升起來 / 刻意游波動'
    cue_why: '在強調動作幅度、從動作形式反找感知，效果差；波動過度則上身過度出水製造額外波阻、dome 位置蹬腿損失推進方向。'
    cue_good: '往下切時，有沒有什麼把你頂上來（只升到二頭肌位置，不是胸口出水）'
    lnote: 'C 型 L5 關鍵，波動是推進的副產品。'
