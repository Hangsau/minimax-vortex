- id: common.L2.propulsion
  stroke: common
  level: L2
  aspect: 推進萌芽
  indicator: 浮板踢水穩定前進；手部能撐起換氣（蛙）/ 前臂感覺水壓（自蝶）/ 上踢有感知（仰）
  framework_state: 推進感萌芽：動作開始讓身體前進
  quant_ref: 浮板踢 15m 不停頓
  evidence:
  - certainty: 🔵
    text: 框架設計邏輯
    source: ''
- id: common.L3.watersense
  stroke: common
  level: L3
  aspect: 水感萌芽
  indicator: 捕水有前臂壓力感（自蝶仰）；踢腿後有滑行感（蛙）；波動傳到腳（蝶）；肩旋轉帶動划手（仰）
  framework_state: 水感出現但不穩定：偶爾抓到，下一趟又消失
  quant_ref: SWOLF 45-60（25m）
  evidence:
  - certainty: 🔵
    text: 框架設計邏輯
    source: ''
- id: common.L4.under-pressure
  stroke: common
  level: L4
  aspect: 壓力崩潰
  indicator: 慢游技術正確但加速後崩潰；EVF 在高划頻下消失；蛙式踢腿時機在速度下跑掉；蝶式第二踢失同步
  framework_state: 壓力下感知維持不住：技術開始崩潰
  quant_ref: SWOLF 35-45；高速不超過 +8
  evidence:
  - certainty: 🔵
    text: 框架設計邏輯
    source: ''
- id: common.L5.automation
  stroke: common
  level: L5
  aspect: 自動化過渡
  indicator: 划頻提升但划距不下降（Staunton 2025）；蛙式 late kick 時機穩定；蝶式兩踢功能分化；仰式旋轉角度不因速度縮小
  framework_state: 感知自動化過渡：高速下開始穩定
  quant_ref: SWOLF 35-40；拳頭游差距 < 10%
  evidence:
  - certainty: 🟢
    text: Staunton 2025
    source: Staunton et al. 2025
- id: common.L6.stability
  stroke: common
  level: L6
  aspect: 自動化完成
  indicator: 疲勞下仍維持技術穩定性（Gonjo & Olstad 2023 精英特徵）；能感知並即時修正細微偏差；SWOLF 跨距離差距極小
  framework_state: 感知自動化完成：不需要刻意思考
  quant_ref: SWOLF < 35；精英範圍
  evidence:
  - certainty: 🟢
    text: 疲勞下技術穩定性是精英特徵
    source: Gonjo & Olstad 2023
- id: free.pre.resistance
