levels:
- key: pre
  name_zh: 前置
  perception: 感覺阻力存在，但未與動作連結
  quant_ref: 漂行 > 體長
- key: L2
  name_zh: L2
  perception: 推進感萌芽：動作開始讓身體前進
  quant_ref: 浮板踢 15m 不停頓
- key: L3
  name_zh: L3
  perception: 水感出現但不穩定：偶爾抓到，下一趟又消失
  quant_ref: SWOLF 45-60（25m）
- key: L4
  name_zh: L4
  perception: 壓力下感知維持不住：技術開始崩潰
  quant_ref: SWOLF 35-45；高速不超過 +8
- key: L5
  name_zh: L5
  perception: 感知自動化過渡：高速下開始穩定
  quant_ref: SWOLF 35-40；拳頭游差距 < 10%
- key: L6
  name_zh: L6
  perception: 感知自動化完成：不需要刻意思考
  quant_ref: SWOLF < 35；精英範圍
strokes:
- key: common
  name_zh: 跨式通用
- key: free
  name_zh: 自由式
- key: back
  name_zh: 仰式
- key: fly
  name_zh: 蝶式
- key: breast
  name_zh: 蛙式
indicators:
- id: common.pre.resistance
  stroke: common
  level: pre
  aspect: 阻力感知
  indicator: 靜止漂浮距離可量測；緊鬆身體有明顯差異
  framework_state: 感覺阻力存在，但未與動作連結
  quant_ref: 漂行 > 體長
  evidence:
