    source: Race Club
- id: free.L3.kick-rhythm
  stroke: free
  level: L3
  aspect: 踢水節律
  indicator: 六拍踢能描述「對側配對」；踢水後下半身不下沉
  framework_state: 本體感覺萌芽
  evidence:
  - certainty: 🟠
    text: 教練觀測共識
    source: ''
- id: free.L4.roll-coupling
  stroke: free
  level: L4
  aspect: 旋轉耦合
  indicator: 加速後旋轉崩潰（肩旋轉提前縮小）；高划頻下 EVF 消失
  framework_state: 壓力下感知失守
  evidence:
  - certainty: 🟢
    text: Gonjo 2020
    source: Gonjo 2020
- id: free.L4.sr-sl
  stroke: free
  level: L4
  aspect: 划頻×划距
  indicator: SR 提高時 SL 下降 > 5%（感知尚未支撐技術）
  framework_state: 壓力下感知失守
