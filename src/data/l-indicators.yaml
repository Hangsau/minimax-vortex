usage_boundaries:
- scenario: 感知缺陷
  observation: 技術崩潰，但學習者說不清楚「為什麼做不到」
  intervention: 走水感框架介入——找到感知缺陷的位置，創造條件讓感知浮現
- scenario: 硬體邊界
  observation: 技術崩潰，學習者能描述「卡住的感覺」（踝翻不出、髖轉不到）
  intervention: 走硬體介入（柔韌性訓練）——不等待，在當下邊界內同步建立感知
- scenario: 錯誤感知
  observation: 技術看似「正確」，但感知記憶是錯誤的（感覺快但實際沒前進）
  intervention: 走感知剝奪重建——製造大誤差打破舊感知（拳頭游、閉眼游）
