- id: free.L5.sr-sl
  stroke: free
  level: L5
  aspect: 划頻×划距
  indicator: 精英特徵：高 SR 下 SL 不下降；SR 與速度負相關消失
  framework_state: 感知自動化過渡
  evidence:
  - certainty: 🟢
    text: Staunton 2025
    source: Staunton et al. 2025
- id: free.L5.serratus
