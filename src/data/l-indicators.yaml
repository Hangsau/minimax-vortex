  level: L5
  aspect: 前鋸肌耐力
  indicator: 疲勞後 EVF 仍維持；肩胛骨不 wing；第 4-6 趟技術與第 1-2 趟差距小
  framework_state: 感知自動化過渡
  note: 前鋸肌耐力是 L5 的硬體邊界——技術感知建立後能維持多久取決於前鋸肌，不是感知問題。
