premise: '出發與轉身的動作窗口極短（0.5–1 秒），完成後才感受得到結果——沒有「做到一半修正」的空間，品質取決於切換瞬間的流線型與方向。<span class="cert">🔵</span>'
moves:
  - n: 1
    name: '推蹬（出發）'
    one: '向前墜落，不是主動跳出'
    physical: '精英選手起跳角度 <mark>21–27°</mark>（部分研究低至 -18.7°，即略向下），遠低於傳統教學的 30–40°。降低起跳角度→<mark>水平速度增加</mark>，飛行距離縮短但入水後速度保留更好。Kick Start（現代主流）前後腳分工不同：後腳產生水平速度（蹬推向前），前腳產生垂直速度（調整飛行弧線）。'
    boundary: '起跳台上等待裁判指令時全身張力升高，入水瞬間的感知容易被遮蔽——這是張力造成的感知遮蔽（C 型高風險時刻），不是技術不足，比賽出發訓練須特別注意。'
    cue_bad: '用力跳出去'
    cue_why: '強化向上分力，起跳角度過高，水平速度損失。'
    cue_good: '讓重心向前倒，後腿釋放它'
    lnote: '出發第一個切換點；水平速度是成績主要預測因子。'

  - n: 2
    name: '入水（出發）'
    one: '全身穿過同一個洞'
    physical: '入水目標是<mark>全身穿過同一個洞</mark>——手先切入，身體沿同一路徑跟進，腿最後穿過。入水角度身體略低於水平（不是垂直插入）。重心水平速度與入水距離是成績的主要預測因子，入水角度是次要因子（PLOS ONE 2020）。'
    boundary: '<mark>腳踝完全伸展（蹠屈）</mark>是入水減阻的硬體前提；踝關節僵硬者腳趾無法朝後（腳趾朝腳背的縮緊狀態），入水截面積增大、阻力上升——屬解剖限制不是技術問題。'
    cue_bad: '插水不要打水花'
    cue_why: '技術目標而非感知目標，泳者聚焦表面形式（水花大小），反而忽略穿越的連貫性。'
    cue_good: '想像全身穿過同一個洞，手開的洞腳也要穿過去'
    lnote: '出發第二個切換點；入水流線型品質直接決定後續速度保留。'

  - n: 3
    name: '接近轉身'
    one: '靠計步，不靠抬頭看牆'
    physical: '翻滾接近的核心是<mark>頭部朝下、不抬頭看牆</mark>。抬頭看牆會讓頸部伸展、破壞翻滾的旋轉動量，並強迫身體提前減速。有經驗的泳者靠<mark>計步（stroke count）</mark>判斷翻滾時機——從五線旗到牆的划手次數是固定的，熟悉後不需視覺確認。'
    cue_bad: '翻滾要快'
    cue_why: '「快」沒有感知錨點，常造成翻滾提前或過度旋轉。'
    cue_good: '讓速度帶著你翻，不要主動做翻滾的動作'
    lnote: '計步感知未建立會讓每次翻滾時機不穩定（要嘛踢到牆、要嘛碰不到）。'

  - n: 4
    name: '觸牆推蹬'
    one: '腳到指尖一條線彈出'
    physical: '觸牆前<mark>雙臂已在流線型</mark>（在腳觸牆之前完成），讓推蹬力量直接轉換為流線型水平速度，不需推蹬後再整理姿勢。推蹬時身體是一條線：背部平坦、臀部收緊、雙臂已伸展。力量路徑由後往前連貫傳遞（腳→腿→臀→背→肩→指尖）。各式觸牆差異：自由式/仰式單手翻滾、流線型在翻滾過程建立；蛙式/蝶式雙手同時觸牆、流線型建立速度更關鍵。'
    cue_bad: '推牆要有力'
    cue_why: '力量感知無方向，常造成向下蹬而非向前蹬，水平速度損失。'
    cue_good: '推蹬後感覺力量從腳底傳到手尖，是一條線'
    lnote: '手臂未在觸牆前到位會讓動能損失在整理姿勢的時間。'

  - n: 5
    name: 'IM 轉身：背→蛙'
    one: '觸碰觸發旋轉，三種轉法擇一'
    physical: '規則：觸牆時肩部仍在仰式位置（與水平面夾角 < 90°）；離牆時肩部須已通過垂直面朝向蛙式（≥ 90° 旋轉完成）。三種轉法 7.5m 成績<mark>無顯著差異</mark>（PMC7918682）：即使 Crossover 推出速度統計顯著較高（2.17 vs 2.03 m/s），優勢在 7.5m 內被抵消。Open turn 旋轉弧度最大、容錯率高；Bucket turn 向後翻滾、憋氣需求高（須完整 pullout）；Crossover turn 觸牆與旋轉幾乎同時、動作窗口最短、腳觸牆位置最淺（0.50 foot plant index）、推蹬最水平。'
    boundary: '選轉法不靠感覺判斷哪種「比較快」，用計時測試（觸牆到 7.5m）比較——個人執行最一致的那種，才是實際最快的（Open 練到完全一致可能比 Crossover 練到 80% 穩定更快）。'
    lnote: '三種轉法沒有感知上的「最優」，依個人感知強項選擇。'

  - n: 6
    name: 'IM 轉身：蝶→背'
    one: '觸牆即縮腿，折疊最短路徑'
    physical: '蝶→背是四個 IM 轉身中<mark>最快</mark>的（PubMed 30694108）。速度優勢來自：不需翻滾，雙手觸牆後直接縮腿，腳快速落牆推出。三個常見效率損失：觸牆後停頓確認、縮腿路徑過長、觸牆後換氣。<mark>折疊感</mark>（膝蓋快速收向胸口，不繞圈）代表縮腿路徑最短、腳最快落牆。推出後以仰姿維持流線型，力量路徑與仰式轉身相同。'
    lnote: '蝶式剛結束的換氣衝動須主動忍住，否則打斷旋轉動量。'

  - n: 7
    name: '蛙式 Pullout'
    one: '水下單次手划＋一次蛙踢'
    physical: '蛙式轉身/出發後不用 UDK，改為 <mark>pullout</mark>：流線型滑行 → 手划（從流線型前方往身體兩側向後拉，類似 outsweep → insweep，但更接近下壓拉水）→ 蛙踢收腿/踢出 → 出水。規則：水下最多一次踢腿。三種技術（Fly-Kick First 蝶腳先行 / Combined 合併式 / Pull-Down First 手划先行）成績<mark>無統計差異</mark>（PMC9445308）。'
    boundary: '收腿時膝蓋外張（不朝後）會增加迎水面積；憋氣不足者會在 pullout 中途換氣拖慢整體——前者是路徑問題，後者是憋氣耐受的生理限制。'
    lnote: '不要一開始就教固定技術；多數泳者有下意識偏好（先踢或先划），從現有偏好調整比從零改更有效率。'
